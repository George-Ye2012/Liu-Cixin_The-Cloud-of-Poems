/**
 * 一阶低通滤波：平滑手部坐标消除抖动
 * @param {number} current - 当前原始值
 * @param {number} previous - 上次平滑值
 * @param {number} factor - 平滑系数（0~1，越大越平滑）
 */
function lowPassFilter(current, previous, factor) {
  if (previous === null || previous === undefined) return current;
  return previous * factor + current * (1 - factor);
}

/**
 * 判断手指是否伸直
 * @param {Array} landmarks - 手部21个关键点
 * @param {number} tipIdx - 指尖关键点索引
 * @param {number} pipIdx - PIP关节索引
 * @returns {boolean}
 */
function isFingerExtended(landmarks, tipIdx, pipIdx) {
  // 指尖Y坐标小于PIP关节Y坐标 = 手指伸直（在图像坐标系中Y轴向下）
  return landmarks[tipIdx].y < landmarks[pipIdx].y;
}

/**
 * 手势分类：open（手掌张开）/ fist（握拳）/ unknown（未知）
 * @param {Array} landmarks - 手部21个关键点
 * @returns {string}
 */
function classifyHandGesture(landmarks) {
  // 检查四指（食指、中指、无名指、小指）是否伸直
  const indexUp = isFingerExtended(landmarks, 8, 6);   // 食指: TIP=8, PIP=6
  const middleUp = isFingerExtended(landmarks, 12, 10); // 中指: TIP=12, PIP=10
  const ringUp = isFingerExtended(landmarks, 16, 14);   // 无名指: TIP=16, PIP=14
  const pinkyUp = isFingerExtended(landmarks, 20, 18);  // 小指: TIP=20, PIP=18

  // 大拇指：检查拇指尖与食指MCP的相对位置
  const thumbTip = landmarks[4];
  const indexMcp = landmarks[5];
  const thumbExtended = thumbTip.x < indexMcp.x ? // 简化的拇指判断
    Math.abs(thumbTip.x - indexMcp.x) > 0.04 :
    Math.abs(thumbTip.x - indexMcp.x) > 0.06;

  const extendedCount = [indexUp, middleUp, ringUp, pinkyUp, thumbExtended]
    .filter(Boolean).length;

  if (extendedCount >= 4) return 'open';   // 手掌张开（至少4指伸直）
  if (extendedCount <= 1) return 'fist';   // 握拳（最多1指伸直）
  return 'unknown';
}

/**
 * 获取手掌中心坐标（所有关键点平均值，归一化0~1）
 */
function getPalmCenter(landmarks) {
  let sumX = 0, sumY = 0;
  for (const lm of landmarks) {
    sumX += lm.x;
    sumY += lm.y;
  }
  return { x: sumX / 21, y: sumY / 21 };
}

/**
 * 处理MediaPipe Hands识别结果
 * @param {Object} results - MediaPipe onResults回调参数
 */
function processHandResults(results) {
  // 手势控制已关闭时忽略异步回调（防止竞态）
  if (!handGestureActive) return;

  const now = performance.now();
  const sf = CONFIG.handSmoothFactor;
  const confThreshold = CONFIG.handConfidenceThreshold;

  // 重置当前帧状态
  handState.hasSinglePalm = false;
  handState.hasTwoPalms = false;
  handState.hasTwoFists = false;

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    // 无手部检测 → 清除所有目标值
    handState.targetRotateY = null;
    handState.targetRotateX = null;
    handState.targetZoom = null;
    handState.targetGatherProgress = null;
    updateGestureIndicator('');
    return;
  }

  // 记录最后检测时间
  lastHandDetectionTime = now;

  const hands = results.multiHandLandmarks;
  const handedness = results.multiHandedness || [];

  // ---- 单手掌：分类并处理 ----
  if (hands.length === 1) {
    const gesture = classifyHandGesture(hands[0]);
    const palm = getPalmCenter(hands[0]);

    if (gesture === 'open') {
      // 单手张开 → 控制旋转
      handState.hasSinglePalm = true;

      // 低通滤波平滑手掌坐标
      handState.singlePalmX = lowPassFilter(palm.x, _handSmoothPrev.x, sf);
      handState.singlePalmY = lowPassFilter(palm.y, _handSmoothPrev.y, sf);
      _handSmoothPrev.x = handState.singlePalmX;
      _handSmoothPrev.y = handState.singlePalmY;

      // 映射到旋转角度：手掌中心偏移 → 旋转角度
      // X: 0~1 → 左到右 → Y轴旋转（0.5=不转, <0.5=左转, >0.5=右转）
      const maxAngle = Math.PI * 1.2; // 最大旋转角度范围
      handState.targetRotateY = (0.5 - handState.singlePalmX) * maxAngle * CONFIG.handRotateSensitivity;
      handState.targetRotateX = (0.5 - handState.singlePalmY) * maxAngle * 0.6 * CONFIG.handRotateSensitivity;

      // 清除双手控制
      handState.targetZoom = null;
      handState.targetGatherProgress = null;
      handState.palmDistanceRef = null;
      handState.fistDistanceRef = null;

      // 显示手势名称
      updateGestureIndicator('🖐️ 单手旋转');

    } else {
      // 单手非张开 → 清除所有控制
      handState.targetRotateY = null;
      handState.targetRotateX = null;
      handState.targetZoom = null;
      handState.targetGatherProgress = null;
      updateGestureIndicator('');
    }
    return;
  }

  // ---- 双手掌：分类两只手 ----
  if (hands.length === 2) {
    const gesture0 = classifyHandGesture(hands[0]);
    const gesture1 = classifyHandGesture(hands[1]);

    // 情况1：双手都张开 → 控制缩放
    if (gesture0 === 'open' && gesture1 === 'open') {
      handState.hasTwoPalms = true;

      const palm0 = getPalmCenter(hands[0]);
      const palm1 = getPalmCenter(hands[1]);

      // 计算双掌欧氏距离（归一化坐标空间 0~1）
      const rawDist = Math.sqrt(
        (palm0.x - palm1.x) ** 2 + (palm0.y - palm1.y) ** 2
      );

      // 低通滤波平滑距离
      handState.palmDistance = lowPassFilter(rawDist, _handSmoothPrev.palmDist, sf);
      _handSmoothPrev.palmDist = handState.palmDistance;

      // 首次检测时记录参考距离和相机距离
      if (handState.palmDistanceRef === null) {
        handState.palmDistanceRef = handState.palmDistance;
        handState.zoomRef = camera.position.distanceTo(controls.target);
      }

      // 距离比例映射相机距离：距离变大 → 相机变远（缩小）
      const ratio = handState.palmDistance / handState.palmDistanceRef;
      const targetDist = handState.zoomRef / Math.max(ratio, 0.2) * CONFIG.handZoomSensitivity;
      handState.targetZoom = THREE.MathUtils.clamp(targetDist, controls.minDistance, controls.maxDistance);

      // 清除其他控制
      handState.targetRotateY = null;
      handState.targetRotateX = null;
      handState.targetGatherProgress = null;
      handState.fistDistanceRef = null;

      updateGestureIndicator('🤲 双手缩放');

    // 情况2：双手都握拳 → 控制聚合度
    } else if (gesture0 === 'fist' && gesture1 === 'fist') {
      handState.hasTwoFists = true;

      const palm0 = getPalmCenter(hands[0]);
      const palm1 = getPalmCenter(hands[1]);

      const rawDist = Math.sqrt(
        (palm0.x - palm1.x) ** 2 + (palm0.y - palm1.y) ** 2
      );

      handState.fistDistance = lowPassFilter(rawDist, _handSmoothPrev.fistDist, sf);
      _handSmoothPrev.fistDist = handState.fistDistance;

      // 首次检测时记录参考距离
      if (handState.fistDistanceRef === null) {
        handState.fistDistanceRef = handState.fistDistance;
      }

      // 双拳距离映射聚合度：
      //   拳距离小 → 聚合度高（接近1）
      //   拳距离大 → 聚合度低（接近0）
      // 以参考距离为中点，0.5倍参考距离=完全聚合，2倍参考距离=完全散开
      const minDist = handState.fistDistanceRef * 0.3;
      const maxDist = handState.fistDistanceRef * 2.0;
      const clampedDist = THREE.MathUtils.clamp(handState.fistDistance, minDist, maxDist);
      const progress = 1.0 - (clampedDist - minDist) / (maxDist - minDist);
      handState.targetGatherProgress = THREE.MathUtils.clamp(
        progress * CONFIG.handGatherSensitivity, 0.0, 1.0
      );

      // 清除其他控制
      handState.targetRotateY = null;
      handState.targetRotateX = null;
      handState.targetZoom = null;
      handState.palmDistanceRef = null;

      updateGestureIndicator('✊ 双拳聚合');

    } else {
      // 双手不同手势 → 清除所有控制
      handState.targetRotateY = null;
      handState.targetRotateX = null;
      handState.targetZoom = null;
      handState.targetGatherProgress = null;
      handState.palmDistanceRef = null;
      handState.fistDistanceRef = null;
      updateGestureIndicator('');
    }
  }
}

/** 更新手势状态指示器 */
function updateGestureIndicator(text) {
  const indicator = document.getElementById('gesture-indicator');
  if (!indicator) return;
  if (text) {
    indicator.textContent = text;
    indicator.classList.add('visible');
  } else {
    indicator.classList.remove('visible');
  }
}

/** 启动摄像头与手势识别 */
async function startHandGesture() {
  console.log('🖐️ startHandGesture() 被调用');
  // 防止重复调用（竞态保护）
  if (handGestureStarting || handGestureActive) {
    console.log('🖐️ 启动被阻止: starting=' + handGestureStarting + ', active=' + handGestureActive);
    return;
  }
  handGestureStarting = true;

  const videoEl = document.getElementById('camera-video');
  const previewEl = document.getElementById('camera-preview');
  const btnEl = document.getElementById('hand-control-btn');
  const deniedEl = document.getElementById('permission-denied');

  // 检查MediaPipe Hands是否可用
  if (typeof window.Hands === 'undefined') {
    console.warn('⚠️ MediaPipe Hands 库未加载，手势控制不可用');
    if (btnEl) { btnEl.disabled = true; btnEl.textContent = '⚠️ 手势库未加载'; }
    handGestureStarting = false;
    return;
  }

  // 检查摄像头API是否可用
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    console.warn('⚠️ 浏览器不支持摄像头API');
    if (btnEl) { btnEl.disabled = true; btnEl.textContent = '⚠️ 摄像头不可用'; }
    handGestureStarting = false;
    return;
  }

  try {
    // 申请摄像头权限
    console.log('🖐️ [1/5] 正在请求摄像头权限...');
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
      audio: false
    });
    console.log('🖐️ [2/5] 摄像头已授权，视频流就绪');

    videoEl.srcObject = cameraStream;
    await videoEl.play();
    console.log('🖐️ [3/5] 视频播放已开始, 尺寸:', videoEl.videoWidth, 'x', videoEl.videoHeight);

    // 显示摄像头预览
    if (CONFIG.showCameraPreview && previewEl) {
      previewEl.classList.add('visible');
    }

    // 创建MediaPipe Hands实例（从本地加载模型文件，无需CDN）
    const Hands = window.Hands;
    handsInstance = new Hands({
      locateFile: (file) => {
        // 去掉可能的前缀路径（如 wasm/xxx → xxx）
        const basename = file.includes('/') ? file.split('/').pop() : file;
        return `mediapipe_hands/package/${basename}`;
      }
    });

    handsInstance.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,              // 模型复杂度（0=Lite, 1=Full）
      minDetectionConfidence: CONFIG.handConfidenceThreshold,
      minTrackingConfidence: 0.5
    });

    // 设置结果回调
    handsInstance.onResults((results) => {
      processHandResults(results);
    });

    // 初始化MediaPipe Hands（加载模型），加 15 秒超时保护
    console.log('🖐️ [4/5] 正在加载 MediaPipe 模型（CDN加载WASM...）');
    const initTimeout = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('模型加载超时（15秒），请检查网络/CDN是否可达')), 15000)
    );
    await Promise.race([handsInstance.initialize(), initTimeout]);
    console.log('🖐️ [5/5] 模型加载完成，启动识别循环');

    // 启动独立的识别循环（30FPS）
    handGestureActive = true;
    CONFIG.handGestureEnabled = true;
    lastHandProcessTime = performance.now();
    lastHandDetectionTime = performance.now();

    // 启动空闲检测定时器
    startIdleCheck();

    // 独立识别循环
    function recognitionLoop() {
      if (!handGestureActive) return;

      const now = performance.now();
      const interval = 1000 / CONFIG.handRecognitionFPS;

      if (now - lastHandProcessTime >= interval && videoEl.readyState >= 2 && videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
        lastHandProcessTime = now;
        // 发送视频帧到MediaPipe进行手部识别
        handsInstance.send({ image: videoEl }).catch((err) => {
          console.warn('🖐️ MediaPipe send() 出错:', err?.message || err);
        });
      }

      handRecognitionRAF = requestAnimationFrame(recognitionLoop);
    }
    handRecognitionRAF = requestAnimationFrame(recognitionLoop);

    // 更新按钮状态
    if (btnEl) {
      btnEl.textContent = '🖐️ 关闭手势控制';
      btnEl.classList.add('active');
    }

    console.log('🖐️ 手势控制已启动（识别@30FPS，独立于3D渲染循环）');
    handGestureStarting = false;

  } catch (err) {
    console.warn('⚠️ 摄像头权限被拒绝或出错:', err.message);
    handGestureStarting = false;
    // 显示友好提示
    if (deniedEl) deniedEl.classList.add('visible');
    if (btnEl) {
      btnEl.textContent = '⚠️ 摄像头被拒绝';
      btnEl.disabled = true;
    }
    // 降级为键鼠模式（原有功能不受影响）
    handGestureActive = false;
    CONFIG.handGestureEnabled = false;
  }
}

/** 关闭手势识别 */
function stopHandGesture() {
  handGestureActive = false;
  CONFIG.handGestureEnabled = false;

  // 取消识别循环
  if (handRecognitionRAF) {
    cancelAnimationFrame(handRecognitionRAF);
    handRecognitionRAF = null;
  }

  // 停止空闲检测
  if (handIdleCheckInterval) {
    clearInterval(handIdleCheckInterval);
    handIdleCheckInterval = null;
  }

  // 关闭摄像头
  if (cameraStream) {
    cameraStream.getTracks().forEach(track => track.stop());
    cameraStream = null;
  }

  // 清理MediaPipe实例
  if (handsInstance) {
    handsInstance.close();
    handsInstance = null;
  }

  // 隐藏预览
  const previewEl = document.getElementById('camera-preview');
  if (previewEl) previewEl.classList.remove('visible');

  // 清除视频源
  const videoEl = document.getElementById('camera-video');
  if (videoEl) videoEl.srcObject = null;

  // 重置所有控制状态
  handState.targetRotateY = null;
  handState.targetRotateX = null;
  handState.targetZoom = null;
  handState.targetGatherProgress = null;
  handState.palmDistanceRef = null;
  handState.fistDistanceRef = null;
  handState.hasSinglePalm = false;
  handState.hasTwoPalms = false;
  handState.hasTwoFists = false;
  _handSmoothPrev.x = 0.5;
  _handSmoothPrev.y = 0.5;
  _handSmoothPrev.palmDist = null;
  _handSmoothPrev.fistDist = null;

  updateGestureIndicator('');

  // 更新按钮状态
  const btnEl = document.getElementById('hand-control-btn');
  if (btnEl) {
    btnEl.textContent = '🖐️ 启动手势控制';
    btnEl.classList.remove('active');
    btnEl.disabled = false;
  }

  console.log('🖐️ 手势控制已关闭，恢复键鼠交互');
}

/** 空闲检测：超2秒无手部则暂停识别以降低功耗 */
function startIdleCheck() {
  if (handIdleCheckInterval) clearInterval(handIdleCheckInterval);
  handIdleCheckInterval = setInterval(() => {
    if (!handGestureActive) return;
    const now = performance.now();
    if (now - lastHandDetectionTime > CONFIG.handIdleTimeout) {
      // 超时未检测到手部，暂停发送帧到MediaPipe（降低CPU消耗）
      // 注：识别循环仍在运行但send频率降低到2FPS以保持唤醒
      lastHandProcessTime = now - (1000 / CONFIG.handRecognitionFPS) + (1000 / 2);
    }
  }, 1000);
}

/** 初始化手势控制按钮事件 */
function setupHandGestureUI() {
  const btnEl = document.getElementById('hand-control-btn');
  if (!btnEl) return;

  console.log('🖐️ setupHandGestureUI() 执行中...');
  console.log('   window.Hands:', typeof window.Hands);
  console.log('   navigator.mediaDevices:', !!navigator.mediaDevices);
  console.log('   getUserMedia:', !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));

  // 检查浏览器兼容性
  const isCompatible = typeof window.Hands !== 'undefined' &&
    navigator.mediaDevices && navigator.mediaDevices.getUserMedia;

  if (!isCompatible) {
    btnEl.disabled = true;
    btnEl.textContent = '⚠️ 环境不支持手势控制';
    btnEl.style.opacity = '0.5';
    btnEl.style.cursor = 'not-allowed';
    btnEl.title = '您的浏览器不支持MediaPipe Hands或摄像头API';
    return;
  }

  // 点击切换启动/关闭
  btnEl.addEventListener('click', () => {
    console.log('🖐️ 按钮被点击！handGestureActive=' + handGestureActive + ', handGestureStarting=' + handGestureStarting);
    if (handGestureStarting) return; // 正在启动中，忽略点击
    if (handGestureActive) {
      stopHandGesture();
    } else {
      startHandGesture();
    }
  });
}

// ===================================================================
//  五、场景初始化
// ===================================================================
function initScene() {
  // --- 渲染器 ---
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制像素比保证性能
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ReinhardToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  // --- 场景 ---
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.fog = new THREE.FogExp2(0x000000, 0.00015); // 远处微雾增强纵深感

  // --- 相机 ---
  camera = new THREE.PerspectiveCamera(
    CONFIG.cameraFov,
    window.innerWidth / window.innerHeight,
    CONFIG.cameraNear,
    CONFIG.cameraFar
  );
  camera.position.set(0, 4, CONFIG.cameraInitZ);
  camera.lookAt(0, 0, 0);

  // --- 轨道控制器 ---
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 4;
  controls.maxDistance = 70;
  controls.target.set(0, 0, 0);
  controls.autoRotate = false;
  controls.update();

  // --- 星云旋转容器 ---
  nebulaGroup = new THREE.Group();
  scene.add(nebulaGroup);

  // --- 时钟 ---
  clock = new THREE.Clock();

  console.log('🌌 场景初始化完成');
}

// ===================================================================
//  六、后期处理（泛光Bloom）
// ===================================================================
function initPostProcessing() {
  const renderPass = new RenderPass(scene, camera);
  renderPass.clearAlpha = 1;

  bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    CONFIG.bloomIntensity,
    CONFIG.bloomRadius,
    CONFIG.bloomThreshold
  );

  composer = new EffectComposer(renderer);
  composer.addPass(renderPass);
  composer.addPass(bloomPass);

  console.log('✨ 泛光后期处理初始化完成');
}

// ===================================================================
//  七、创建节点系统（InstancedMesh实例化渲染）
// ===================================================================
function createNodes() {
  const count = CONFIG.nodeCount;
  const geometry = new THREE.SphereGeometry(CONFIG.nodeSize, 16, 16);

  // 使用自发光材质（MeshBasicMaterial不受场景光照影响，天然自发光）
  const material = new THREE.MeshBasicMaterial({ color: 0xffffff });

  instancedMesh = new THREE.InstancedMesh(geometry, material, count);
  instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); // 每帧更新矩阵

  // 临时矩阵用于设置每个实例
  const dummy = new THREE.Object3D();
  const color = new THREE.Color();

  for (let i = 0; i < count; i++) {
    // 生成散开位置（球体内随机分布）
    const pos = randomSpherePoint(CONFIG.scatterRadius);
    scatteredPositions.push(pos.clone());

    // 生成聚合位置（小半径球体内致密分布）
    const gatheredPos = randomSpherePoint(CONFIG.gatherRadius);
    gatheredPositions.push(gatheredPos);

    // 初始位置设为散开位置
    dummy.position.copy(pos);
    dummy.scale.set(1, 1, 1);
    dummy.updateMatrix();
    instancedMesh.setMatrixAt(i, dummy.matrix);

    // 生成节点颜色
    const nodeColor = generateNodeColor();
    nodeColors.push(nodeColor);
    instancedMesh.setColorAt(i, nodeColor);

    // 生成漂浮参数
    floatParams.push({
      speed: CONFIG.floatFrequency * (0.5 + Math.random() * 1.5),
      ampX: CONFIG.floatAmplitude * (0.3 + Math.random() * 1.0),
      ampY: CONFIG.floatAmplitude * (0.3 + Math.random() * 1.0),
      ampZ: CONFIG.floatAmplitude * (0.3 + Math.random() * 1.0),
      phaseX: Math.random() * Math.PI * 2,
      phaseY: Math.random() * Math.PI * 2,
      phaseZ: Math.random() * Math.PI * 2,
    });
  }

  instancedMesh.instanceMatrix.needsUpdate = true;
  if (instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;

  nebulaGroup.add(instancedMesh);
  console.log(`🔮 ${count} 个节点已创建（InstancedMesh）`);
}

// ===================================================================
//  八、创建连线系统（LineSegments批量渲染）
// ===================================================================
function createLinks() {
  const count = CONFIG.nodeCount;
  const maxDist = CONFIG.linkMaxDistance;

  // 第一步：计算连线（根据节点数量自动选择算法）
  linkPairs = [];
  linkDistances = [];

  if (CONFIG.spatialGridEnabled && count > 500) {
    // 大型场景：空间网格加速 O(n·k)
    const result = computeLinksSpatial(scatteredPositions, maxDist);
    linkPairs = result.pairs;
    linkDistances = result.distances;
  } else {
    // 小型场景：朴素 O(n²) 更简单直接
    for (let i = 0; i < count; i++) {
      for (let j = i + 1; j < count; j++) {
        const dist = scatteredPositions[i].distanceTo(scatteredPositions[j]);
        if (dist < maxDist) {
          linkPairs.push([i, j]);
          linkDistances.push(dist);
        }
      }
    }
  }

  const linkCount = linkPairs.length;
  console.log(`🔗 ${linkCount} 条连线已建立（距离阈值: ${maxDist}）`);

  if (linkCount === 0) {
    // 无连线时创建空几何体
    const emptyGeo = new THREE.BufferGeometry();
    emptyGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(0), 3));
    const linkMat = new THREE.LineBasicMaterial({ visible: false });
    linkLines = new THREE.LineSegments(emptyGeo, linkMat);
    nebulaGroup.add(linkLines);
    linkPositions = new Float32Array(0);
    return;
  }

  // 第二步：创建连线几何体
  linkPositions = new Float32Array(linkCount * 2 * 3); // 每条线段2个顶点
  const linkColorsArr = new Float32Array(linkCount * 2 * 3); // 顶点颜色

  const baseLinkColor = new THREE.Color(CONFIG.linkColor);

  // 初始化连线位置（基于散开位置）
  for (let k = 0; k < linkCount; k++) {
    const [i, j] = linkPairs[k];
    const posA = scatteredPositions[i];
    const posB = scatteredPositions[j];
    const dist = linkDistances[k];

    // 位置
    const baseIdx = k * 6;
    linkPositions[baseIdx] = posA.x;
    linkPositions[baseIdx + 1] = posA.y;
    linkPositions[baseIdx + 2] = posA.z;
    linkPositions[baseIdx + 3] = posB.x;
    linkPositions[baseIdx + 4] = posB.y;
    linkPositions[baseIdx + 5] = posB.z;

    // 顶点颜色：距离越远越暗（模拟透明度变化）
    const alpha = 1.0 - (dist / maxDist); // 0~1，近亮远暗
    const dimColor = baseLinkColor.clone().multiplyScalar(0.3 + alpha * 0.7);

    linkColorsArr[baseIdx] = dimColor.r;
    linkColorsArr[baseIdx + 1] = dimColor.g;
    linkColorsArr[baseIdx + 2] = dimColor.b;
    linkColorsArr[baseIdx + 3] = dimColor.r;
    linkColorsArr[baseIdx + 4] = dimColor.g;
    linkColorsArr[baseIdx + 5] = dimColor.b;
  }

  const linkGeo = new THREE.BufferGeometry();
  linkGeo.setAttribute('position', new THREE.BufferAttribute(linkPositions, 3));
  linkGeo.setAttribute('color', new THREE.BufferAttribute(linkColorsArr, 3));

  const linkMat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: CONFIG.linkBaseOpacity,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  linkLines = new THREE.LineSegments(linkGeo, linkMat);
  nebulaGroup.add(linkLines);
}

// ---- 空间网格加速连线计算 ----

/**
 * 构建空间哈希网格用于加速邻近节点查询
 * @param {THREE.Vector3[]} positions - 节点位置数组
 * @param {number} cellSize - 网格单元大小（通常=linkMaxDistance）
 * @returns {Map<number, number[]>} cellKey → 节点索引数组
 */
function buildSpatialGrid(positions, cellSize) {
  const grid = new Map();
  for (let i = 0; i < positions.length; i++) {
    const p = positions[i];
    const cx = Math.floor(p.x / cellSize);
    const cy = Math.floor(p.y / cellSize);
    const cz = Math.floor(p.z / cellSize);
    // 打包为32位整数key（10bits per dim, signed offset）
    const key = ((cx & 0x3FF) << 20) | ((cy & 0x3FF) << 10) | (cz & 0x3FF);
    if (!grid.has(key)) grid.set(key, []);
    grid.get(key).push(i);
  }
  return grid;
}

/**
 * 空间网格加速连线计算：仅检查相邻网格单元的节点对
 * 复杂度 O(n·k)，k=每个单元的邻居节点数
 */
function computeLinksSpatial(positions, maxDist) {
  const grid = buildSpatialGrid(positions, maxDist);
  const pairs = [];
  const distances = [];

  for (const [key, indices] of grid) {
    const cx = (key >> 20) & 0x3FF;
    const cy = (key >> 10) & 0x3FF;
    const cz = key & 0x3FF;

    for (const i of indices) {
      // 检查当前单元及26个相邻单元
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          for (let dz = -1; dz <= 1; dz++) {
            const nKey = (((cx + dx) & 0x3FF) << 20) | (((cy + dy) & 0x3FF) << 10) | ((cz + dz) & 0x3FF);
            const neighbors = grid.get(nKey);
            if (!neighbors) continue;
            for (const j of neighbors) {
              if (i >= j) continue; // 避免重复和自对
              const dist = positions[i].distanceTo(positions[j]);
              if (dist < maxDist) {
                pairs.push([i, j]);
                distances.push(dist);
              }
            }
          }
        }
      }
    }
  }

  return { pairs, distances };
}

// ---- 节点系统重建（滑块触发） ----

let rebuildDebounceTimer = null;

/**
 * 重建节点系统：滑块改变节点数量时调用
 * 防抖处理，避免滑块拖拽过程中频繁重建
 */
function rebuildNodeSystem(newCount) {
  // 清除旧的防抖定时器
  if (rebuildDebounceTimer) clearTimeout(rebuildDebounceTimer);

  rebuildDebounceTimer = setTimeout(() => {
    const oldCount = CONFIG.nodeCount;
    if (newCount === oldCount) return;

    console.log(`🔧 重建节点系统：${oldCount} → ${newCount}`);
    const startTime = performance.now();

    // 1. 暂停聚散动画
    isAnimating = false;

    // 2. 清理旧连线
    if (linkLines) {
      linkLines.geometry.dispose();
      linkLines.material.dispose();
      nebulaGroup.remove(linkLines);
      linkLines = null;
    }
    linkPairs = [];
    linkDistances = [];
    linkPositions = new Float32Array(0);

    // 3. 清理旧节点（InstancedMesh）
    if (instancedMesh) {
      instancedMesh.geometry.dispose();
      instancedMesh.material.dispose();
      nebulaGroup.remove(instancedMesh);
      instancedMesh = null;
    }

    // 4. 更新节点数量
    CONFIG.nodeCount = newCount;

    // 5. 重新生成位置和颜色数据
    scatteredPositions = [];
    gatheredPositions = [];
    nodeColors = [];
    floatParams = [];

    for (let i = 0; i < newCount; i++) {
      const pos = randomSpherePoint(CONFIG.scatterRadius);
      scatteredPositions.push(pos.clone());
      gatheredPositions.push(randomSpherePoint(CONFIG.gatherRadius));
      nodeColors.push(generateNodeColor());
      floatParams.push({
        speed: CONFIG.floatFrequency * (0.5 + Math.random() * 1.5),
        ampX: CONFIG.floatAmplitude * (0.3 + Math.random() * 1.0),
        ampY: CONFIG.floatAmplitude * (0.3 + Math.random() * 1.0),
        ampZ: CONFIG.floatAmplitude * (0.3 + Math.random() * 1.0),
        phaseX: Math.random() * Math.PI * 2,
        phaseY: Math.random() * Math.PI * 2,
        phaseZ: Math.random() * Math.PI * 2,
      });
    }

    // 6. 重建 InstancedMesh
    const geometry = new THREE.SphereGeometry(CONFIG.nodeSize, 16, 16);
    const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
    instancedMesh = new THREE.InstancedMesh(geometry, material, newCount);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

    const dummy = new THREE.Object3D();
    for (let i = 0; i < newCount; i++) {
      dummy.position.copy(scatteredPositions[i]);
      dummy.scale.set(1, 1, 1);
      dummy.updateMatrix();
      instancedMesh.setMatrixAt(i, dummy.matrix);
      instancedMesh.setColorAt(i, nodeColors[i]);
    }
    instancedMesh.instanceMatrix.needsUpdate = true;
    if (instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;
    nebulaGroup.add(instancedMesh);

    // 7. 重建连线
    createLinks();

    // 8. 重置诗词映射（节点索引变了）
    nodePoemMap.clear();
    poemPool = Array.from({ length: POEMS.length }, (_, i) => i);
    for (let i = poemPool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [poemPool[i], poemPool[j]] = [poemPool[j], poemPool[i]];
    }

    // 9. 重置聚合状态为散开
    isGathered = false;

    const elapsed = performance.now() - startTime;
    console.log(`✅ 节点系统重建完成（${newCount}节点, ${linkPairs.length}连线, 耗时${elapsed.toFixed(1)}ms）`);
    updateNodeCountDisplay(newCount);

  }, CONFIG.sliderDebounceMs);
}

/** 更新滑块数字显示 */
function updateNodeCountDisplay(count) {
  const display = document.getElementById('node-count-display');
  if (display) display.textContent = count;
}

/** 初始化节点数量滑块事件 */
function setupNodeSlider() {
  const slider = document.getElementById('node-slider');
  if (!slider) return;

  slider.min = CONFIG.nodeCountMin;
  slider.max = CONFIG.nodeCountMax;
  slider.value = CONFIG.nodeCount;

  slider.addEventListener('input', () => {
    const newCount = parseInt(slider.value);
    updateNodeCountDisplay(newCount);
    rebuildNodeSystem(newCount);
  });

  updateNodeCountDisplay(CONFIG.nodeCount);
}

// ===================================================================
//  九、创建背景星光粒子
// ===================================================================
function createStarfield() {
  const count = CONFIG.starCount;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);

  // 星光分布在大型球壳上，作为远景
  const starRadius = 50;
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = starRadius * (0.7 + Math.random() * 0.3);

    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);

    // 星光颜色：大部分白色，少量带微蓝或微金
    const hueRand = Math.random();
    let starColor;
    if (hueRand < 0.7) {
      starColor = new THREE.Color().setHSL(0, 0, 0.7 + Math.random() * 0.3);
    } else if (hueRand < 0.9) {
      starColor = new THREE.Color().setHSL(0.58, 0.1, 0.7 + Math.random() * 0.3);
    } else {
      starColor = new THREE.Color().setHSL(0.13, 0.2, 0.7 + Math.random() * 0.3);
    }
    colors[i * 3] = starColor.r;
    colors[i * 3 + 1] = starColor.g;
    colors[i * 3 + 2] = starColor.b;
  }

  const starsGeo = new THREE.BufferGeometry();
  starsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  starsGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const starsMat = new THREE.PointsMaterial({
    size: 0.12,
    vertexColors: true,
    transparent: true,
    opacity: 0.75,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
  });

  starField = new THREE.Points(starsGeo, starsMat);
  scene.add(starField); // 不加入星云组，保持独立背景
  console.log(`⭐ ${count} 颗背景星光粒子已创建`);
}

// ===================================================================
//  十、创建宇宙尘埃粒子系统
// ===================================================================
function createDustParticles() {
  const count = CONFIG.dustCount;
  const positions = new Float32Array(count * 3);
  const spread = CONFIG.dustSpread;

  for (let i = 0; i < count; i++) {
    positions[i * 3] = (Math.random() - 0.5) * spread;
    positions[i * 3 + 1] = (Math.random() - 0.5) * spread * 0.7;
    positions[i * 3 + 2] = (Math.random() - 0.5) * spread;

    // 存储运动数据
    dustData.push({
      baseX: positions[i * 3],
      baseY: positions[i * 3 + 1],
      baseZ: positions[i * 3 + 2],
      speedX: (Math.random() - 0.5) * 0.015,
      speedY: (Math.random() - 0.5) * 0.01,
      speedZ: (Math.random() - 0.5) * 0.015,
      phase: Math.random() * Math.PI * 2,
      amplitude: 0.5 + Math.random() * 2.5,
    });
  }

  const dustGeo = new THREE.BufferGeometry();
  dustGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const dustMat = new THREE.PointsMaterial({
    size: 0.06,
    color: 0xccccdd,
    transparent: true,
    opacity: 0.4,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
  });

  dustParticles = new THREE.Points(dustGeo, dustMat);
  scene.add(dustParticles); // 不加入星云组，保持独立飘移
  console.log(`💫 ${count} 颗宇宙尘埃粒子已创建`);
}

// ===================================================================
//  十一、诗词弹出系统 — 古风质感 + 炫酷动效
// ===================================================================
let poemExitCallback = null;  // 退场完成后的回调

function setupPoemOverlay() {
  poemOverlay = document.getElementById('poem-overlay');

  // 初始化诗词池（Fisher-Yates洗牌）
  poemPool = Array.from({ length: POEMS.length }, (_, i) => i);
  for (let i = poemPool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [poemPool[i], poemPool[j]] = [poemPool[j], poemPool[i]];
  }

  // 应用排版模式
  applyLayoutMode();

  // 点击诗词浮层空白处关闭（带消散动效）
  poemOverlay.addEventListener('click', (e) => {
    e.stopPropagation();
    hidePoem();
  });

  // 印章显示控制
  updateSealVisibility();
}

/** 应用排版模式 */
function applyLayoutMode() {
  if (!poemOverlay) return;
  if (CONFIG.poemLayout === 'vertical') {
    poemOverlay.classList.add('layout-vertical');
  } else {
    poemOverlay.classList.remove('layout-vertical');
  }
}

/** 更新印章可见性 */
function updateSealVisibility() {
  const seal = poemOverlay?.querySelector('.poem-seal');
  if (seal) seal.style.display = CONFIG.poemSealEnabled ? '' : 'none';
}

/** 逐字构建动画span，返回总字符数 */
function buildCharacterSpans(containerEl, text, startDelaySec) {
  containerEl.innerHTML = '';
  let charIndex = 0;
  const interval = CONFIG.poemCharacterInterval;

  const lines = text.split('\n');
  for (const line of lines) {
    const lineDiv = document.createElement('div');
    lineDiv.className = 'poem-line';
    for (const ch of line) {
      const span = document.createElement('span');
      span.className = 'poem-char';
      if (ch === ' ') span.classList.add('space');
      span.textContent = ch;
      span.style.animationDelay = `${startDelaySec + charIndex * interval}s`;
      charIndex++;
      lineDiv.appendChild(span);
    }
    containerEl.appendChild(lineDiv);
  }
  return charIndex;
}

/** 清除字符span */
function clearCharacterSpans() {
  if (!poemOverlay) return;
  ['poem-title', 'poem-author', 'poem-content'].forEach(cls => {
    const el = poemOverlay.querySelector('.' + cls);
    if (el) el.innerHTML = '';
  });
}

/** 显示指定索引的诗词（带入场凝聚动画） */
function showPoem(poemIndex) {
  if (isPoemVisible) {
    hidePoemWithAnimation(() => showPoemInternal(poemIndex));
    return;
  }
  showPoemInternal(poemIndex);
}

function showPoemInternal(poemIndex) {
  const poem = POEMS[poemIndex];
  if (!poem) return;

  applyLayoutMode();
  updateSealVisibility();

  // 清除退场态，进入可见态（CSS class 管理动画，无 inline style 冲突）
  poemOverlay.classList.remove('exiting', 'floating');
  void poemOverlay.offsetWidth; // 强制回流，确保动画重置

  // 构建标题、作者、正文的逐字span
  const titleEl = poemOverlay.querySelector('.poem-title');
  const titleChars = buildCharacterSpans(titleEl, `《${poem.title}》`, 0.05);

  const authorEl = poemOverlay.querySelector('.poem-author');
  const authorText = `${poem.dynasty} · ${poem.author}`;
  const authorChars = buildCharacterSpans(authorEl, authorText, 0.05 + titleChars * CONFIG.poemCharacterInterval + 0.15);

  const contentEl = poemOverlay.querySelector('.poem-content');
  const contentStart = 0.05 + (titleChars + authorChars) * CONFIG.poemCharacterInterval + 0.3;
  buildCharacterSpans(contentEl, poem.content, contentStart);

  // 显示弹窗：visible 触发 opacity:1 + borderPulse
  poemOverlay.classList.add('visible');
  if (CONFIG.poemFloatEnabled) {
    poemOverlay.classList.add('floating'); // 叠加悬浮动画
  }
  isPoemVisible = true;

  if (CONFIG.poemDimBackground) dimBackground(true);
  poemOverlay.scrollTop = 0;
}

/** 隐藏诗词 */
function hidePoem() {
  if (!isPoemVisible) return;
  hidePoemWithAnimation(null);
}

/** 隐藏诗词（带粒子消散，支持回调链） */
function hidePoemWithAnimation(callback) {
  if (!isPoemVisible) { if (callback) callback(); return; }

  spawnExitParticles();
  // 用 exiting class 触发消散动画（!important 覆盖 visible/floating 的动画）
  poemOverlay.classList.add('exiting');
  poemOverlay.classList.remove('visible', 'floating');
  isPoemVisible = false;
  if (CONFIG.poemDimBackground) dimBackground(false);

  const cleanup = () => {
    poemOverlay.removeEventListener('animationend', cleanup);
    poemOverlay.classList.remove('exiting');
    clearParticles();
    clearCharacterSpans();
    if (callback) callback();
  };
  poemOverlay.addEventListener('animationend', cleanup, { once: true });

  // 兜底清理（1s后强制）
  setTimeout(() => {
    if (poemOverlay.classList.contains('exiting')) {
      poemOverlay.classList.remove('exiting');
      clearParticles();
      clearCharacterSpans();
      if (callback) callback();
    }
  }, 1000);
}

/** 生成消散粒子 */
function spawnExitParticles() {
  const container = document.getElementById('poem-particles');
  if (!container) return;
  clearParticles();

  const rect = poemOverlay.getBoundingClientRect();
  const maxR = Math.max(rect.width, rect.height) * 0.7;
  const count = CONFIG.poemExitParticleCount;
  const frag = document.createDocumentFragment();

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'poem-particle';
    p.style.left = ((Math.random() - 0.5) * rect.width * 0.9) + 'px';
    p.style.top = ((Math.random() - 0.5) * rect.height * 0.9) + 'px';
    const angle = Math.random() * Math.PI * 2;
    const dist = maxR * (0.4 + Math.random() * 0.9);
    p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
    p.style.animationDelay = Math.random() * 0.25 + 's';
    frag.appendChild(p);
  }
  container.appendChild(frag);
  requestAnimationFrame(() => {
    container.querySelectorAll('.poem-particle').forEach(p => p.classList.add('fly'));
  });
}

/** 清理消散粒子 */
function clearParticles() {
  const c = document.getElementById('poem-particles');
  if (c) c.innerHTML = '';
}

/** 背景变暗聚焦 / 恢复 — 平滑过渡泛光强度 */
let dimTargetBloom = null;
let dimAnimFrame = null;
function dimBackground(dim) {
  if (!bloomPass) return;
  dimTargetBloom = dim
    ? CONFIG.bloomIntensity * CONFIG.poemDimAmount
    : CONFIG.bloomIntensity;

  if (dimAnimFrame) cancelAnimationFrame(dimAnimFrame);
  function step() {
    if (!bloomPass) return;
    const delta = dimTargetBloom - bloomPass.strength;
    if (Math.abs(delta) < 0.003) {
      bloomPass.strength = dimTargetBloom;
      dimAnimFrame = null;
      return;
    }
    bloomPass.strength += delta * 0.14;
    dimAnimFrame = requestAnimationFrame(step);
  }
  dimAnimFrame = requestAnimationFrame(step);
}

/** 为节点分配一首未使用的诗词（不重复抽取） */
function assignPoemToNode(nodeIndex) {
  if (nodePoemMap.has(nodeIndex)) {
    return nodePoemMap.get(nodeIndex); // 已分配，直接返回
  }
  if (poemPool.length === 0) {
    // 池空，重新洗牌
    poemPool = Array.from({ length: POEMS.length }, (_, i) => i);
    for (let i = poemPool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [poemPool[i], poemPool[j]] = [poemPool[j], poemPool[i]];
    }
  }
  const poemIdx = poemPool.pop();
  nodePoemMap.set(nodeIndex, poemIdx);
  return poemIdx;
}

// ===================================================================
//  十二、交互逻辑（射线检测 + 键盘事件）
// ===================================================================
function initInteraction() {
  raycaster = new THREE.Raycaster();
  raycaster.params.Points.threshold = 0.5; // 增大点击容差
  mouse = new THREE.Vector2();

  // 鼠标点击检测
  renderer.domElement.addEventListener('click', onMouseClick);

  // 键盘事件：空格键聚散切换
  window.addEventListener('keydown', onKeyDown);

  // 窗口大小自适应
  window.addEventListener('resize', onWindowResize);

  console.log('🖱️ 交互系统初始化完成');
}

function onMouseClick(event) {
  // 计算归一化设备坐标
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // 仅检测 InstancedMesh
  const intersects = raycaster.intersectObject(instancedMesh);

  if (intersects.length > 0) {
    // 点击到了节点
    const instanceId = intersects[0].instanceId;
    if (instanceId !== undefined && instanceId < CONFIG.nodeCount) {
      const poemIdx = assignPoemToNode(instanceId);
      showPoem(poemIdx);
      event.stopPropagation();
    }
  } else {
    // 点击空白处，如果诗词正在显示则关闭
    if (isPoemVisible) {
      hidePoem();
    }
  }
}

function onKeyDown(event) {
  if (event.code === 'Space') {
    event.preventDefault();
    if (isAnimating) return; // 动画进行中忽略

    // 切换状态
    isAnimating = true;
    animStartTime = performance.now();
    animFromGathered = isGathered;
    isGathered = !isGathered;
  }
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
}

// ===================================================================
//  十三、动画循环（核心渲染循环）
// ===================================================================
function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1); // 防止大帧跳跃
  const elapsed = clock.getElapsedTime();

  controls.update();

  // ---- 星云旋转：自动公转 + 手势单手旋转控制 ----
  if (handState.targetRotateY !== null && handGestureActive) {
    // 手势控制旋转（平滑插值到目标角度）
    const lerpSpeed = 0.12; // 旋转平滑速度
    nebulaGroup.rotation.y += (handState.targetRotateY - nebulaGroup.rotation.y) * lerpSpeed;
    nebulaGroup.rotation.x += (handState.targetRotateX - nebulaGroup.rotation.x) * lerpSpeed;
  } else {
    // 默认自动公转
    nebulaGroup.rotation.y += CONFIG.rotationSpeed * dt;
  }

  // ---- 相机缩放：手势双手缩放控制 ----
  if (handState.targetZoom !== null && handGestureActive) {
    const currentDist = camera.position.distanceTo(controls.target);
    const newDist = currentDist + (handState.targetZoom - currentDist) * 0.1;
    const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
    camera.position.copy(controls.target).addScaledVector(dir, newDist);
  }

  // ---- 聚散动画处理（空格键 + 手势双拳无级控制） ----
  let gatherProgress = isGathered ? 1.0 : 0.0;

  // 手势双拳控制：连续无级调节聚合度
  if (handState.targetGatherProgress !== null && handGestureActive) {
    gatherProgress = handState.targetGatherProgress;
    // 同步更新状态，确保空格键可以从当前状态切换
    isGathered = gatherProgress > 0.5;
    isAnimating = false; // 手势控制时停止空格键动画
  } else if (isAnimating) {
    // 空格键触发的聚散动画
    const rawProgress = (performance.now() - animStartTime) / CONFIG.gatherDuration;
    if (rawProgress >= 1.0) {
      gatherProgress = isGathered ? 1.0 : 0.0;
      isAnimating = false;
    } else {
      const easedProgress = easeInOutCubic(rawProgress);
      gatherProgress = animFromGathered ? (1.0 - easedProgress) : easedProgress;
    }
  }

  // ---- 更新节点位置 ----
  const dummy = new THREE.Object3D();
  const floatTime = elapsed;

  for (let i = 0; i < CONFIG.nodeCount; i++) {
    const scattered = scatteredPositions[i];
    const gathered = gatheredPositions[i];
    const fp = floatParams[i];

    // 计算漂浮偏移（Lissajous式三维浮动）
    const floatX = Math.sin(floatTime * fp.speed + fp.phaseX) * fp.ampX;
    const floatY = Math.cos(floatTime * fp.speed * 1.3 + fp.phaseY) * fp.ampY;
    const floatZ = Math.sin(floatTime * fp.speed * 0.7 + fp.phaseZ) * fp.ampZ;

    // 聚散插值
    const lerpFactor = gatherProgress;
    const baseX = scattered.x + (gathered.x - scattered.x) * lerpFactor;
    const baseY = scattered.y + (gathered.y - scattered.y) * lerpFactor;
    const baseZ = scattered.z + (gathered.z - scattered.z) * lerpFactor;

    // 最终位置 = 插值位置 + 漂浮偏移
    dummy.position.set(
      baseX + floatX,
      baseY + floatY,
      baseZ + floatZ
    );
    dummy.scale.set(1, 1, 1);
    dummy.updateMatrix();
    instancedMesh.setMatrixAt(i, dummy.matrix);
  }
  instancedMesh.instanceMatrix.needsUpdate = true;

  // ---- 更新连线位置（基于当前节点位置） ----
  if (linkPairs.length > 0 && linkPositions.length > 0) {
    // 获取当前所有节点的世界矩阵（相对于nebulaGroup）
    // 注：instancedMesh在nebulaGroup下，矩阵已是局部坐标
    const linkCount = linkPairs.length;
    for (let k = 0; k < linkCount; k++) {
      const [i, j] = linkPairs[k];
      const baseIdx = k * 6;

      // 复用对象避免每帧分配内存（性能关键）
      const matrixA = _matA;
      const matrixB = _matB;
      instancedMesh.getMatrixAt(i, matrixA);
      instancedMesh.getMatrixAt(j, matrixB);

      _posA.setFromMatrixPosition(matrixA);
      _posB.setFromMatrixPosition(matrixB);
      const posA = _posA;
      const posB = _posB;

      linkPositions[baseIdx] = posA.x;
      linkPositions[baseIdx + 1] = posA.y;
      linkPositions[baseIdx + 2] = posA.z;
      linkPositions[baseIdx + 3] = posB.x;
      linkPositions[baseIdx + 4] = posB.y;
      linkPositions[baseIdx + 5] = posB.z;
    }
    linkLines.geometry.attributes.position.needsUpdate = true;
  }

  // ---- 更新尘埃粒子（缓慢漂移） ----
  if (dustParticles && dustData.length > 0) {
    const dustPositions = dustParticles.geometry.attributes.position.array;
    for (let i = 0; i < dustData.length; i++) {
      const dd = dustData[i];
      dustPositions[i * 3] = dd.baseX + Math.sin(elapsed * 0.3 + dd.phase) * dd.amplitude;
      dustPositions[i * 3 + 1] = dd.baseY + Math.cos(elapsed * 0.25 + dd.phase) * dd.amplitude * 0.7;
      dustPositions[i * 3 + 2] = dd.baseZ + Math.cos(elapsed * 0.35 + dd.phase) * dd.amplitude;
    }
    dustParticles.geometry.attributes.position.needsUpdate = true;
  }

  // ---- 后期渲染（泛光） ----
  composer.render();
}

// ===================================================================
//  十四、启动入口
// ===================================================================
function init() {
  initScene();
  initPostProcessing();
  createNodes();
  createLinks();
  createStarfield();
  createDustParticles();
  setupPoemOverlay();
  initInteraction();
  setupHandGestureUI();  // 手势控制UI（按钮事件）
  setupNodeSlider();     // 节点数量滑块

  console.log('🚀 诗云可视化已启动');
  console.log('   🖱️ 鼠标拖拽旋转 | 滚轮缩放 | 右键平移');
  console.log('   ⌨️ 空格键：聚/散切换');
  console.log('   🖱️ 点击节点：查看诗词');
  console.log('   🖐️ 点击右下角按钮：启用手势控制');
  console.log('   🎚️ 左下角滑块：调节诗云节点数量 (100-2000)');

  // 启动渲染循环
  animate();
}

// 页面加载完毕后启动
window.addEventListener('DOMContentLoaded', init);
</script>
