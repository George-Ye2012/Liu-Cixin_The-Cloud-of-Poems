<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗云 — 刘慈欣</title>
<style>
  /* ===== 全局样式：零UI干扰，全屏沉浸 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000000;
    font-family: 'STKaiti', '楷体', 'KaiTi', 'STShouJinShu', 'SimSun', '宋体', serif;
    -webkit-font-smoothing: antialiased;
  }
  canvas { display: block; }

  /* ===== 诗词弹出层 — 古风质感升级 ===== */
  :root {
    --poem-gold: #c8b878;
    --poem-gold-light: #e0d4a8;
    --poem-gold-dim: #8a7a50;
    --poem-font-title: '瘦金体', 'STShouJinShu', '华文瘦金体', '启功体', 'STKaiti', '楷体', 'KaiTi', 'SimSun', '宋体', serif;
    --poem-font-body: 'STKaiti', '楷体', 'KaiTi', '启功体', 'SimSun', '宋体', serif;
  }

  /* 底板：深空星云纹理 */
  #poem-overlay {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(ellipse at 30% 20%, rgba(25, 20, 50, 0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(15, 25, 45, 0.30) 0%, transparent 55%),
      radial-gradient(ellipse at center, rgba(8, 6, 20, 0.75) 0%, rgba(0, 0, 0, 0.88) 100%);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(180, 160, 120, 0.3);
    border-radius: 18px;
    padding: clamp(22px, 4.5vh, 44px) clamp(26px, 5.5vw, 52px);
    color: var(--poem-gold);
    pointer-events: auto;
    opacity: 0;
    z-index: 10;
    box-shadow:
      0 0 80px rgba(100, 80, 40, 0.06),
      inset 0 0 120px rgba(60, 40, 20, 0.04);
    max-width: 80vw;
    max-height: 83vh;
    overflow-y: auto;
    user-select: none;
    font-family: var(--poem-font-body);
    will-change: opacity;
  }
  /* 可见：立即显示底板+启动悬浮（不靠transition，无冲突） */
  #poem-overlay.visible { opacity: 1; }
  #poem-overlay.floating {
    animation: poemFloat 8s ease-in-out infinite;
  }
  /* 退场：仅播放消散（!important覆盖任何残留动画） */
  #poem-overlay.exiting {
    animation: poemDissolve 0.7s ease-out forwards !important;
    pointer-events: none;
  }

  /* 鎏金流光边框 — 用 box-shadow 脉冲替代 mask 方案（兼容性更佳） */
  @keyframes borderPulse {
    0%, 100% { box-shadow: 0 0 25px rgba(160, 140, 100, 0.06), inset 0 0 30px rgba(100, 70, 40, 0.04); }
    50%      { box-shadow: 0 0 45px rgba(190, 160, 115, 0.14), inset 0 0 50px rgba(120, 80, 45, 0.08); }
  }
  #poem-overlay.visible {
    animation: borderPulse 4s ease-in-out infinite;
  }
  #poem-overlay.visible.floating {
    animation: poemFloat 8s ease-in-out infinite, borderPulse 4s ease-in-out infinite;
  }

  /* ---- 排版与字体 ---- */
  #poem-overlay .poem-title {
    font-family: var(--poem-font-title);
    font-size: clamp(20px, 2.8vw, 32px);
    font-weight: bold;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.2em;
    color: var(--poem-gold-light);
    text-shadow:
      0 0 8px rgba(200, 170, 120, 0.35),
      0 0 24px rgba(180, 150, 100, 0.15);
  }
  #poem-overlay .poem-author {
    font-family: var(--poem-font-body);
    font-size: clamp(13px, 1.7vw, 19px);
    text-align: right;
    margin-bottom: 22px;
    padding-right: 8px;
    color: #a89870;
    letter-spacing: 0.12em;
    text-shadow: 0 0 6px rgba(160, 140, 100, 0.2);
  }
  #poem-overlay .poem-content {
    font-family: var(--poem-font-body);
    font-size: clamp(15px, 2.1vw, 23px);
    line-height: 2.2;
    text-align: center;
    letter-spacing: 0.1em;
    color: #c8b888;
    text-shadow:
      0 0 3px rgba(180, 155, 115, 0.3),
      0 0 10px rgba(160, 130, 90, 0.1);
  }
  #poem-overlay .poem-hint {
    text-align: center;
    font-size: 11px;
    color: rgba(170, 150, 120, 0.45);
    margin-top: 22px;
    letter-spacing: 0.06em;
  }

  /* ---- 竖排模式 ---- */
  #poem-overlay.layout-vertical {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    max-height: 85vh;
    max-width: 85vw;
    padding: clamp(26px, 5vw, 48px) clamp(18px, 3vw, 36px);
  }
  #poem-overlay.layout-vertical .poem-title {
    text-align: start;
    letter-spacing: 0.3em;
    margin-bottom: 0;
    padding-bottom: 16px;
    border-bottom: none;
    border-left: 1px solid rgba(180, 160, 120, 0.15);
    padding-left: 16px;
  }
  #poem-overlay.layout-vertical .poem-author {
    text-align: start;
    margin-bottom: 0;
    margin-left: 16px;
    padding-right: 0;
  }
  #poem-overlay.layout-vertical .poem-content {
    text-align: start;
    line-height: 2.4;
    letter-spacing: 0.2em;
  }
  #poem-overlay.layout-vertical .poem-seal {
    right: auto; left: 12px; bottom: 12px;
  }

  /* ---- 逐字凝聚动画（仅用 opacity，移除昂贵的 filter:blur） ---- */
  .poem-char {
    display: inline-block;
    opacity: 0;
    will-change: opacity;
    animation: charCondense 0.5s ease-out forwards;
  }
  #poem-overlay.layout-vertical .poem-char { display: inline-block; }
  .poem-line { display: block; }
  .poem-char.space { width: 0.4em; }

  /* ---- 篆刻印章 ---- */
  .poem-seal {
    position: absolute;
    bottom: 16px; right: 18px;
    font-family: 'SimSun', 'STKaiti', '楷体', serif;
    font-size: 18px;
    color: rgba(210, 60, 40, 0.28);
    border: 1px solid rgba(200, 80, 60, 0.2);
    border-radius: 4px;
    padding: 4px 8px;
    letter-spacing: 0.3em;
    transform: rotate(-8deg);
    pointer-events: none;
    user-select: none;
    text-shadow: 0 0 6px rgba(180, 40, 20, 0.15);
  }

  /* ---- 消散粒子 ---- */
  #poem-particles {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 11;
    width: 0; height: 0;
  }
  .poem-particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #d4c098;
    opacity: 0;
    box-shadow: 0 0 6px rgba(200, 170, 120, 0.5);
  }
  .poem-particle.fly {
    animation: particleFly 0.9s ease-out forwards;
  }

  /* ---- 滚动条（金色细条） ---- */
  #poem-overlay::-webkit-scrollbar { width: 4px; }
  #poem-overlay::-webkit-scrollbar-track { background: transparent; }
  #poem-overlay::-webkit-scrollbar-thumb {
    background: rgba(180, 160, 120, 0.28);
    border-radius: 2px;
  }
  #poem-overlay::-webkit-scrollbar-thumb:hover {
    background: rgba(200, 175, 130, 0.5);
  }

  /* ===== 动效关键帧 ===== */
  @keyframes charCondense {
    0%   { opacity: 0; }
    60%  { opacity: 0.8; }
    100% { opacity: 1; }
  }

  @keyframes poemFloat {
    0%, 100% { transform: translate(-50%, -50%) translateY(0); }
    25%      { transform: translate(-50%, -50%) translateY(-4px); }
    75%      { transform: translate(-50%, -50%) translateY(4px); }
  }

  @keyframes poemDissolve {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  @keyframes particleFly {
    0%   { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0.2); }
  }

  /* ===== 手势控制UI：统一淡金色科幻风格 ===== */
  #hand-control-btn {
    position: fixed;
    bottom: 170px;
    right: 24px;
    z-index: 20;
    padding: 10px 28px;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(180, 160, 120, 0.35);
    border-radius: 24px;
    color: #d4c8a0;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.35s ease;
    user-select: none;
    outline: none;
    pointer-events: auto;
  }
  #hand-control-btn:hover {
    background: rgba(30, 25, 15, 0.8);
    border-color: rgba(200, 180, 130, 0.6);
    box-shadow: 0 0 24px rgba(180, 150, 100, 0.15);
  }
  #hand-control-btn.active {
    border-color: rgba(180, 200, 150, 0.55);
    color: #c8e0b0;
    box-shadow: 0 0 20px rgba(150, 200, 120, 0.2);
  }
  #hand-control-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* 摄像头预览小窗 */
  #camera-preview {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 180px;
    height: 135px;
    z-index: 15;
    border-radius: 12px;
    border: 1px solid rgba(180, 160, 120, 0.3);
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    overflow: hidden;
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
    box-shadow: 0 0 20px rgba(100, 80, 50, 0.1);
  }
  #camera-preview.visible {
    opacity: 1;
    transform: scale(1);
  }
  #camera-preview video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* 镜像翻转，符合直觉 */
  }

  /* 权限拒绝提示 — 移至右下角 */
  #permission-denied {
    position: fixed;
    bottom: 145px;
    right: 24px;
    z-index: 20;
    padding: 10px 22px;
    background: rgba(60, 20, 20, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(200, 120, 100, 0.35);
    border-radius: 20px;
    color: #d4a098;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-align: center;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  #permission-denied.visible { opacity: 1; }

  /* 手势状态指示器 — 移至左下角 */
  #gesture-indicator {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 19;
    padding: 6px 18px;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 14px;
    color: rgba(200, 180, 140, 0.7);
    font-size: 12px;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  #gesture-indicator.visible { opacity: 1; }

  /* ===== 节点数量滑块（左下角） ===== */
  #node-slider-container {
    position: fixed;
    bottom: 58px;
    left: 20px;
    z-index: 18;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(180, 160, 120, 0.3);
    border-radius: 20px;
    pointer-events: auto;
  }
  #node-slider-container label {
    color: #c8b890;
    font-size: 12px;
    letter-spacing: 0.08em;
    white-space: nowrap;
    user-select: none;
  }
  #node-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 140px;
    height: 4px;
    background: rgba(180, 160, 120, 0.25);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #node-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #d4c8a0;
    border: 1px solid rgba(200, 180, 130, 0.6);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(180, 150, 100, 0.3);
    transition: box-shadow 0.2s ease;
  }
  #node-slider::-webkit-slider-thumb:hover {
    box-shadow: 0 0 20px rgba(200, 170, 110, 0.5);
  }
  #node-slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #d4c8a0;
    border: 1px solid rgba(200, 180, 130, 0.6);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(180, 150, 100, 0.3);
  }
  #node-count-display {
    color: #ead4a0;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.06em;
    min-width: 36px;
    text-align: center;
    user-select: none;
  }
</style>
</head>
<body>

<div id="poem-overlay">
  <div class="poem-title"></div>
  <div class="poem-author"></div>
  <div class="poem-content"></div>
  <div class="poem-seal">诗云</div>
  <div class="poem-hint">✦ 点击空白处关闭 ✦</div>
</div>
<div id="poem-particles"></div>

<!-- ===== 手势控制UI元素 ===== -->
<button id="hand-control-btn" title="启动手势控制">🖐️ 启动手势控制</button>
<div id="camera-preview"><video id="camera-video" autoplay playsinline></video></div>
<div id="permission-denied">⚠️ 摄像头权限被拒绝，手势控制不可用<br>已自动降级为键鼠交互模式</div>
<div id="gesture-indicator"></div>

<!-- ===== 节点数量滑块 ===== -->
<div id="node-slider-container">
  <label for="node-slider">✦ 诗云节点</label>
  <input type="range" id="node-slider" min="100" max="2000" value="1000" step="10">
  <span id="node-count-display">1000</span>
</div>

<!-- ===== Three.js Import Map (CDN) ===== -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<!-- ===== MediaPipe Hands 手势识别库（本地文件，无需CDN） ===== -->
<script src="mediapipe_hands/package/hands.js"></script>

<script type="module">
// ===================================================================
//  诗云 — 基于 Three.js 的沉浸式3D诗词宇宙可视化
//  灵感来源：刘慈欣《诗云》短篇小说
//  新增：MediaPipe手势控制（单手旋转/双手缩放/双拳聚合）
// ===================================================================

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ===================================================================
//  一、全局可配置参数 — 集中管理，无需修改逻辑即可二次调整
// ===================================================================
const CONFIG = {
  // ---- 节点 ----
  nodeCount: 1000,            // 节点总数量（默认1000，性能与视觉平衡）
  nodeSize: 0.18,             // 节点几何大小（3D空间单位）
  scatterRadius: 14,          // 星云散开半径
  gatherRadius: 2.8,          // 聚合球体半径

  // ---- 连线 ----
  linkMaxDistance: 3.6,       // 连线最大距离阈值（3D空间单位）
  linkColor: '#d4b87a',       // 连线颜色（淡金色）
  linkBaseOpacity: 0.5,       // 连线基础透明度

  // ---- 运动 ----
  rotationSpeed: 0.08,        // 星云整体公转速度（弧度/秒）
  floatAmplitude: 0.35,       // 节点漂浮幅度
  floatFrequency: 0.6,        // 节点漂浮基础频率

  // ---- 后期 ----
  bloomIntensity: 1.2,        // 泛光/体积光强度
  bloomRadius: 0.5,           // 泛光扩散半径
  bloomThreshold: 0.7,        // 泛光亮度阈值

  // ---- 动画 ----
  gatherDuration: 2200,       // 聚散动画时长（毫秒）
  poemDisplayTime: 0,         // 诗句显示时长（0=手动关闭）

  // ---- 诗词弹窗动效 ----
  poemLayout: 'horizontal',     // 排版模式：horizontal（横排）/ vertical（竖排）
  poemEnterDuration: 2.0,       // 入场凝聚动画总时长（秒）
  poemGlowIntensity: 1.0,       // 文字鎏金辉光强度系数
  poemSealEnabled: true,        // 是否显示「诗云」篆刻印章
  poemDimBackground: true,      // 是否开启背景变暗聚焦效果
  poemDimAmount: 0.5,           // 背景变暗时泛光强度乘数（0~1）
  poemCharacterInterval: 0.018, // 逐字出现的间隔时长（秒）
  poemExitParticleCount: 36,    // 退场消散粒子数量
  poemFloatEnabled: true,       // 是否启用悬浮呼吸感

  // ---- 粒子 ----
  starCount: 1500,            // 背景星光粒子数量
  dustCount: 2000,            // 宇宙尘埃粒子数量
  dustSpread: 55,             // 尘埃分布范围

  // ---- 相机 ----
  cameraFov: 75,              // 视场角
  cameraNear: 0.5,            // 近裁剪面
  cameraFar: 200,             // 远裁剪面
  cameraInitZ: 22,            // 相机初始Z位置

  // ---- 手势控制 ----
  handGestureEnabled: false,     // 是否启用手势识别（点击按钮后开启）
  handRotateSensitivity: 1.0,   // 手势旋转灵敏度系数
  handZoomSensitivity: 1.0,     // 手势缩放灵敏度系数
  handGatherSensitivity: 1.0,   // 手势聚合灵敏度系数
  handSmoothFactor: 0.75,       // 手部坐标平滑系数（越大越平稳，0~1）
  showCameraPreview: true,      // 是否显示摄像头预览小窗
  handConfidenceThreshold: 0.7, // 手势识别置信度阈值（0~1）
  handIdleTimeout: 2000,        // 手部未检测超时自动暂停（毫秒）
  handRecognitionFPS: 30,       // 手势识别帧率（独立于3D渲染）

  // ---- 节点数量滑块 ----
  nodeCountMin: 100,            // 滑块最小节点数
  nodeCountMax: 2000,           // 滑块最大节点数
  nodeCountDefault: 1000,       // 默认节点数
  sliderDebounceMs: 350,        // 滑块防抖延迟（毫秒）

  // ---- 性能优化 ----
  spatialGridEnabled: true,     // 是否启用空间网格加速连线计算
};

// ===================================================================
//  二、中国古诗词库 — 200+首经典诗词
//     字段：title(诗名) author(作者) dynasty(朝代) content(全诗内容)
// ===================================================================
const POEMS = [
  // ======== 诗经 / 先秦 ========
  { title:'关雎', author:'佚名', dynasty:'先秦·诗经', content:'关关雎鸠，在河之洲。\n窈窕淑女，君子好逑。\n参差荇菜，左右流之。\n窈窕淑女，寤寐求之。\n求之不得，寤寐思服。\n悠哉悠哉，辗转反侧。\n参差荇菜，左右采之。\n窈窕淑女，琴瑟友之。\n参差荇菜，左右芼之。\n窈窕淑女，钟鼓乐之。' },
  { title:'蒹葭', author:'佚名', dynasty:'先秦·诗经', content:'蒹葭苍苍，白露为霜。\n所谓伊人，在水一方。\n溯洄从之，道阻且长。\n溯游从之，宛在水中央。\n\n蒹葭萋萋，白露未晞。\n所谓伊人，在水之湄。\n溯洄从之，道阻且跻。\n溯游从之，宛在水中坻。\n\n蒹葭采采，白露未已。\n所谓伊人，在水之涘。\n溯洄从之，道阻且右。\n溯游从之，宛在水中沚。' },
  { title:'桃夭', author:'佚名', dynasty:'先秦·诗经', content:'桃之夭夭，灼灼其华。\n之子于归，宜其室家。\n桃之夭夭，有蕡其实。\n之子于归，宜其家室。\n桃之夭夭，其叶蓁蓁。\n之子于归，宜其家人。' },
  { title:'子衿', author:'佚名', dynasty:'先秦·诗经', content:'青青子衿，悠悠我心。\n纵我不往，子宁不嗣音？\n青青子佩，悠悠我思。\n纵我不往，子宁不来？\n挑兮达兮，在城阙兮。\n一日不见，如三月兮。' },
  { title:'鹿鸣', author:'佚名', dynasty:'先秦·诗经', content:'呦呦鹿鸣，食野之苹。\n我有嘉宾，鼓瑟吹笙。\n吹笙鼓簧，承筐是将。\n人之好我，示我周行。\n呦呦鹿鸣，食野之蒿。\n我有嘉宾，德音孔昭。\n视民不恌，君子是则是效。\n我有旨酒，嘉宾式燕以敖。' },
  { title:'采薇（节选）', author:'佚名', dynasty:'先秦·诗经', content:'采薇采薇，薇亦作止。\n曰归曰归，岁亦莫止。\n靡室靡家，猃狁之故。\n不遑启居，猃狁之故。\n\n昔我往矣，杨柳依依。\n今我来思，雨雪霏霏。\n行道迟迟，载渴载饥。\n我心伤悲，莫知我哀。' },
  { title:'静女', author:'佚名', dynasty:'先秦·诗经', content:'静女其姝，俟我于城隅。\n爱而不见，搔首踟蹰。\n静女其娈，贻我彤管。\n彤管有炜，说怿女美。\n自牧归荑，洵美且异。\n匪女之为美，美人之贻。' },
  { title:'黍离', author:'佚名', dynasty:'先秦·诗经', content:'彼黍离离，彼稷之苗。\n行迈靡靡，中心摇摇。\n知我者谓我心忧，不知我者谓我何求。\n悠悠苍天，此何人哉！' },

  // ======== 楚辞 ========
  { title:'离骚（节选）', author:'屈原', dynasty:'先秦·楚辞', content:'长太息以掩涕兮，哀民生之多艰。\n余虽好修姱以鞿羁兮，謇朝谇而夕替。\n亦余心之所善兮，虽九死其犹未悔。\n路漫漫其修远兮，吾将上下而求索。' },
  { title:'九歌·湘夫人', author:'屈原', dynasty:'先秦·楚辞', content:'帝子降兮北渚，目眇眇兮愁予。\n袅袅兮秋风，洞庭波兮木叶下。\n登白薠兮骋望，与佳期兮夕张。\n鸟何萃兮蘋中，罾何为兮木上？' },

  // ======== 汉魏六朝 ========
  { title:'行行重行行', author:'佚名', dynasty:'汉·古诗十九首', content:'行行重行行，与君生别离。\n相去万余里，各在天一涯。\n道路阻且长，会面安可知？\n胡马依北风，越鸟巢南枝。\n相去日已远，衣带日已缓。\n浮云蔽白日，游子不顾返。\n思君令人老，岁月忽已晚。\n弃捐勿复道，努力加餐饭。' },
  { title:'迢迢牵牛星', author:'佚名', dynasty:'汉·古诗十九首', content:'迢迢牵牛星，皎皎河汉女。\n纤纤擢素手，札札弄机杼。\n终日不成章，泣涕零如雨。\n河汉清且浅，相去复几许？\n盈盈一水间，脉脉不得语。' },
  { title:'涉江采芙蓉', author:'佚名', dynasty:'汉·古诗十九首', content:'涉江采芙蓉，兰泽多芳草。\n采之欲遗谁？所思在远道。\n还顾望旧乡，长路漫浩浩。\n同心而离居，忧伤以终老。' },
  { title:'短歌行', author:'曹操', dynasty:'汉末', content:'对酒当歌，人生几何！\n譬如朝露，去日苦多。\n慨当以慷，忧思难忘。\n何以解忧？唯有杜康。\n青青子衿，悠悠我心。\n但为君故，沉吟至今。\n呦呦鹿鸣，食野之苹。\n我有嘉宾，鼓瑟吹笙。\n明明如月，何时可掇？\n忧从中来，不可断绝。\n越陌度阡，枉用相存。\n契阔谈䜩，心念旧恩。\n月明星稀，乌鹊南飞。\n绕树三匝，何枝可依？\n山不厌高，海不厌深。\n周公吐哺，天下归心。' },
  { title:'观沧海', author:'曹操', dynasty:'汉末', content:'东临碣石，以观沧海。\n水何澹澹，山岛竦峙。\n树木丛生，百草丰茂。\n秋风萧瑟，洪波涌起。\n日月之行，若出其中。\n星汉灿烂，若出其里。\n幸甚至哉，歌以咏志。' },
  { title:'龟虽寿', author:'曹操', dynasty:'汉末', content:'神龟虽寿，犹有竟时。\n腾蛇乘雾，终为土灰。\n老骥伏枥，志在千里。\n烈士暮年，壮心不已。\n盈缩之期，不但在天。\n养怡之福，可得永年。\n幸甚至哉，歌以咏志。' },
  { title:'七步诗', author:'曹植', dynasty:'三国·魏', content:'煮豆燃豆萁，豆在釜中泣。\n本是同根生，相煎何太急？' },
  { title:'饮酒·其五', author:'陶渊明', dynasty:'东晋', content:'结庐在人境，而无车马喧。\n问君何能尔？心远地自偏。\n采菊东篱下，悠然见南山。\n山气日夕佳，飞鸟相与还。\n此中有真意，欲辨已忘言。' },
  { title:'归园田居·其一', author:'陶渊明', dynasty:'东晋', content:'少无适俗韵，性本爱丘山。\n误落尘网中，一去三十年。\n羁鸟恋旧林，池鱼思故渊。\n开荒南野际，守拙归园田。\n方宅十余亩，草屋八九间。\n榆柳荫后檐，桃李罗堂前。\n暧暧远人村，依依墟里烟。\n狗吠深巷中，鸡鸣桑树颠。\n户庭无尘杂，虚室有余闲。\n久在樊笼里，复得返自然。' },
  { title:'归园田居·其三', author:'陶渊明', dynasty:'东晋', content:'种豆南山下，草盛豆苗稀。\n晨兴理荒秽，带月荷锄归。\n道狭草木长，夕露沾我衣。\n衣沾不足惜，但使愿无违。' },
  { title:'木兰诗（节选）', author:'佚名', dynasty:'北朝民歌', content:'唧唧复唧唧，木兰当户织。\n不闻机杼声，唯闻女叹息。\n问女何所思，问女何所忆。\n女亦无所思，女亦无所忆。\n\n万里赴戎机，关山度若飞。\n朔气传金柝，寒光照铁衣。\n将军百战死，壮士十年归。' },
  { title:'敕勒歌', author:'佚名', dynasty:'北朝民歌', content:'敕勒川，阴山下。\n天似穹庐，笼盖四野。\n天苍苍，野茫茫，\n风吹草低见牛羊。' },
  { title:'西洲曲（节选）', author:'佚名', dynasty:'南朝民歌', content:'忆梅下西洲，折梅寄江北。\n单衫杏子红，双鬓鸦雏色。\n西洲在何处？两桨桥头渡。\n日暮伯劳飞，风吹乌臼树。\n海水梦悠悠，君愁我亦愁。\n南风知我意，吹梦到西洲。' },

  // ======== 唐代 — 李白 ========
  { title:'静夜思', author:'李白', dynasty:'唐', content:'床前明月光，疑是地上霜。\n举头望明月，低头思故乡。' },
  { title:'望庐山瀑布', author:'李白', dynasty:'唐', content:'日照香炉生紫烟，遥看瀑布挂前川。\n飞流直下三千尺，疑是银河落九天。' },
  { title:'早发白帝城', author:'李白', dynasty:'唐', content:'朝辞白帝彩云间，千里江陵一日还。\n两岸猿声啼不住，轻舟已过万重山。' },
  { title:'赠汪伦', author:'李白', dynasty:'唐', content:'李白乘舟将欲行，忽闻岸上踏歌声。\n桃花潭水深千尺，不及汪伦送我情。' },
  { title:'黄鹤楼送孟浩然之广陵', author:'李白', dynasty:'唐', content:'故人西辞黄鹤楼，烟花三月下扬州。\n孤帆远影碧空尽，唯见长江天际流。' },
  { title:'望天门山', author:'李白', dynasty:'唐', content:'天门中断楚江开，碧水东流至此回。\n两岸青山相对出，孤帆一片日边来。' },
  { title:'独坐敬亭山', author:'李白', dynasty:'唐', content:'众鸟高飞尽，孤云独去闲。\n相看两不厌，只有敬亭山。' },
  { title:'月下独酌·其一', author:'李白', dynasty:'唐', content:'花间一壶酒，独酌无相亲。\n举杯邀明月，对影成三人。\n月既不解饮，影徒随我身。\n暂伴月将影，行乐须及春。\n我歌月徘徊，我舞影零乱。\n醒时同交欢，醉后各分散。\n永结无情游，相期邈云汉。' },
  { title:'将进酒', author:'李白', dynasty:'唐', content:'君不见黄河之水天上来，奔流到海不复回。\n君不见高堂明镜悲白发，朝如青丝暮成雪。\n人生得意须尽欢，莫使金樽空对月。\n天生我材必有用，千金散尽还复来。\n烹羊宰牛且为乐，会须一饮三百杯。\n岑夫子，丹丘生，将进酒，杯莫停。\n与君歌一曲，请君为我倾耳听。\n钟鼓馔玉不足贵，但愿长醉不愿醒。\n古来圣贤皆寂寞，惟有饮者留其名。\n陈王昔时宴平乐，斗酒十千恣欢谑。\n主人何为言少钱，径须沽取对君酌。\n五花马，千金裘，呼儿将出换美酒，与尔同销万古愁。' },
  { title:'行路难·其一', author:'李白', dynasty:'唐', content:'金樽清酒斗十千，玉盘珍羞直万钱。\n停杯投箸不能食，拔剑四顾心茫然。\n欲渡黄河冰塞川，将登太行雪满山。\n闲来垂钓碧溪上，忽复乘舟梦日边。\n行路难，行路难，多歧路，今安在？\n长风破浪会有时，直挂云帆济沧海。' },
  { title:'蜀道难', author:'李白', dynasty:'唐', content:'噫吁嚱，危乎高哉！蜀道之难，难于上青天！\n蚕丛及鱼凫，开国何茫然！\n尔来四万八千岁，不与秦塞通人烟。\n西当太白有鸟道，可以横绝峨眉巅。\n地崩山摧壮士死，然后天梯石栈相钩连。\n上有六龙回日之高标，下有冲波逆折之回川。\n黄鹤之飞尚不得过，猿猱欲度愁攀援。\n青泥何盘盘，百步九折萦岩峦。\n扪参历井仰胁息，以手抚膺坐长叹。\n问君西游何时还？畏途巉岩不可攀。\n但见悲鸟号古木，雄飞雌从绕林间。\n又闻子规啼夜月，愁空山。\n蜀道之难，难于上青天，使人听此凋朱颜！\n连峰去天不盈尺，枯松倒挂倚绝壁。\n飞湍瀑流争喧豗，砯崖转石万壑雷。\n其险也如此，嗟尔远道之人胡为乎来哉！\n剑阁峥嵘而崔嵬，一夫当关，万夫莫开。\n所守或匪亲，化为狼与豺。\n朝避猛虎，夕避长蛇。\n磨牙吮血，杀人如麻。\n锦城虽云乐，不如早还家。\n蜀道之难，难于上青天，侧身西望长咨嗟！' },
  { title:'梦游天姥吟留别', author:'李白', dynasty:'唐', content:'海客谈瀛洲，烟涛微茫信难求。\n越人语天姥，云霞明灭或可睹。\n天姥连天向天横，势拔五岳掩赤城。\n天台四万八千丈，对此欲倒东南倾。\n我欲因之梦吴越，一夜飞度镜湖月。\n湖月照我影，送我至剡溪。\n谢公宿处今尚在，渌水荡漾清猿啼。\n脚著谢公屐，身登青云梯。\n半壁见海日，空中闻天鸡。\n千岩万转路不定，迷花倚石忽已暝。\n熊咆龙吟殷岩泉，栗深林兮惊层巅。\n云青青兮欲雨，水澹澹兮生烟。\n列缺霹雳，丘峦崩摧。\n洞天石扉，訇然中开。\n青冥浩荡不见底，日月照耀金银台。\n霓为衣兮风为马，云之君兮纷纷而来下。\n虎鼓瑟兮鸾回车，仙之人兮列如麻。\n忽魂悸以魄动，恍惊起而长嗟。\n惟觉时之枕席，失向来之烟霞。\n世间行乐亦如此，古来万事东流水。\n别君去兮何时还？且放白鹿青崖间，须行即骑访名山。\n安能摧眉折腰事权贵，使我不得开心颜！' },
  { title:'宣州谢朓楼饯别校书叔云', author:'李白', dynasty:'唐', content:'弃我去者，昨日之日不可留；\n乱我心者，今日之日多烦忧。\n长风万里送秋雁，对此可以酣高楼。\n蓬莱文章建安骨，中间小谢又清发。\n俱怀逸兴壮思飞，欲上青天览明月。\n抽刀断水水更流，举杯消愁愁更愁。\n人生在世不称意，明朝散发弄扁舟。' },
  { title:'夜宿山寺', author:'李白', dynasty:'唐', content:'危楼高百尺，手可摘星辰。\n不敢高声语，恐惊天上人。' },
  { title:'春夜洛城闻笛', author:'李白', dynasty:'唐', content:'谁家玉笛暗飞声，散入春风满洛城。\n此夜曲中闻折柳，何人不起故园情。' },
  { title:'关山月', author:'李白', dynasty:'唐', content:'明月出天山，苍茫云海间。\n长风几万里，吹度玉门关。\n汉下白登道，胡窥青海湾。\n由来征战地，不见有人还。\n戍客望边邑，思归多苦颜。\n高楼当此夜，叹息未应闲。' },
  { title:'登金陵凤凰台', author:'李白', dynasty:'唐', content:'凤凰台上凤凰游，凤去台空江自流。\n吴宫花草埋幽径，晋代衣冠成古丘。\n三山半落青天外，二水中分白鹭洲。\n总为浮云能蔽日，长安不见使人愁。' },

  // ======== 唐代 — 杜甫 ========
  { title:'春望', author:'杜甫', dynasty:'唐', content:'国破山河在，城春草木深。\n感时花溅泪，恨别鸟惊心。\n烽火连三月，家书抵万金。\n白头搔更短，浑欲不胜簪。' },
  { title:'登高', author:'杜甫', dynasty:'唐', content:'风急天高猿啸哀，渚清沙白鸟飞回。\n无边落木萧萧下，不尽长江滚滚来。\n万里悲秋常作客，百年多病独登台。\n艰难苦恨繁霜鬓，潦倒新停浊酒杯。' },
  { title:'望岳', author:'杜甫', dynasty:'唐', content:'岱宗夫如何？齐鲁青未了。\n造化钟神秀，阴阳割昏晓。\n荡胸生曾云，决眦入归鸟。\n会当凌绝顶，一览众山小。' },
  { title:'绝句', author:'杜甫', dynasty:'唐', content:'两个黄鹂鸣翠柳，一行白鹭上青天。\n窗含西岭千秋雪，门泊东吴万里船。' },
  { title:'春夜喜雨', author:'杜甫', dynasty:'唐', content:'好雨知时节，当春乃发生。\n随风潜入夜，润物细无声。\n野径云俱黑，江船火独明。\n晓看红湿处，花重锦官城。' },
  { title:'茅屋为秋风所破歌', author:'杜甫', dynasty:'唐', content:'八月秋高风怒号，卷我屋上三重茅。\n茅飞渡江洒江郊，高者挂罥长林梢，下者飘转沉塘坳。\n南村群童欺我老无力，忍能对面为盗贼。\n公然抱茅入竹去，唇焦口燥呼不得，归来倚杖自叹息。\n俄顷风定云墨色，秋天漠漠向昏黑。\n布衾多年冷似铁，娇儿恶卧踏里裂。\n床头屋漏无干处，雨脚如麻未断绝。\n自经丧乱少睡眠，长夜沾湿何由彻！\n安得广厦千万间，大庇天下寒士俱欢颜！\n风雨不动安如山。呜呼！何时眼前突兀见此屋，吾庐独破受冻死亦足！' },
  { title:'登岳阳楼', author:'杜甫', dynasty:'唐', content:'昔闻洞庭水，今上岳阳楼。\n吴楚东南坼，乾坤日夜浮。\n亲朋无一字，老病有孤舟。\n戎马关山北，凭轩涕泗流。' },
  { title:'蜀相', author:'杜甫', dynasty:'唐', content:'丞相祠堂何处寻？锦官城外柏森森。\n映阶碧草自春色，隔叶黄鹂空好音。\n三顾频烦天下计，两朝开济老臣心。\n出师未捷身先死，长使英雄泪满襟。' },
  { title:'旅夜书怀', author:'杜甫', dynasty:'唐', content:'细草微风岸，危樯独夜舟。\n星垂平野阔，月涌大江流。\n名岂文章著，官应老病休。\n飘飘何所似？天地一沙鸥。' },
  { title:'闻官军收河南河北', author:'杜甫', dynasty:'唐', content:'剑外忽传收蓟北，初闻涕泪满衣裳。\n却看妻子愁何在，漫卷诗书喜欲狂。\n白日放歌须纵酒，青春作伴好还乡。\n即从巴峡穿巫峡，便下襄阳向洛阳。' },
  { title:'江南逢李龟年', author:'杜甫', dynasty:'唐', content:'岐王宅里寻常见，崔九堂前几度闻。\n正是江南好风景，落花时节又逢君。' },
  { title:'月夜忆舍弟', author:'杜甫', dynasty:'唐', content:'戍鼓断人行，边秋一雁声。\n露从今夜白，月是故乡明。\n有弟皆分散，无家问死生。\n寄书长不达，况乃未休兵。' },
  { title:'客至', author:'杜甫', dynasty:'唐', content:'舍南舍北皆春水，但见群鸥日日来。\n花径不曾缘客扫，蓬门今始为君开。\n盘飧市远无兼味，樽酒家贫只旧醅。\n肯与邻翁相对饮，隔篱呼取尽余杯。' },
  { title:'江畔独步寻花·其六', author:'杜甫', dynasty:'唐', content:'黄四娘家花满蹊，千朵万朵压枝低。\n留连戏蝶时时舞，自在娇莺恰恰啼。' },
  { title:'兵车行', author:'杜甫', dynasty:'唐', content:'车辚辚，马萧萧，行人弓箭各在腰。\n爷娘妻子走相送，尘埃不见咸阳桥。\n牵衣顿足拦道哭，哭声直上干云霄。\n道旁过者问行人，行人但云点行频。\n或从十五北防河，便至四十西营田。\n去时里正与裹头，归来头白还戍边。\n边庭流血成海水，武皇开边意未已。\n君不闻汉家山东二百州，千村万落生荆杞。\n纵有健妇把锄犁，禾生陇亩无东西。\n况复秦兵耐苦战，被驱不异犬与鸡。\n长者虽有问，役夫敢申恨？\n且如今年冬，未休关西卒。\n县官急索租，租税从何出？\n信知生男恶，反是生女好。\n生女犹得嫁比邻，生男埋没随百草。\n君不见青海头，古来白骨无人收。\n新鬼烦冤旧鬼哭，天阴雨湿声啾啾！' },

  // ======== 唐代 — 王维 ========
  { title:'鹿柴', author:'王维', dynasty:'唐', content:'空山不见人，但闻人语响。\n返景入深林，复照青苔上。' },
  { title:'送元二使安西', author:'王维', dynasty:'唐', content:'渭城朝雨浥轻尘，客舍青青柳色新。\n劝君更尽一杯酒，西出阳关无故人。' },
  { title:'九月九日忆山东兄弟', author:'王维', dynasty:'唐', content:'独在异乡为异客，每逢佳节倍思亲。\n遥知兄弟登高处，遍插茱萸少一人。' },
  { title:'相思', author:'王维', dynasty:'唐', content:'红豆生南国，春来发几枝。\n愿君多采撷，此物最相思。' },
  { title:'竹里馆', author:'王维', dynasty:'唐', content:'独坐幽篁里，弹琴复长啸。\n深林人不知，明月来相照。' },
  { title:'山居秋暝', author:'王维', dynasty:'唐', content:'空山新雨后，天气晚来秋。\n明月松间照，清泉石上流。\n竹喧归浣女，莲动下渔舟。\n随意春芳歇，王孙自可留。' },
  { title:'使至塞上', author:'王维', dynasty:'唐', content:'单车欲问边，属国过居延。\n征蓬出汉塞，归雁入胡天。\n大漠孤烟直，长河落日圆。\n萧关逢候骑，都护在燕然。' },
  { title:'鸟鸣涧', author:'王维', dynasty:'唐', content:'人闲桂花落，夜静春山空。\n月出惊山鸟，时鸣春涧中。' },
  { title:'终南别业', author:'王维', dynasty:'唐', content:'中岁颇好道，晚家南山陲。\n兴来每独往，胜事空自知。\n行到水穷处，坐看云起时。\n偶然值林叟，谈笑无还期。' },
  { title:'画', author:'王维', dynasty:'唐', content:'远看山有色，近听水无声。\n春去花还在，人来鸟不惊。' },

  // ======== 唐代 — 白居易 ========
  { title:'赋得古原草送别', author:'白居易', dynasty:'唐', content:'离离原上草，一岁一枯荣。\n野火烧不尽，春风吹又生。\n远芳侵古道，晴翠接荒城。\n又送王孙去，萋萋满别情。' },
  { title:'钱塘湖春行', author:'白居易', dynasty:'唐', content:'孤山寺北贾亭西，水面初平云脚低。\n几处早莺争暖树，谁家新燕啄春泥。\n乱花渐欲迷人眼，浅草才能没马蹄。\n最爱湖东行不足，绿杨阴里白沙堤。' },
  { title:'忆江南·其一', author:'白居易', dynasty:'唐', content:'江南好，风景旧曾谙。\n日出江花红胜火，春来江水绿如蓝。\n能不忆江南？' },
  { title:'琵琶行（节选）', author:'白居易', dynasty:'唐', content:'浔阳江头夜送客，枫叶荻花秋瑟瑟。\n主人下马客在船，举酒欲饮无管弦。\n醉不成欢惨将别，别时茫茫江浸月。\n忽闻水上琵琶声，主人忘归客不发。\n\n大弦嘈嘈如急雨，小弦切切如私语。\n嘈嘈切切错杂弹，大珠小珠落玉盘。\n间关莺语花底滑，幽咽泉流冰下难。\n冰泉冷涩弦凝绝，凝绝不通声暂歇。\n别有幽愁暗恨生，此时无声胜有声。\n银瓶乍破水浆迸，铁骑突出刀枪鸣。\n曲终收拨当心画，四弦一声如裂帛。\n东船西舫悄无言，唯见江心秋月白。\n\n同是天涯沦落人，相逢何必曾相识！' },
  { title:'长恨歌（节选）', author:'白居易', dynasty:'唐', content:'汉皇重色思倾国，御宇多年求不得。\n杨家有女初长成，养在深闺人未识。\n天生丽质难自弃，一朝选在君王侧。\n回眸一笑百媚生，六宫粉黛无颜色。\n\n在天愿作比翼鸟，在地愿为连理枝。\n天长地久有时尽，此恨绵绵无绝期。' },
  { title:'大林寺桃花', author:'白居易', dynasty:'唐', content:'人间四月芳菲尽，山寺桃花始盛开。\n长恨春归无觅处，不知转入此中来。' },
  { title:'暮江吟', author:'白居易', dynasty:'唐', content:'一道残阳铺水中，半江瑟瑟半江红。\n可怜九月初三夜，露似真珠月似弓。' },
  { title:'问刘十九', author:'白居易', dynasty:'唐', content:'绿蚁新醅酒，红泥小火炉。\n晚来天欲雪，能饮一杯无？' },
  { title:'池上', author:'白居易', dynasty:'唐', content:'小娃撑小艇，偷采白莲回。\n不解藏踪迹，浮萍一道开。' },

  // ======== 唐代 — 其他名家 ========
  { title:'春晓', author:'孟浩然', dynasty:'唐', content:'春眠不觉晓，处处闻啼鸟。\n夜来风雨声，花落知多少。' },
  { title:'登鹳雀楼', author:'王之涣', dynasty:'唐', content:'白日依山尽，黄河入海流。\n欲穷千里目，更上一层楼。' },
  { title:'出塞', author:'王昌龄', dynasty:'唐', content:'秦时明月汉时关，万里长征人未还。\n但使龙城飞将在，不教胡马度阴山。' },
  { title:'咏柳', author:'贺知章', dynasty:'唐', content:'碧玉妆成一树高，万条垂下绿丝绦。\n不知细叶谁裁出，二月春风似剪刀。' },
  { title:'枫桥夜泊', author:'张继', dynasty:'唐', content:'月落乌啼霜满天，江枫渔火对愁眠。\n姑苏城外寒山寺，夜半钟声到客船。' },
  { title:'山行', author:'杜牧', dynasty:'唐', content:'远上寒山石径斜，白云生处有人家。\n停车坐爱枫林晚，霜叶红于二月花。' },
  { title:'清明', author:'杜牧', dynasty:'唐', content:'清明时节雨纷纷，路上行人欲断魂。\n借问酒家何处有，牧童遥指杏花村。' },
  { title:'锦瑟', author:'李商隐', dynasty:'唐', content:'锦瑟无端五十弦，一弦一柱思华年。\n庄生晓梦迷蝴蝶，望帝春心托杜鹃。\n沧海月明珠有泪，蓝田日暖玉生烟。\n此情可待成追忆，只是当时已惘然。' },
  { title:'夜雨寄北', author:'李商隐', dynasty:'唐', content:'君问归期未有期，巴山夜雨涨秋池。\n何当共剪西窗烛，却话巴山夜雨时。' },
  { title:'游子吟', author:'孟郊', dynasty:'唐', content:'慈母手中线，游子身上衣。\n临行密密缝，意恐迟迟归。\n谁言寸草心，报得三春晖。' },
  { title:'寻隐者不遇', author:'贾岛', dynasty:'唐', content:'松下问童子，言师采药去。\n只在此山中，云深不知处。' },
  { title:'江雪', author:'柳宗元', dynasty:'唐', content:'千山鸟飞绝，万径人踪灭。\n孤舟蓑笠翁，独钓寒江雪。' },
  { title:'乌衣巷', author:'刘禹锡', dynasty:'唐', content:'朱雀桥边野草花，乌衣巷口夕阳斜。\n旧时王谢堂前燕，飞入寻常百姓家。' },
  { title:'黄鹤楼', author:'崔颢', dynasty:'唐', content:'昔人已乘黄鹤去，此地空余黄鹤楼。\n黄鹤一去不复返，白云千载空悠悠。\n晴川历历汉阳树，芳草萋萋鹦鹉洲。\n日暮乡关何处是？烟波江上使人愁。' },
  { title:'凉州词', author:'王翰', dynasty:'唐', content:'葡萄美酒夜光杯，欲饮琵琶马上催。\n醉卧沙场君莫笑，古来征战几人回？' },
  { title:'别董大', author:'高适', dynasty:'唐', content:'千里黄云白日曛，北风吹雁雪纷纷。\n莫愁前路无知己，天下谁人不识君。' },
  { title:'白雪歌送武判官归京', author:'岑参', dynasty:'唐', content:'北风卷地白草折，胡天八月即飞雪。\n忽如一夜春风来，千树万树梨花开。\n散入珠帘湿罗幕，狐裘不暖锦衾薄。\n将军角弓不得控，都护铁衣冷难着。\n瀚海阑干百丈冰，愁云惨淡万里凝。\n中军置酒饮归客，胡琴琵琶与羌笛。\n纷纷暮雪下辕门，风掣红旗冻不翻。\n轮台东门送君去，去时雪满天山路。\n山回路转不见君，雪上空留马行处。' },
  { title:'望月怀远', author:'张九龄', dynasty:'唐', content:'海上生明月，天涯共此时。\n情人怨遥夜，竟夕起相思。\n灭烛怜光满，披衣觉露滋。\n不堪盈手赠，还寝梦佳期。' },
  { title:'送杜少府之任蜀州', author:'王勃', dynasty:'唐', content:'城阙辅三秦，风烟望五津。\n与君离别意，同是宦游人。\n海内存知己，天涯若比邻。\n无为在歧路，儿女共沾巾。' },
  { title:'登幽州台歌', author:'陈子昂', dynasty:'唐', content:'前不见古人，后不见来者。\n念天地之悠悠，独怆然而涕下。' },
  { title:'滁州西涧', author:'韦应物', dynasty:'唐', content:'独怜幽草涧边生，上有黄鹂深树鸣。\n春潮带雨晚来急，野渡无人舟自横。' },
  { title:'题破山寺后禅院', author:'常建', dynasty:'唐', content:'清晨入古寺，初日照高林。\n曲径通幽处，禅房花木深。\n山光悦鸟性，潭影空人心。\n万籁此都寂，但余钟磬音。' },
  { title:'回乡偶书', author:'贺知章', dynasty:'唐', content:'少小离家老大回，乡音无改鬓毛衰。\n儿童相见不相识，笑问客从何处来。' },
  { title:'芙蓉楼送辛渐', author:'王昌龄', dynasty:'唐', content:'寒雨连江夜入吴，平明送客楚山孤。\n洛阳亲友如相问，一片冰心在玉壶。' },
  { title:'泊秦淮', author:'杜牧', dynasty:'唐', content:'烟笼寒水月笼沙，夜泊秦淮近酒家。\n商女不知亡国恨，隔江犹唱后庭花。' },
  { title:'赤壁', author:'杜牧', dynasty:'唐', content:'折戟沉沙铁未销，自将磨洗认前朝。\n东风不与周郎便，铜雀春深锁二乔。' },
  { title:'无题·相见时难别亦难', author:'李商隐', dynasty:'唐', content:'相见时难别亦难，东风无力百花残。\n春蚕到死丝方尽，蜡炬成灰泪始干。\n晓镜但愁云鬓改，夜吟应觉月光寒。\n蓬山此去无多路，青鸟殷勤为探看。' },
  { title:'酬乐天扬州初逢席上见赠', author:'刘禹锡', dynasty:'唐', content:'巴山楚水凄凉地，二十三年弃置身。\n怀旧空吟闻笛赋，到乡翻似烂柯人。\n沉舟侧畔千帆过，病树前头万木春。\n今日听君歌一曲，暂凭杯酒长精神。' },
  { title:'雁门太守行', author:'李贺', dynasty:'唐', content:'黑云压城城欲摧，甲光向日金鳞开。\n角声满天秋色里，塞上燕脂凝夜紫。\n半卷红旗临易水，霜重鼓寒声不起。\n报君黄金台上意，提携玉龙为君死。' },

  // ======== 南唐 ========
  { title:'虞美人', author:'李煜', dynasty:'南唐', content:'春花秋月何时了？往事知多少。\n小楼昨夜又东风，故国不堪回首月明中。\n雕栏玉砌应犹在，只是朱颜改。\n问君能有几多愁？恰似一江春水向东流。' },
  { title:'相见欢', author:'李煜', dynasty:'南唐', content:'无言独上西楼，月如钩。\n寂寞梧桐深院锁清秋。\n剪不断，理还乱，是离愁。\n别是一般滋味在心头。' },
  { title:'浪淘沙令', author:'李煜', dynasty:'南唐', content:'帘外雨潺潺，春意阑珊。\n罗衾不耐五更寒。\n梦里不知身是客，一晌贪欢。\n独自莫凭栏，无限江山。\n别时容易见时难。\n流水落花春去也，天上人间。' },

  // ======== 宋代 — 苏轼 ========
  { title:'水调歌头·明月几时有', author:'苏轼', dynasty:'宋', content:'明月几时有？把酒问青天。\n不知天上宫阙，今夕是何年。\n我欲乘风归去，又恐琼楼玉宇，高处不胜寒。\n起舞弄清影，何似在人间。\n转朱阁，低绮户，照无眠。\n不应有恨，何事长向别时圆？\n人有悲欢离合，月有阴晴圆缺，此事古难全。\n但愿人长久，千里共婵娟。' },
  { title:'念奴娇·赤壁怀古', author:'苏轼', dynasty:'宋', content:'大江东去，浪淘尽，千古风流人物。\n故垒西边，人道是，三国周郎赤壁。\n乱石穿空，惊涛拍岸，卷起千堆雪。\n江山如画，一时多少豪杰。\n遥想公瑾当年，小乔初嫁了，雄姿英发。\n羽扇纶巾，谈笑间，樯橹灰飞烟灭。\n故国神游，多情应笑我，早生华发。\n人生如梦，一尊还酹江月。' },
  { title:'江城子·密州出猎', author:'苏轼', dynasty:'宋', content:'老夫聊发少年狂，左牵黄，右擎苍。\n锦帽貂裘，千骑卷平冈。\n为报倾城随太守，亲射虎，看孙郎。\n酒酣胸胆尚开张，鬓微霜，又何妨！\n持节云中，何日遣冯唐？\n会挽雕弓如满月，西北望，射天狼。' },
  { title:'江城子·乙卯正月二十日夜记梦', author:'苏轼', dynasty:'宋', content:'十年生死两茫茫，不思量，自难忘。\n千里孤坟，无处话凄凉。\n纵使相逢应不识，尘满面，鬓如霜。\n夜来幽梦忽还乡，小轩窗，正梳妆。\n相顾无言，惟有泪千行。\n料得年年肠断处，明月夜，短松冈。' },
  { title:'定风波', author:'苏轼', dynasty:'宋', content:'莫听穿林打叶声，何妨吟啸且徐行。\n竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。\n料峭春风吹酒醒，微冷，山头斜照却相迎。\n回首向来萧瑟处，归去，也无风雨也无晴。' },
  { title:'蝶恋花·春景', author:'苏轼', dynasty:'宋', content:'花褪残红青杏小。燕子飞时，绿水人家绕。\n枝上柳绵吹又少，天涯何处无芳草。\n墙里秋千墙外道。墙外行人，墙里佳人笑。\n笑渐不闻声渐悄，多情却被无情恼。' },
  { title:'题西林壁', author:'苏轼', dynasty:'宋', content:'横看成岭侧成峰，远近高低各不同。\n不识庐山真面目，只缘身在此山中。' },
  { title:'饮湖上初晴后雨', author:'苏轼', dynasty:'宋', content:'水光潋滟晴方好，山色空蒙雨亦奇。\n欲把西湖比西子，淡妆浓抹总相宜。' },
  { title:'海棠', author:'苏轼', dynasty:'宋', content:'东风袅袅泛崇光，香雾空蒙月转廊。\n只恐夜深花睡去，故烧高烛照红妆。' },

  // ======== 宋代 — 李清照 ========
  { title:'如梦令·常记溪亭日暮', author:'李清照', dynasty:'宋', content:'常记溪亭日暮，沉醉不知归路。\n兴尽晚回舟，误入藕花深处。\n争渡，争渡，惊起一滩鸥鹭。' },
  { title:'声声慢', author:'李清照', dynasty:'宋', content:'寻寻觅觅，冷冷清清，凄凄惨惨戚戚。\n乍暖还寒时候，最难将息。\n三杯两盏淡酒，怎敌他、晚来风急？\n雁过也，正伤心，却是旧时相识。\n满地黄花堆积，憔悴损，如今有谁堪摘？\n守着窗儿，独自怎生得黑？\n梧桐更兼细雨，到黄昏、点点滴滴。\n这次第，怎一个愁字了得！' },
  { title:'一剪梅', author:'李清照', dynasty:'宋', content:'红藕香残玉簟秋。轻解罗裳，独上兰舟。\n云中谁寄锦书来？雁字回时，月满西楼。\n花自飘零水自流。一种相思，两处闲愁。\n此情无计可消除，才下眉头，却上心头。' },
  { title:'武陵春', author:'李清照', dynasty:'宋', content:'风住尘香花已尽，日晚倦梳头。\n物是人非事事休，欲语泪先流。\n闻说双溪春尚好，也拟泛轻舟。\n只恐双溪舴艋舟，载不动许多愁。' },
  { title:'醉花阴', author:'李清照', dynasty:'宋', content:'薄雾浓云愁永昼，瑞脑销金兽。\n佳节又重阳，玉枕纱橱，半夜凉初透。\n东篱把酒黄昏后，有暗香盈袖。\n莫道不销魂，帘卷西风，人比黄花瘦。' },
  { title:'夏日绝句', author:'李清照', dynasty:'宋', content:'生当作人杰，死亦为鬼雄。\n至今思项羽，不肯过江东。' },
  { title:'如梦令·昨夜雨疏风骤', author:'李清照', dynasty:'宋', content:'昨夜雨疏风骤，浓睡不消残酒。\n试问卷帘人，却道海棠依旧。\n知否，知否？应是绿肥红瘦。' },

  // ======== 宋代 — 辛弃疾 ========
  { title:'青玉案·元夕', author:'辛弃疾', dynasty:'宋', content:'东风夜放花千树，更吹落，星如雨。\n宝马雕车香满路。\n凤箫声动，玉壶光转，一夜鱼龙舞。\n蛾儿雪柳黄金缕，笑语盈盈暗香去。\n众里寻他千百度，蓦然回首，那人却在，灯火阑珊处。' },
  { title:'永遇乐·京口北固亭怀古', author:'辛弃疾', dynasty:'宋', content:'千古江山，英雄无觅孙仲谋处。\n舞榭歌台，风流总被雨打风吹去。\n斜阳草树，寻常巷陌，人道寄奴曾住。\n想当年，金戈铁马，气吞万里如虎。\n元嘉草草，封狼居胥，赢得仓皇北顾。\n四十三年，望中犹记，烽火扬州路。\n可堪回首，佛狸祠下，一片神鸦社鼓。\n凭谁问，廉颇老矣，尚能饭否？' },
  { title:'破阵子·为陈同甫赋壮词以寄之', author:'辛弃疾', dynasty:'宋', content:'醉里挑灯看剑，梦回吹角连营。\n八百里分麾下炙，五十弦翻塞外声，沙场秋点兵。\n马作的卢飞快，弓如霹雳弦惊。\n了却君王天下事，赢得生前身后名。可怜白发生！' },
  { title:'丑奴儿·书博山道中壁', author:'辛弃疾', dynasty:'宋', content:'少年不识愁滋味，爱上层楼。\n爱上层楼，为赋新词强说愁。\n而今识尽愁滋味，欲说还休。\n欲说还休，却道天凉好个秋。' },
  { title:'菩萨蛮·书江西造口壁', author:'辛弃疾', dynasty:'宋', content:'郁孤台下清江水，中间多少行人泪。\n西北望长安，可怜无数山。\n青山遮不住，毕竟东流去。\n江晚正愁余，山深闻鹧鸪。' },
  { title:'西江月·夜行黄沙道中', author:'辛弃疾', dynasty:'宋', content:'明月别枝惊鹊，清风半夜鸣蝉。\n稻花香里说丰年，听取蛙声一片。\n七八个星天外，两三点雨山前。\n旧时茅店社林边，路转溪桥忽见。' },
  { title:'南乡子·登京口北固亭有怀', author:'辛弃疾', dynasty:'宋', content:'何处望神州？满眼风光北固楼。\n千古兴亡多少事？悠悠。不尽长江滚滚流。\n年少万兜鍪，坐断东南战未休。\n天下英雄谁敌手？曹刘。生子当如孙仲谋。' },
  { title:'清平乐·村居', author:'辛弃疾', dynasty:'宋', content:'茅檐低小，溪上青青草。\n醉里吴音相媚好，白发谁家翁媪？\n大儿锄豆溪东，中儿正织鸡笼。\n最喜小儿亡赖，溪头卧剥莲蓬。' },

  // ======== 宋代 — 其他名家 ========
  { title:'雨霖铃', author:'柳永', dynasty:'宋', content:'寒蝉凄切，对长亭晚，骤雨初歇。\n都门帐饮无绪，留恋处，兰舟催发。\n执手相看泪眼，竟无语凝噎。\n念去去，千里烟波，暮霭沉沉楚天阔。\n多情自古伤离别，更那堪，冷落清秋节！\n今宵酒醒何处？杨柳岸，晓风残月。\n此去经年，应是良辰好景虚设。\n便纵有千种风情，更与何人说？' },
  { title:'满江红', author:'岳飞', dynasty:'宋', content:'怒发冲冠，凭栏处、潇潇雨歇。\n抬望眼，仰天长啸，壮怀激烈。\n三十功名尘与土，八千里路云和月。\n莫等闲，白了少年头，空悲切。\n靖康耻，犹未雪。臣子恨，何时灭！\n驾长车，踏破贺兰山缺。\n壮志饥餐胡虏肉，笑谈渴饮匈奴血。\n待从头，收拾旧山河，朝天阙。' },
  { title:'钗头凤', author:'陆游', dynasty:'宋', content:'红酥手，黄縢酒，满城春色宫墙柳。\n东风恶，欢情薄。一怀愁绪，几年离索。\n错、错、错。\n春如旧，人空瘦，泪痕红浥鲛绡透。\n桃花落，闲池阁。山盟虽在，锦书难托。\n莫、莫、莫。' },
  { title:'示儿', author:'陆游', dynasty:'宋', content:'死去元知万事空，但悲不见九州同。\n王师北定中原日，家祭无忘告乃翁。' },
  { title:'游山西村', author:'陆游', dynasty:'宋', content:'莫笑农家腊酒浑，丰年留客足鸡豚。\n山重水复疑无路，柳暗花明又一村。\n箫鼓追随春社近，衣冠简朴古风存。\n从今若许闲乘月，拄杖无时夜叩门。' },
  { title:'冬夜读书示子聿', author:'陆游', dynasty:'宋', content:'古人学问无遗力，少壮工夫老始成。\n纸上得来终觉浅，绝知此事要躬行。' },
  { title:'渔家傲·秋思', author:'范仲淹', dynasty:'宋', content:'塞下秋来风景异，衡阳雁去无留意。\n四面边声连角起，千嶂里，长烟落日孤城闭。\n浊酒一杯家万里，燕然未勒归无计。\n羌管悠悠霜满地，人不寐，将军白发征夫泪。' },
  { title:'浣溪沙·一曲新词酒一杯', author:'晏殊', dynasty:'宋', content:'一曲新词酒一杯，去年天气旧亭台。\n夕阳西下几时回？\n无可奈何花落去，似曾相识燕归来。\n小园香径独徘徊。' },
  { title:'蝶恋花·庭院深深深几许', author:'欧阳修', dynasty:'宋', content:'庭院深深深几许，杨柳堆烟，帘幕无重数。\n玉勒雕鞍游冶处，楼高不见章台路。\n雨横风狂三月暮，门掩黄昏，无计留春住。\n泪眼问花花不语，乱红飞过秋千去。' },
  { title:'鹊桥仙', author:'秦观', dynasty:'宋', content:'纤云弄巧，飞星传恨，银汉迢迢暗度。\n金风玉露一相逢，便胜却人间无数。\n柔情似水，佳期如梦，忍顾鹊桥归路。\n两情若是久长时，又岂在朝朝暮暮。' },
  { title:'苏幕遮', author:'周邦彦', dynasty:'宋', content:'燎沉香，消溽暑。鸟雀呼晴，侵晓窥檐语。\n叶上初阳干宿雨，水面清圆，一一风荷举。\n故乡遥，何日去？家住吴门，久作长安旅。\n五月渔郎相忆否？小楫轻舟，梦入芙蓉浦。' },
  { title:'泊船瓜洲', author:'王安石', dynasty:'宋', content:'京口瓜洲一水间，钟山只隔数重山。\n春风又绿江南岸，明月何时照我还？' },
  { title:'小池', author:'杨万里', dynasty:'宋', content:'泉眼无声惜细流，树阴照水爱晴柔。\n小荷才露尖尖角，早有蜻蜓立上头。' },
  { title:'春日', author:'朱熹', dynasty:'宋', content:'胜日寻芳泗水滨，无边光景一时新。\n等闲识得东风面，万紫千红总是春。' },
  { title:'游园不值', author:'叶绍翁', dynasty:'宋', content:'应怜屐齿印苍苔，小扣柴扉久不开。\n春色满园关不住，一枝红杏出墙来。' },
  { title:'题临安邸', author:'林升', dynasty:'宋', content:'山外青山楼外楼，西湖歌舞几时休？\n暖风熏得游人醉，直把杭州作汴州。' },
  { title:'过零丁洋', author:'文天祥', dynasty:'宋', content:'辛苦遭逢起一经，干戈寥落四周星。\n山河破碎风飘絮，身世浮沉雨打萍。\n惶恐滩头说惶恐，零丁洋里叹零丁。\n人生自古谁无死？留取丹心照汗青。' },
  { title:'虞美人·听雨', author:'蒋捷', dynasty:'宋', content:'少年听雨歌楼上，红烛昏罗帐。\n壮年听雨客舟中，江阔云低，断雁叫西风。\n而今听雨僧庐下，鬓已星星也。\n悲欢离合总无情，一任阶前，点滴到天明。' },
  { title:'扬州慢', author:'姜夔', dynasty:'宋', content:'淮左名都，竹西佳处，解鞍少驻初程。\n过春风十里，尽荠麦青青。\n自胡马窥江去后，废池乔木，犹厌言兵。\n渐黄昏，清角吹寒，都在空城。\n杜郎俊赏，算而今、重到须惊。\n纵豆蔻词工，青楼梦好，难赋深情。\n二十四桥仍在，波心荡、冷月无声。\n念桥边红药，年年知为谁生？' },
  { title:'卜算子·咏梅', author:'陆游', dynasty:'宋', content:'驿外断桥边，寂寞开无主。\n已是黄昏独自愁，更著风和雨。\n无意苦争春，一任群芳妒。\n零落成泥碾作尘，只有香如故。' },
  { title:'临江仙', author:'晏几道', dynasty:'宋', content:'梦后楼台高锁，酒醒帘幕低垂。\n去年春恨却来时。\n落花人独立，微雨燕双飞。\n记得小蘋初见，两重心字罗衣。\n琵琶弦上说相思。\n当时明月在，曾照彩云归。' },
  { title:'梅花', author:'王安石', dynasty:'宋', content:'墙角数枝梅，凌寒独自开。\n遥知不是雪，为有暗香来。' },
  { title:'晓出净慈寺送林子方', author:'杨万里', dynasty:'宋', content:'毕竟西湖六月中，风光不与四时同。\n接天莲叶无穷碧，映日荷花别样红。' },
  { title:'观书有感', author:'朱熹', dynasty:'宋', content:'半亩方塘一鉴开，天光云影共徘徊。\n问渠那得清如许？为有源头活水来。' },

  // ======== 元曲 ========
  { title:'天净沙·秋思', author:'马致远', dynasty:'元', content:'枯藤老树昏鸦，小桥流水人家，古道西风瘦马。\n夕阳西下，断肠人在天涯。' },
  { title:'山坡羊·潼关怀古', author:'张养浩', dynasty:'元', content:'峰峦如聚，波涛如怒，山河表里潼关路。\n望西都，意踌躇。\n伤心秦汉经行处，宫阙万间都做了土。\n兴，百姓苦；亡，百姓苦。' },
  { title:'天净沙·秋', author:'白朴', dynasty:'元', content:'孤村落日残霞，轻烟老树寒鸦，一点飞鸿影下。\n青山绿水，白草红叶黄花。' },
  { title:'墨梅', author:'王冕', dynasty:'元', content:'吾家洗砚池头树，朵朵花开淡墨痕。\n不要人夸好颜色，只留清气满乾坤。' },

  // ======== 明代 ========
  { title:'石灰吟', author:'于谦', dynasty:'明', content:'千锤万凿出深山，烈火焚烧若等闲。\n粉骨碎身浑不怕，要留清白在人间。' },
  { title:'临江仙·滚滚长江东逝水', author:'杨慎', dynasty:'明', content:'滚滚长江东逝水，浪花淘尽英雄。\n是非成败转头空。\n青山依旧在，几度夕阳红。\n白发渔樵江渚上，惯看秋月春风。\n一壶浊酒喜相逢。\n古今多少事，都付笑谈中。' },
  { title:'就义诗', author:'杨继盛', dynasty:'明', content:'浩气还太虚，丹心照千古。\n生平未报国，留作忠魂补。' },
  { title:'明日歌', author:'钱福', dynasty:'明', content:'明日复明日，明日何其多。\n我生待明日，万事成蹉跎。\n世人苦被明日累，春去秋来老将至。\n朝看水东流，暮看日西坠。\n百年明日能几何？请君听我明日歌。' },
  { title:'桃花庵歌', author:'唐寅', dynasty:'明', content:'桃花坞里桃花庵，桃花庵下桃花仙。\n桃花仙人种桃树，又摘桃花换酒钱。\n酒醒只在花前坐，酒醉还来花下眠。\n半醒半醉日复日，花落花开年复年。\n但愿老死花酒间，不愿鞠躬车马前。\n车尘马足富者趣，酒盏花枝贫者缘。\n若将富贵比贫贱，一在平地一在天。\n若将贫贱比车马，他得驱驰我得闲。\n别人笑我太疯癫，我笑他人看不穿。\n不见五陵豪杰墓，无花无酒锄作田。' },

  // ======== 清代 ========
  { title:'长相思', author:'纳兰性德', dynasty:'清', content:'山一程，水一程，身向榆关那畔行，夜深千帐灯。\n风一更，雪一更，聒碎乡心梦不成，故园无此声。' },
  { title:'木兰词·拟古决绝词柬友', author:'纳兰性德', dynasty:'清', content:'人生若只如初见，何事秋风悲画扇。\n等闲变却故人心，却道故人心易变。\n骊山语罢清宵半，泪雨霖铃终不怨。\n何如薄幸锦衣郎，比翼连枝当日愿。' },
  { title:'竹石', author:'郑燮', dynasty:'清', content:'咬定青山不放松，立根原在破岩中。\n千磨万击还坚劲，任尔东西南北风。' },
  { title:'己亥杂诗·其五', author:'龚自珍', dynasty:'清', content:'浩荡离愁白日斜，吟鞭东指即天涯。\n落红不是无情物，化作春泥更护花。' },

  // ======== 近现代诗词经典 ========
  { title:'沁园春·雪', author:'毛泽东', dynasty:'近现代', content:'北国风光，千里冰封，万里雪飘。\n望长城内外，惟余莽莽；大河上下，顿失滔滔。\n山舞银蛇，原驰蜡象，欲与天公试比高。\n须晴日，看红装素裹，分外妖娆。\n江山如此多娇，引无数英雄竞折腰。\n惜秦皇汉武，略输文采；唐宗宋祖，稍逊风骚。\n一代天骄，成吉思汗，只识弯弓射大雕。\n俱往矣，数风流人物，还看今朝。' },
  { title:'沁园春·长沙', author:'毛泽东', dynasty:'近现代', content:'独立寒秋，湘江北去，橘子洲头。\n看万山红遍，层林尽染；漫江碧透，百舸争流。\n鹰击长空，鱼翔浅底，万类霜天竞自由。\n怅寥廓，问苍茫大地，谁主沉浮？\n携来百侣曾游，忆往昔峥嵘岁月稠。\n恰同学少年，风华正茂；书生意气，挥斥方遒。\n指点江山，激扬文字，粪土当年万户侯。\n曾记否，到中流击水，浪遏飞舟？' },
  { title:'再别康桥', author:'徐志摩', dynasty:'近现代', content:'轻轻的我走了，正如我轻轻的来；\n我轻轻的招手，作别西天的云彩。\n那河畔的金柳，是夕阳中的新娘；\n波光里的艳影，在我的心头荡漾。\n软泥上的青荇，油油的在水底招摇；\n在康河的柔波里，我甘心做一条水草。\n那榆荫下的一潭，不是清泉，是天上虹；\n揉碎在浮藻间，沉淀着彩虹似的梦。\n寻梦？撑一支长篙，向青草更青处漫溯；\n满载一船星辉，在星辉斑斓里放歌。\n但我不能放歌，悄悄是别离的笙箫；\n夏虫也为我沉默，沉默是今晚的康桥。\n悄悄的我走了，正如我悄悄的来；\n我挥一挥衣袖，不带走一片云彩。' },
  { title:'断章', author:'卞之琳', dynasty:'近现代', content:'你站在桥上看风景，\n看风景的人在楼上看你。\n明月装饰了你的窗子，\n你装饰了别人的梦。' },
  { title:'乡愁', author:'余光中', dynasty:'近现代', content:'小时候，乡愁是一枚小小的邮票，\n我在这头，母亲在那头。\n长大后，乡愁是一张窄窄的船票，\n我在这头，新娘在那头。\n后来啊，乡愁是一方矮矮的坟墓，\n我在外头，母亲在里头。\n而现在，乡愁是一湾浅浅的海峡，\n我在这头，大陆在那头。' },
  { title:'面朝大海，春暖花开', author:'海子', dynasty:'近现代', content:'从明天起，做一个幸福的人\n喂马，劈柴，周游世界\n从明天起，关心粮食和蔬菜\n我有一所房子，面朝大海，春暖花开\n从明天起，和每一个亲人通信\n告诉他们我的幸福\n那幸福的闪电告诉我的\n我将告诉每一个人\n给每一条河每一座山取一个温暖的名字\n陌生人，我也为你祝福\n愿你有一个灿烂的前程\n愿你有情人终成眷属\n愿你在尘世获得幸福\n我只愿面朝大海，春暖花开。' },
  { title:'错误', author:'郑愁予', dynasty:'近现代', content:'我打江南走过\n那等在季节里的容颜如莲花的开落\n东风不来，三月的柳絮不飞\n你的心如小小的寂寞的城\n恰若青石的街道向晚\n跫音不响，三月的春帷不揭\n你的心是小小的窗扉紧掩\n我达达的马蹄是美丽的错误\n我不是归人，是个过客。' },
  { title:'一棵开花的树', author:'席慕容', dynasty:'近现代', content:'如何让你遇见我\n在我最美丽的时刻\n为这\n我已在佛前求了五百年\n求佛让我们结一段尘缘\n佛于是把我化作一棵树\n长在你必经的路旁\n阳光下\n慎重地开满了花\n朵朵都是我前世的盼望\n当你走近\n请你细听\n那颤抖的叶\n是我等待的热情\n而当你终于无视地走过\n在你身后落了一地的\n朋友啊\n那不是花瓣\n是我凋零的心。' },
  { title:'回答', author:'北岛', dynasty:'近现代', content:'卑鄙是卑鄙者的通行证，\n高尚是高尚者的墓志铭。\n看吧，在那镀金的天空中，\n飘满了死者弯曲的倒影。\n冰川纪过去了，\n为什么到处都是冰凌？\n好望角发现了，\n为什么死海里千帆相竞？\n我来到这个世界上，\n只带着纸、绳索和身影。\n为了在审判之前，\n宣读那些被判决的声音：\n告诉你吧，世界，\n我——不——相——信！' },

  // ======== 补遗 — 唐诗 ========
  { title:'次北固山下', author:'王湾', dynasty:'唐', content:'客路青山外，行舟绿水前。\n潮平两岸阔，风正一帆悬。\n海日生残夜，江春入旧年。\n乡书何处达？归雁洛阳边。' },
  { title:'早春呈水部张十八员外', author:'韩愈', dynasty:'唐', content:'天街小雨润如酥，草色遥看近却无。\n最是一年春好处，绝胜烟柳满皇都。' },
  { title:'逢雪宿芙蓉山主人', author:'刘长卿', dynasty:'唐', content:'日暮苍山远，天寒白屋贫。\n柴门闻犬吠，风雪夜归人。' },
  { title:'渔歌子', author:'张志和', dynasty:'唐', content:'西塞山前白鹭飞，桃花流水鳜鱼肥。\n青箬笠，绿蓑衣，斜风细雨不须归。' },
  { title:'塞下曲·其二', author:'卢纶', dynasty:'唐', content:'林暗草惊风，将军夜引弓。\n平明寻白羽，没在石棱中。' },
  { title:'闻王昌龄左迁龙标遥有此寄', author:'李白', dynasty:'唐', content:'杨花落尽子规啼，闻道龙标过五溪。\n我寄愁心与明月，随君直到夜郎西。' },
  { title:'赠花卿', author:'杜甫', dynasty:'唐', content:'锦城丝管日纷纷，半入江风半入云。\n此曲只应天上有，人间能得几回闻。' },
  { title:'江南春', author:'杜牧', dynasty:'唐', content:'千里莺啼绿映红，水村山郭酒旗风。\n南朝四百八十寺，多少楼台烟雨中。' },
  { title:'乐游原', author:'李商隐', dynasty:'唐', content:'向晚意不适，驱车登古原。\n夕阳无限好，只是近黄昏。' },
  { title:'凉州词·其一', author:'王之涣', dynasty:'唐', content:'黄河远上白云间，一片孤城万仞山。\n羌笛何须怨杨柳，春风不度玉门关。' },

  // ======== 补遗 — 宋词 ========
  { title:'四时田园杂兴·其二十五', author:'范成大', dynasty:'宋', content:'梅子金黄杏子肥，麦花雪白菜花稀。\n日长篱落无人过，惟有蜻蜓蛱蝶飞。' },
  { title:'山园小梅', author:'林逋', dynasty:'宋', content:'众芳摇落独暄妍，占尽风情向小园。\n疏影横斜水清浅，暗香浮动月黄昏。\n霜禽欲下先偷眼，粉蝶如知合断魂。\n幸有微吟可相狎，不须檀板共金樽。' },
  { title:'惠崇春江晚景', author:'苏轼', dynasty:'宋', content:'竹外桃花三两枝，春江水暖鸭先知。\n蒌蒿满地芦芽短，正是河豚欲上时。' },
  { title:'十一月四日风雨大作', author:'陆游', dynasty:'宋', content:'僵卧孤村不自哀，尚思为国戍轮台。\n夜阑卧听风吹雨，铁马冰河入梦来。' },
  { title:'元日', author:'王安石', dynasty:'宋', content:'爆竹声中一岁除，春风送暖入屠苏。\n千门万户曈曈日，总把新桃换旧符。' },
  { title:'春日偶成', author:'程颢', dynasty:'宋', content:'云淡风轻近午天，傍花随柳过前川。\n时人不识余心乐，将谓偷闲学少年。' },
  { title:'点绛唇·蹴罢秋千', author:'李清照', dynasty:'宋', content:'蹴罢秋千，起来慵整纤纤手。\n露浓花瘦，薄汗轻衣透。\n见客入来，袜刬金钗溜。\n和羞走，倚门回首，却把青梅嗅。' },
  { title:'浣溪沙·游蕲水清泉寺', author:'苏轼', dynasty:'宋', content:'山下兰芽短浸溪，松间沙路净无泥，萧萧暮雨子规啼。\n谁道人生无再少？门前流水尚能西！休将白发唱黄鸡。' },

  // ======== 补遗 — 元明清及近现代 ========
  { title:'寿阳曲·潇湘夜雨', author:'马致远', dynasty:'元', content:'渔灯暗，客梦回，一声声滴人心碎。\n孤舟五更家万里，是离人几行情泪。' },
  { title:'画鸡', author:'唐寅', dynasty:'明', content:'头上红冠不用裁，满身雪白走将来。\n平生不敢轻言语，一叫千门万户开。' },
  { title:'所见', author:'袁枚', dynasty:'清', content:'牧童骑黄牛，歌声振林樾。\n意欲捕鸣蝉，忽然闭口立。' },
  { title:'村居', author:'高鼎', dynasty:'清', content:'草长莺飞二月天，拂堤杨柳醉春烟。\n儿童散学归来早，忙趁东风放纸鸢。' },
  { title:'舟夜书所见', author:'查慎行', dynasty:'清', content:'月黑见渔灯，孤光一点萤。\n微微风簇浪，散作满河星。' },
  { title:'己亥杂诗·其一百二十五', author:'龚自珍', dynasty:'清', content:'九州生气恃风雷，万马齐喑究可哀。\n我劝天公重抖擞，不拘一格降人才。' },
  { title:'偶然', author:'徐志摩', dynasty:'近现代', content:'我是天空里的一片云，\n偶尔投影在你的波心——\n你不必讶异，更无须欢喜——\n在转瞬间消灭了踪影。\n你我相逢在黑夜的海上，\n你有你的，我有我的，方向；\n你记得也好，最好你忘掉，\n在这交会时互放的光亮！' },
  { title:'我爱这土地', author:'艾青', dynasty:'近现代', content:'假如我是一只鸟，\n我也应该用嘶哑的喉咙歌唱：\n这被暴风雨所打击着的土地，\n这永远汹涌着我们的悲愤的河流，\n这无止息地吹刮着的激怒的风，\n和那来自林间的无比温柔的黎明……\n——然后我死了，\n连羽毛也腐烂在土地里面。\n为什么我的眼里常含泪水？\n因为我对这土地爱得深沉……' },

  // ======== 扩编 — 唐诗三百首补遗 ========
  { title:'登太白峰', author:'李白', dynasty:'唐', content:'西上太白峰，夕阳穷登攀。\n太白与我语，为我开天关。\n愿乘泠风去，直出浮云间。\n举手可近月，前行若无山。\n一别咸阳去，何时复更还？' },
  { title:'秋浦歌·其十五', author:'李白', dynasty:'唐', content:'白发三千丈，缘愁似个长。\n不知明镜里，何处得秋霜。' },
  { title:'峨眉山月歌', author:'李白', dynasty:'唐', content:'峨眉山月半轮秋，影入平羌江水流。\n夜发清溪向三峡，思君不见下渝州。' },
  { title:'渡荆门送别', author:'李白', dynasty:'唐', content:'渡远荆门外，来从楚国游。\n山随平野尽，江入大荒流。\n月下飞天镜，云生结海楼。\n仍怜故乡水，万里送行舟。' },
  { title:'春思', author:'李白', dynasty:'唐', content:'燕草如碧丝，秦桑低绿枝。\n当君怀归日，是妾断肠时。\n春风不相识，何事入罗帏？' },
  { title:'子夜吴歌·秋歌', author:'李白', dynasty:'唐', content:'长安一片月，万户捣衣声。\n秋风吹不尽，总是玉关情。\n何日平胡虏，良人罢远征？' },
  { title:'长相思·其一', author:'李白', dynasty:'唐', content:'长相思，在长安。\n络纬秋啼金井阑，微霜凄凄簟色寒。\n孤灯不明思欲绝，卷帷望月空长叹。\n美人如花隔云端。\n上有青冥之长天，下有渌水之波澜。\n天长路远魂飞苦，梦魂不到关山难。\n长相思，摧心肝。' },
  { title:'玉阶怨', author:'李白', dynasty:'唐', content:'玉阶生白露，夜久侵罗袜。\n却下水晶帘，玲珑望秋月。' },
  { title:'山中与幽人对酌', author:'李白', dynasty:'唐', content:'两人对酌山花开，一杯一杯复一杯。\n我醉欲眠卿且去，明朝有意抱琴来。' },
  { title:'客中行', author:'李白', dynasty:'唐', content:'兰陵美酒郁金香，玉碗盛来琥珀光。\n但使主人能醉客，不知何处是他乡。' },
  { title:'清平调·其一', author:'李白', dynasty:'唐', content:'云想衣裳花想容，春风拂槛露华浓。\n若非群玉山头见，会向瑶台月下逢。' },
  { title:'清平调·其二', author:'李白', dynasty:'唐', content:'一枝红艳露凝香，云雨巫山枉断肠。\n借问汉宫谁得似，可怜飞燕倚新妆。' },
  { title:'清平调·其三', author:'李白', dynasty:'唐', content:'名花倾国两相欢，长得君王带笑看。\n解释春风无限恨，沉香亭北倚阑干。' },
  { title:'前出塞·其六', author:'杜甫', dynasty:'唐', content:'挽弓当挽强，用箭当用长。\n射人先射马，擒贼先擒王。\n杀人亦有限，列国自有疆。\n苟能制侵陵，岂在多杀伤。' },
  { title:'八阵图', author:'杜甫', dynasty:'唐', content:'功盖三分国，名成八阵图。\n江流石不转，遗恨失吞吴。' },
  { title:'曲江·其二', author:'杜甫', dynasty:'唐', content:'朝回日日典春衣，每日江头尽醉归。\n酒债寻常行处有，人生七十古来稀。\n穿花蛱蝶深深见，点水蜻蜓款款飞。\n传语风光共流转，暂时相赏莫相违。' },
  { title:'登楼', author:'杜甫', dynasty:'唐', content:'花近高楼伤客心，万方多难此登临。\n锦江春色来天地，玉垒浮云变古今。\n北极朝廷终不改，西山寇盗莫相侵。\n可怜后主还祠庙，日暮聊为梁甫吟。' },
  { title:'阁夜', author:'杜甫', dynasty:'唐', content:'岁暮阴阳催短景，天涯霜雪霁寒宵。\n五更鼓角声悲壮，三峡星河影动摇。\n野哭千家闻战伐，夷歌数处起渔樵。\n卧龙跃马终黄土，人事音书漫寂寥。' },
  { title:'咏怀古迹·其三', author:'杜甫', dynasty:'唐', content:'群山万壑赴荆门，生长明妃尚有村。\n一去紫台连朔漠，独留青冢向黄昏。\n画图省识春风面，环佩空归夜月魂。\n千载琵琶作胡语，分明怨恨曲中论。' },
  { title:'野望', author:'杜甫', dynasty:'唐', content:'西山白雪三城戍，南浦清江万里桥。\n海内风尘诸弟隔，天涯涕泪一身遥。\n惟将迟暮供多病，未有涓埃答圣朝。\n跨马出郊时极目，不堪人事日萧条。' },
  { title:'春宿左省', author:'杜甫', dynasty:'唐', content:'花隐掖垣暮，啾啾栖鸟过。\n星临万户动，月傍九霄多。\n不寝听金钥，因风想玉珂。\n明朝有封事，数问夜如何。' },
  { title:'天末怀李白', author:'杜甫', dynasty:'唐', content:'凉风起天末，君子意如何。\n鸿雁几时到，江湖秋水多。\n文章憎命达，魑魅喜人过。\n应共冤魂语，投诗赠汨罗。' },
  { title:'月夜', author:'杜甫', dynasty:'唐', content:'今夜鄜州月，闺中只独看。\n遥怜小儿女，未解忆长安。\n香雾云鬟湿，清辉玉臂寒。\n何时倚虚幌，双照泪痕干。' },
  { title:'赠卫八处士', author:'杜甫', dynasty:'唐', content:'人生不相见，动如参与商。\n今夕复何夕，共此灯烛光。\n少壮能几时，鬓发各已苍。\n访旧半为鬼，惊呼热中肠。\n焉知二十载，重上君子堂。\n昔别君未婚，儿女忽成行。\n怡然敬父执，问我来何方。\n问答乃未已，驱儿罗酒浆。\n夜雨剪春韭，新炊间黄粱。\n主称会面难，一举累十觞。\n十觞亦不醉，感子故意长。\n明日隔山岳，世事两茫茫。' },
  { title:'渭川田家', author:'王维', dynasty:'唐', content:'斜阳照墟落，穷巷牛羊归。\n野老念牧童，倚杖候荆扉。\n雉雊麦苗秀，蚕眠桑叶稀。\n田夫荷锄至，相见语依依。\n即此羡闲逸，怅然吟式微。' },
  { title:'山中', author:'王维', dynasty:'唐', content:'荆溪白石出，天寒红叶稀。\n山路元无雨，空翠湿人衣。' },
  { title:'送别', author:'王维', dynasty:'唐', content:'山中相送罢，日暮掩柴扉。\n春草明年绿，王孙归不归？' },
  { title:'辋川闲居赠裴秀才迪', author:'王维', dynasty:'唐', content:'寒山转苍翠，秋水日潺湲。\n倚杖柴门外，临风听暮蝉。\n渡头余落日，墟里上孤烟。\n复值接舆醉，狂歌五柳前。' },
  { title:'汉江临眺', author:'王维', dynasty:'唐', content:'楚塞三湘接，荆门九派通。\n江流天地外，山色有无中。\n郡邑浮前浦，波澜动远空。\n襄阳好风日，留醉与山翁。' },
  { title:'观猎', author:'王维', dynasty:'唐', content:'风劲角弓鸣，将军猎渭城。\n草枯鹰眼疾，雪尽马蹄轻。\n忽过新丰市，还归细柳营。\n回看射雕处，千里暮云平。' },
  { title:'过故人庄', author:'孟浩然', dynasty:'唐', content:'故人具鸡黍，邀我至田家。\n绿树村边合，青山郭外斜。\n开轩面场圃，把酒话桑麻。\n待到重阳日，还来就菊花。' },
  { title:'宿建德江', author:'孟浩然', dynasty:'唐', content:'移舟泊烟渚，日暮客愁新。\n野旷天低树，江清月近人。' },
  { title:'望洞庭湖赠张丞相', author:'孟浩然', dynasty:'唐', content:'八月湖水平，涵虚混太清。\n气蒸云梦泽，波撼岳阳城。\n欲济无舟楫，端居耻圣明。\n坐观垂钓者，徒有羡鱼情。' },
  { title:'岁暮归南山', author:'孟浩然', dynasty:'唐', content:'北阙休上书，南山归敝庐。\n不才明主弃，多病故人疏。\n白发催年老，青阳逼岁除。\n永怀愁不寐，松月夜窗虚。' },
  { title:'早寒有怀', author:'孟浩然', dynasty:'唐', content:'木落雁南度，北风江上寒。\n我家襄水上，遥隔楚云端。\n乡泪客中尽，孤帆天际看。\n迷津欲有问，平海夕漫漫。' },
  { title:'与诸子登岘山', author:'孟浩然', dynasty:'唐', content:'人事有代谢，往来成古今。\n江山留胜迹，我辈复登临。\n水落鱼梁浅，天寒梦泽深。\n羊公碑尚在，读罢泪沾襟。' },
  { title:'观刈麦', author:'白居易', dynasty:'唐', content:'田家少闲月，五月人倍忙。\n夜来南风起，小麦覆陇黄。\n妇姑荷箪食，童稚携壶浆。\n相随饷田去，丁壮在南冈。\n足蒸暑土气，背灼炎天光。\n力尽不知热，但惜夏日长。\n复有贫妇人，抱子在其旁。\n右手秉遗穗，左臂悬敝筐。\n听其相顾言，闻者为悲伤。\n家田输税尽，拾此充饥肠。\n今我何功德，曾不事农桑。\n吏禄三百石，岁晏有余粮。\n念此私自愧，尽日不能忘。' },
  { title:'卖炭翁', author:'白居易', dynasty:'唐', content:'卖炭翁，伐薪烧炭南山中。\n满面尘灰烟火色，两鬓苍苍十指黑。\n卖炭得钱何所营？身上衣裳口中食。\n可怜身上衣正单，心忧炭贱愿天寒。\n夜来城外一尺雪，晓驾炭车辗冰辙。\n牛困人饥日已高，市南门外泥中歇。\n翩翩两骑来是谁？黄衣使者白衫儿。\n手把文书口称敕，回车叱牛牵向北。\n一车炭，千余斤，宫使驱将惜不得。\n半匹红纱一丈绫，系向牛头充炭直。' },
  { title:'村夜', author:'白居易', dynasty:'唐', content:'霜草苍苍虫切切，村南村北行人绝。\n独出门前望野田，月明荞麦花如雪。' },
  { title:'邯郸冬至夜思家', author:'白居易', dynasty:'唐', content:'邯郸驿里逢冬至，抱膝灯前影伴身。\n想得家中夜深坐，还应说著远行人。' },
  { title:'夜雪', author:'白居易', dynasty:'唐', content:'已讶衾枕冷，复见窗户明。\n夜深知雪重，时闻折竹声。' },
  { title:'花非花', author:'白居易', dynasty:'唐', content:'花非花，雾非雾。\n夜半来，天明去。\n来如春梦几多时？\n去似朝云无觅处。' },
  { title:'赠别·其二', author:'杜牧', dynasty:'唐', content:'多情却似总无情，唯觉樽前笑不成。\n蜡烛有心还惜别，替人垂泪到天明。' },
  { title:'过华清宫', author:'杜牧', dynasty:'唐', content:'长安回望绣成堆，山顶千门次第开。\n一骑红尘妃子笑，无人知是荔枝来。' },
  { title:'金谷园', author:'杜牧', dynasty:'唐', content:'繁华事散逐香尘，流水无情草自春。\n日暮东风怨啼鸟，落花犹似坠楼人。' },
  { title:'寄扬州韩绰判官', author:'杜牧', dynasty:'唐', content:'青山隐隐水迢迢，秋尽江南草未凋。\n二十四桥明月夜，玉人何处教吹箫？' },
  { title:'嫦娥', author:'李商隐', dynasty:'唐', content:'云母屏风烛影深，长河渐落晓星沉。\n嫦娥应悔偷灵药，碧海青天夜夜心。' },
  { title:'贾生', author:'李商隐', dynasty:'唐', content:'宣室求贤访逐臣，贾生才调更无伦。\n可怜夜半虚前席，不问苍生问鬼神。' },
  { title:'霜月', author:'李商隐', dynasty:'唐', content:'初闻征雁已无蝉，百尺楼高水接天。\n青女素娥俱耐冷，月中霜里斗婵娟。' },
  { title:'隋宫', author:'李商隐', dynasty:'唐', content:'乘兴南游不戒严，九重谁省谏书函。\n春风举国裁宫锦，半作障泥半作帆。' },
  { title:'为有', author:'李商隐', dynasty:'唐', content:'为有云屏无限娇，凤城寒尽怕春宵。\n无端嫁得金龟婿，辜负香衾事早朝。' },
  { title:'瑶池', author:'李商隐', dynasty:'唐', content:'瑶池阿母绮窗开，黄竹歌声动地哀。\n八骏日行三万里，穆王何事不重来？' },
  { title:'送友人', author:'李白', dynasty:'唐', content:'青山横北郭，白水绕东城。\n此地一为别，孤蓬万里征。\n浮云游子意，落日故人情。\n挥手自兹去，萧萧班马鸣。' },
  { title:'听蜀僧濬弹琴', author:'李白', dynasty:'唐', content:'蜀僧抱绿绮，西下峨眉峰。\n为我一挥手，如听万壑松。\n客心洗流水，余响入霜钟。\n不觉碧山暮，秋云暗几重。' },
  { title:'夜泊牛渚怀古', author:'李白', dynasty:'唐', content:'牛渚西江夜，青天无片云。\n登舟望秋月，空忆谢将军。\n余亦能高咏，斯人不可闻。\n明朝挂帆席，枫叶落纷纷。' },
  { title:'塞下曲·其一', author:'王昌龄', dynasty:'唐', content:'蝉鸣空桑林，八月萧关道。\n出塞入塞寒，处处黄芦草。\n从来幽并客，皆共尘沙老。\n莫学游侠儿，矜夸紫骝好。' },
  { title:'塞下曲·其二', author:'王昌龄', dynasty:'唐', content:'饮马渡秋水，水寒风似刀。\n平沙日未没，黯黯见临洮。\n昔日长城战，咸言意气高。\n黄尘足今古，白骨乱蓬蒿。' },
  { title:'长信怨', author:'王昌龄', dynasty:'唐', content:'奉帚平明金殿开，暂将团扇共徘徊。\n玉颜不及寒鸦色，犹带昭阳日影来。' },
  { title:'春泛若耶溪', author:'綦毋潜', dynasty:'唐', content:'幽意无断绝，此去随所偶。\n晚风吹行舟，花路入溪口。\n际夜转西壑，隔山望南斗。\n潭烟飞溶溶，林月低向后。\n生事且弥漫，愿为持竿叟。' },
  { title:'宿王昌龄隐居', author:'常建', dynasty:'唐', content:'清溪深不测，隐处唯孤云。\n松际露微月，清光犹为君。\n茅亭宿花影，药院滋苔纹。\n余亦谢时去，西山鸾鹤群。' },
  { title:'秋登兰山寄张五', author:'孟浩然', dynasty:'唐', content:'北山白云里，隐者自怡悦。\n相望试登高，心随雁飞灭。\n愁因薄暮起，兴是清秋发。\n时见归村人，沙行渡头歇。\n天边树若荠，江畔洲如月。\n何当载酒来，共醉重阳节。' },
  { title:'夏日南亭怀辛大', author:'孟浩然', dynasty:'唐', content:'山光忽西落，池月渐东上。\n散发乘夕凉，开轩卧闲敞。\n荷风送香气，竹露滴清响。\n欲取鸣琴弹，恨无知音赏。\n感此怀故人，中宵劳梦想。' },
  { title:'初发扬子寄元大校书', author:'韦应物', dynasty:'唐', content:'凄凄去亲爱，泛泛入烟雾。\n归棹洛阳人，残钟广陵树。\n今朝此为别，何处还相遇。\n世事波上舟，沿洄安得住。' },
  { title:'寄全椒山中道士', author:'韦应物', dynasty:'唐', content:'今朝郡斋冷，忽念山中客。\n涧底束荆薪，归来煮白石。\n欲持一瓢酒，远慰风雨夕。\n落叶满空山，何处寻行迹。' },
  { title:'长安遇冯著', author:'韦应物', dynasty:'唐', content:'客从东方来，衣上灞陵雨。\n问客何为来，采山因买斧。\n冥冥花正开，飏飏燕新乳。\n昨别今已春，鬓丝生几缕。' },
  { title:'夕次盱眙县', author:'韦应物', dynasty:'唐', content:'落帆逗淮镇，停舫临孤驿。\n浩浩风起波，冥冥日沉夕。\n人归山郭暗，雁下芦洲白。\n独夜忆秦关，听钟未眠客。' },
  { title:'东郊', author:'韦应物', dynasty:'唐', content:'吏舍跼终年，出郊旷清曙。\n杨柳散和风，青山澹吾虑。\n依丛适自憩，缘涧还复去。\n微雨霭芳原，春鸠鸣何处。\n乐幽心屡止，遵事迹犹遽。\n终罢斯结庐，慕陶真可庶。' },
  { title:'听弹琴', author:'刘长卿', dynasty:'唐', content:'泠泠七弦上，静听松风寒。\n古调虽自爱，今人多不弹。' },
  { title:'送灵澈上人', author:'刘长卿', dynasty:'唐', content:'苍苍竹林寺，杳杳钟声晚。\n荷笠带斜阳，青山独归远。' },
  { title:'饯别王十一南游', author:'刘长卿', dynasty:'唐', content:'望君烟水阔，挥手泪沾巾。\n飞鸟没何处，青山空向人。\n长江一帆远，落日五湖春。\n谁见汀洲上，相思愁白蘋。' },
  { title:'弹琴', author:'刘长卿', dynasty:'唐', content:'泠泠七弦上，静听松风寒。\n古调虽自爱，今人多不弹。' },
  { title:'送上人', author:'刘长卿', dynasty:'唐', content:'孤云将野鹤，岂向人间住。\n莫买沃洲山，时人已知处。' },
  { title:'蜀先主庙', author:'刘禹锡', dynasty:'唐', content:'天下英雄气，千秋尚凛然。\n势分三足鼎，业复五铢钱。\n得相能开国，生儿不象贤。\n凄凉蜀故妓，来舞魏宫前。' },
  { title:'西塞山怀古', author:'刘禹锡', dynasty:'唐', content:'王濬楼船下益州，金陵王气黯然收。\n千寻铁锁沉江底，一片降幡出石头。\n人世几回伤往事，山形依旧枕寒流。\n今逢四海为家日，故垒萧萧芦荻秋。' },
  { title:'竹枝词·其一', author:'刘禹锡', dynasty:'唐', content:'杨柳青青江水平，闻郎江上踏歌声。\n东边日出西边雨，道是无晴却有晴。' },
  { title:'秋词', author:'刘禹锡', dynasty:'唐', content:'自古逢秋悲寂寥，我言秋日胜春朝。\n晴空一鹤排云上，便引诗情到碧霄。' },
  { title:'浪淘沙·其一', author:'刘禹锡', dynasty:'唐', content:'九曲黄河万里沙，浪淘风簸自天涯。\n如今直上银河去，同到牵牛织女家。' },
  { title:'望洞庭', author:'刘禹锡', dynasty:'唐', content:'湖光秋月两相和，潭面无风镜未磨。\n遥望洞庭山水翠，白银盘里一青螺。' },
  { title:'经杜甫旧宅', author:'雍陶', dynasty:'唐', content:'浣花溪里花饶笑，肯信吾兼吏隐名。' },
  { title:'渡汉江', author:'宋之问', dynasty:'唐', content:'岭外音书断，经冬复历春。\n近乡情更怯，不敢问来人。' },
  { title:'登乐游原', author:'李商隐', dynasty:'唐', content:'向晚意不适，驱车登古原。\n夕阳无限好，只是近黄昏。' },
  { title:'竹里馆', author:'王维', dynasty:'唐', content:'独坐幽篁里，弹琴复长啸。\n深林人不知，明月来相照。' },
  { title:'杂诗', author:'王维', dynasty:'唐', content:'君自故乡来，应知故乡事。\n来日绮窗前，寒梅著花未？' },
  { title:'辛夷坞', author:'王维', dynasty:'唐', content:'木末芙蓉花，山中发红萼。\n涧户寂无人，纷纷开且落。' },
  { title:'漆园', author:'王维', dynasty:'唐', content:'古人非傲吏，自阙经世务。\n偶寄一微官，婆娑数株树。' },
  { title:'酬张少府', author:'王维', dynasty:'唐', content:'晚年唯好静，万事不关心。\n自顾无长策，空知返旧林。\n松风吹解带，山月照弹琴。\n君问穷通理，渔歌入浦深。' },
  { title:'过香积寺', author:'王维', dynasty:'唐', content:'不知香积寺，数里入云峰。\n古木无人径，深山何处钟。\n泉声咽危石，日色冷青松。\n薄暮空潭曲，安禅制毒龙。' },
  { title:'终南山', author:'王维', dynasty:'唐', content:'太乙近天都，连山接海隅。\n白云回望合，青霭入看无。\n分野中峰变，阴晴众壑殊。\n欲投人处宿，隔水问樵夫。' },
  { title:'归嵩山作', author:'王维', dynasty:'唐', content:'清川带长薄，车马去闲闲。\n流水如有意，暮禽相与还。\n荒城临古渡，落日满秋山。\n迢递嵩高下，归来且闭关。' },
  { title:'采莲曲', author:'王昌龄', dynasty:'唐', content:'荷叶罗裙一色裁，芙蓉向脸两边开。\n乱入池中看不见，闻歌始觉有人来。' },
  { title:'从军行·其四', author:'王昌龄', dynasty:'唐', content:'青海长云暗雪山，孤城遥望玉门关。\n黄沙百战穿金甲，不破楼兰终不还。' },
  { title:'闺怨', author:'王昌龄', dynasty:'唐', content:'闺中少妇不知愁，春日凝妆上翠楼。\n忽见陌头杨柳色，悔教夫婿觅封侯。' },
  { title:'春宫曲', author:'王昌龄', dynasty:'唐', content:'昨夜风开露井桃，未央前殿月轮高。\n平阳歌舞新承宠，帘外春寒赐锦袍。' },
  { title:'送魏万之京', author:'李颀', dynasty:'唐', content:'朝闻游子唱离歌，昨夜微霜初渡河。\n鸿雁不堪愁里听，云山况是客中过。\n关城树色催寒近，御苑砧声向晚多。\n莫见长安行乐处，空令岁月易蹉跎。' },
  { title:'古意', author:'李颀', dynasty:'唐', content:'男儿事长征，少小幽燕客。\n赌胜马蹄下，由来轻七尺。\n杀人莫敢前，须如猬毛磔。\n黄云陇底白云飞，未得报恩不得归。\n辽东小妇年十五，惯弹琵琶解歌舞。\n今为羌笛出塞声，使我三军泪如雨。' },
  { title:'听安万善吹觱篥歌', author:'李颀', dynasty:'唐', content:'南山截竹为觱篥，此乐本自龟兹出。\n流传汉地曲转奇，凉州胡人为我吹。\n旁邻闻者多叹息，远客思乡皆泪垂。\n世人解听不解赏，长飙风中自来往。\n枯桑老柏寒飕飗，九雏鸣凤乱啾啾。\n龙吟虎啸一时发，万籁百泉相与秋。\n忽然更作渔阳掺，黄云萧条白日暗。\n变调如闻杨柳春，上林繁花照眼新。\n岁夜高堂列明烛，美酒一杯声一曲。' },
  { title:'望蓟门', author:'祖咏', dynasty:'唐', content:'燕台一望客心惊，箫鼓喧喧汉将营。\n万里寒光生积雪，三边曙色动危旌。\n沙场烽火侵胡月，海畔云山拥蓟城。\n少小虽非投笔吏，论功还欲请长缨。' },
  { title:'终南望余雪', author:'祖咏', dynasty:'唐', content:'终南阴岭秀，积雪浮云端。\n林表明霁色，城中增暮寒。' },
  { title:'苏武庙', author:'温庭筠', dynasty:'唐', content:'苏武魂销汉使前，古祠高树两茫然。\n云边雁断胡天月，陇上羊归塞草烟。\n回日楼台非甲帐，去时冠剑是丁年。\n茂陵不见封侯印，空向秋波哭逝川。' },
  { title:'商山早行', author:'温庭筠', dynasty:'唐', content:'晨起动征铎，客行悲故乡。\n鸡声茅店月，人迹板桥霜。\n槲叶落山路，枳花明驿墙。\n因思杜陵梦，凫雁满回塘。' },
  { title:'马嵬坡', author:'郑畋', dynasty:'唐', content:'玄宗回马杨妃死，云雨难忘日月新。\n终是圣明天子事，景阳宫井又何人。' },
  { title:'金陵图', author:'韦庄', dynasty:'唐', content:'江雨霏霏江草齐，六朝如梦鸟空啼。\n无情最是台城柳，依旧烟笼十里堤。' },
  { title:'台城', author:'韦庄', dynasty:'唐', content:'江雨霏霏江草齐，六朝如梦鸟空啼。\n无情最是台城柳，依旧烟笼十里堤。' },
  { title:'章台夜思', author:'韦庄', dynasty:'唐', content:'清瑟怨遥夜，绕弦风雨哀。\n孤灯闻楚角，残月下章台。\n芳草已云暮，故人殊未来。\n乡书不可寄，秋雁又南回。' },
  { title:'遣怀', author:'杜牧', dynasty:'唐', content:'落魄江湖载酒行，楚腰纤细掌中轻。\n十年一觉扬州梦，赢得青楼薄幸名。' },
  { title:'秋夕', author:'杜牧', dynasty:'唐', content:'银烛秋光冷画屏，轻罗小扇扑流萤。\n天阶夜色凉如水，卧看牵牛织女星。' },
  { title:'赠别·其一', author:'杜牧', dynasty:'唐', content:'娉娉袅袅十三余，豆蔻梢头二月初。\n春风十里扬州路，卷上珠帘总不如。' },
  { title:'叹花', author:'杜牧', dynasty:'唐', content:'自是寻春去校迟，不须惆怅怨芳时。\n狂风落尽深红色，绿叶成阴子满枝。' },
  { title:'登柳州城楼寄漳汀封连四州', author:'柳宗元', dynasty:'唐', content:'城上高楼接大荒，海天愁思正茫茫。\n惊风乱飐芙蓉水，密雨斜侵薜荔墙。\n岭树重遮千里目，江流曲似九回肠。\n共来百越文身地，犹自音书滞一乡。' },
  { title:'渔翁', author:'柳宗元', dynasty:'唐', content:'渔翁夜傍西岩宿，晓汲清湘燃楚竹。\n烟销日出不见人，欸乃一声山水绿。\n回看天际下中流，岩上无心云相逐。' },
  { title:'古风·其一', author:'李白', dynasty:'唐', content:'大雅久不作，吾衰竟谁陈。\n王风委蔓草，战国多荆榛。\n龙虎相啖食，兵戈逮狂秦。\n正声何微茫，哀怨起骚人。\n扬马激颓波，开流荡无垠。\n废兴虽万变，宪章亦已沦。\n自从建安来，绮丽不足珍。\n圣代复元古，垂衣贵清真。\n群才属休明，乘运共跃鳞。\n文质相炳焕，众星罗秋旻。\n我志在删述，垂辉映千春。\n希圣如有立，绝笔于获麟。' },

  // ======== 扩编 — 宋词三百首补遗 ========
  { title:'临江仙·夜饮东坡醒复醉', author:'苏轼', dynasty:'宋', content:'夜饮东坡醒复醉，归来仿佛三更。\n家童鼻息已雷鸣。\n敲门都不应，倚杖听江声。\n长恨此身非我有，何时忘却营营。\n夜阑风静縠纹平。\n小舟从此逝，江海寄余生。' },
  { title:'卜算子·黄州定慧院寓居作', author:'苏轼', dynasty:'宋', content:'缺月挂疏桐，漏断人初静。\n时见幽人独往来，缥缈孤鸿影。\n惊起却回头，有恨无人省。\n拣尽寒枝不肯栖，寂寞沙洲冷。' },
  { title:'和子由渑池怀旧', author:'苏轼', dynasty:'宋', content:'人生到处知何似，应似飞鸿踏雪泥。\n泥上偶然留指爪，鸿飞那复计东西。\n老僧已死成新塔，坏壁无由见旧题。\n往日崎岖还记否，路长人困蹇驴嘶。' },
  { title:'六月二十日夜渡海', author:'苏轼', dynasty:'宋', content:'参横斗转欲三更，苦雨终风也解晴。\n云散月明谁点缀？天容海色本澄清。\n空余鲁叟乘桴意，粗识轩辕奏乐声。\n九死南荒吾不恨，兹游奇绝冠平生。' },
  { title:'望江南·超然台作', author:'苏轼', dynasty:'宋', content:'春未老，风细柳斜斜。\n试上超然台上看，半壕春水一城花。\n烟雨暗千家。\n寒食后，酒醒却咨嗟。\n休对故人思故国，且将新火试新茶。\n诗酒趁年华。' },
  { title:'行香子·过七里濑', author:'苏轼', dynasty:'宋', content:'一叶舟轻，双桨鸿惊。\n水天清、影湛波平。\n鱼翻藻鉴，鹭点烟汀。\n过沙溪急，霜溪冷，月溪明。\n重重似画，曲曲如屏。\n算当年、虚老严陵。\n君臣一梦，今古空名。\n但远山长，云山乱，晓山青。' },
  { title:'西江月·世事一场大梦', author:'苏轼', dynasty:'宋', content:'世事一场大梦，人生几度秋凉？\n夜来风叶已鸣廊。看取眉头鬓上。\n酒贱常愁客少，月明多被云妨。\n中秋谁与共孤光。把盏凄然北望。' },
  { title:'洞仙歌', author:'苏轼', dynasty:'宋', content:'冰肌玉骨，自清凉无汗。\n水殿风来暗香满。\n绣帘开，一点明月窥人，人未寝，欹枕钗横鬓乱。\n起来携素手，庭户无声，时见疏星渡河汉。\n试问夜如何？夜已三更，金波淡、玉绳低转。\n但屈指、西风几时来，又不道、流年暗中偷换。' },
  { title:'点绛唇·蹴罢秋千', author:'李清照', dynasty:'宋', content:'蹴罢秋千，起来慵整纤纤手。\n露浓花瘦，薄汗轻衣透。\n见客入来，袜刬金钗溜。\n和羞走，倚门回首，却把青梅嗅。' },
  { title:'渔家傲·天接云涛连晓雾', author:'李清照', dynasty:'宋', content:'天接云涛连晓雾，星河欲转千帆舞。\n仿佛梦魂归帝所。\n闻天语，殷勤问我归何处。\n我报路长嗟日暮，学诗谩有惊人句。\n九万里风鹏正举。\n风休住，蓬舟吹取三山去。' },
  { title:'菩萨蛮·风柔日薄春犹早', author:'李清照', dynasty:'宋', content:'风柔日薄春犹早，夹衫乍著心情好。\n睡起觉微寒，梅花鬓上残。\n故乡何处是，忘了除非醉。\n沉水卧时烧，香消酒未消。' },
  { title:'永遇乐·落日熔金', author:'李清照', dynasty:'宋', content:'落日熔金，暮云合璧，人在何处。\n染柳烟浓，吹梅笛怨，春意知几许。\n元宵佳节，融和天气，次第岂无风雨。\n来相召、香车宝马，谢他酒朋诗侣。\n中州盛日，闺门多暇，记得偏重三五。\n铺翠冠儿，捻金雪柳，簇带争济楚。\n如今憔悴，风鬟霜鬓，怕见夜间出去。\n不如向、帘儿底下，听人笑语。' },
  { title:'清平乐·年年雪里', author:'李清照', dynasty:'宋', content:'年年雪里，常插梅花醉。\n挼尽梅花无好意，赢得满衣清泪。\n今年海角天涯，萧萧两鬓生华。\n看取晚来风势，故应难看梅花。' },
  { title:'贺新郎·别茂嘉十二弟', author:'辛弃疾', dynasty:'宋', content:'绿树听鹈鴂。\n更那堪、鹧鸪声住，杜鹃声切。\n啼到春归无寻处，苦恨芳菲都歇。\n算未抵、人间离别。\n马上琵琶关塞黑，更长门、翠辇辞金阙。\n看燕燕，送归妾。\n将军百战身名裂。\n向河梁、回头万里，故人长绝。\n易水萧萧西风冷，满座衣冠似雪。\n正壮士、悲歌未彻。\n啼鸟还知如许恨，料不啼清泪长啼血。\n谁共我，醉明月？' },
  { title:'摸鱼儿', author:'辛弃疾', dynasty:'宋', content:'更能消、几番风雨，匆匆春又归去。\n惜春长怕花开早，何况落红无数。\n春且住，见说道、天涯芳草无归路。\n怨春不语。\n算只有殷勤，画檐蛛网，尽日惹飞絮。\n长门事，准拟佳期又误。\n蛾眉曾有人妒。\n千金纵买相如赋，脉脉此情谁诉？\n君莫舞，君不见、玉环飞燕皆尘土！\n闲愁最苦！\n休去倚危栏，斜阳正在，烟柳断肠处。' },
  { title:'水龙吟·登建康赏心亭', author:'辛弃疾', dynasty:'宋', content:'楚天千里清秋，水随天去秋无际。\n遥岑远目，献愁供恨，玉簪螺髻。\n落日楼头，断鸿声里，江南游子。\n把吴钩看了，栏杆拍遍，无人会，登临意。\n休说鲈鱼堪脍，尽西风、季鹰归未？\n求田问舍，怕应羞见，刘郎才气。\n可惜流年，忧愁风雨，树犹如此！\n倩何人唤取，红巾翠袖，揾英雄泪！' },
  { title:'鹧鸪天·代人赋', author:'辛弃疾', dynasty:'宋', content:'陌上柔桑破嫩芽，东邻蚕种已生些。\n平冈细草鸣黄犊，斜日寒林点暮鸦。\n山远近，路横斜，青旗沽酒有人家。\n城中桃李愁风雨，春在溪头荠菜花。' },
  { title:'生查子·元夕', author:'欧阳修', dynasty:'宋', content:'去年元夜时，花市灯如昼。\n月上柳梢头，人约黄昏后。\n今年元夜时，月与灯依旧。\n不见去年人，泪湿春衫袖。' },
  { title:'蝶恋花·谁道闲情抛弃久', author:'欧阳修', dynasty:'宋', content:'谁道闲情抛弃久？每到春来，惆怅还依旧。\n日日花前常病酒，不辞镜里朱颜瘦。\n河畔青芜堤上柳，为问新愁，何事年年有？\n独立小桥风满袖，平林新月人归后。' },
  { title:'玉楼春', author:'欧阳修', dynasty:'宋', content:'尊前拟把归期说，未语春容先惨咽。\n人生自是有情痴，此恨不关风与月。\n离歌且莫翻新阕，一曲能教肠寸结。\n直须看尽洛城花，始共春风容易别。' },
  { title:'踏莎行', author:'欧阳修', dynasty:'宋', content:'候馆梅残，溪桥柳细。\n草薰风暖摇征辔。\n离愁渐远渐无穷，迢迢不断如春水。\n寸寸柔肠，盈盈粉泪。\n楼高莫近危阑倚。\n平芜尽处是春山，行人更在春山外。' },
  { title:'诉衷情', author:'陆游', dynasty:'宋', content:'当年万里觅封侯，匹马戍梁州。\n关河梦断何处？尘暗旧貂裘。\n胡未灭，鬓先秋，泪空流。\n此生谁料，心在天山，身老沧洲。' },
  { title:'渔家傲', author:'陆游', dynasty:'宋', content:'东望山阴何处是？往来一万三千里。\n写得家书空满纸。\n流清泪，书回已是明年事。\n寄语红桥桥下水，扁舟何日寻兄弟？\n行遍天涯真老矣。\n愁无寐，鬓丝几缕茶烟里。' },
  { title:'书愤', author:'陆游', dynasty:'宋', content:'早岁那知世事艰，中原北望气如山。\n楼船夜雪瓜洲渡，铁马秋风大散关。\n塞上长城空自许，镜中衰鬓已先斑。\n出师一表真名世，千载谁堪伯仲间！' },
  { title:'临安春雨初霁', author:'陆游', dynasty:'宋', content:'世味年来薄似纱，谁令骑马客京华。\n小楼一夜听春雨，深巷明朝卖杏花。\n矮纸斜行闲作草，晴窗细乳戏分茶。\n素衣莫起风尘叹，犹及清明可到家。' },
  { title:'秋夜将晓出篱门迎凉有感', author:'陆游', dynasty:'宋', content:'三万里河东入海，五千仞岳上摩天。\n遗民泪尽胡尘里，南望王师又一年。' },
  { title:'苏幕遮·怀旧', author:'范仲淹', dynasty:'宋', content:'碧云天，黄叶地。\n秋色连波，波上寒烟翠。\n山映斜阳天接水。\n芳草无情，更在斜阳外。\n黯乡魂，追旅思。\n夜夜除非，好梦留人睡。\n明月楼高休独倚。\n酒入愁肠，化作相思泪。' },
  { title:'御街行', author:'范仲淹', dynasty:'宋', content:'纷纷坠叶飘香砌。\n夜寂静，寒声碎。\n真珠帘卷玉楼空，天淡银河垂地。\n年年今夜，月华如练，长是人千里。\n愁肠已断无由醉，酒未到，先成泪。\n残灯明灭枕头欹，谙尽孤眠滋味。\n都来此事，眉间心上，无计相回避。' },
  { title:'桂枝香·金陵怀古', author:'王安石', dynasty:'宋', content:'登临送目。\n正故国晚秋，天气初肃。\n千里澄江似练，翠峰如簇。\n归帆去棹残阳里，背西风、酒旗斜矗。\n彩舟云淡，星河鹭起，画图难足。\n念往昔、繁华竞逐。\n叹门外楼头，悲恨相续。\n千古凭高对此，谩嗟荣辱。\n六朝旧事随流水，但寒烟、衰草凝绿。\n至今商女，时时犹唱，后庭遗曲。' },
  { title:'千秋岁', author:'张先', dynasty:'宋', content:'数声鶗鴂，又报芳菲歇。\n惜春更把残红折。\n雨轻风色暴，梅子青时节。\n永丰柳，无人尽日花飞雪。\n莫把幺弦拨，怨极弦能说。\n天不老，情难绝。\n心似双丝网，中有千千结。\n夜过也，东窗未白凝残月。' },
  { title:'天仙子', author:'张先', dynasty:'宋', content:'水调数声持酒听，午醉醒来愁未醒。\n送春春去几时回？\n临晚镜，伤流景，往事后期空记省。\n沙上并禽池上暝，云破月来花弄影。\n重重帘幕密遮灯，风不定，人初静，明日落红应满径。' },
  { title:'望海潮', author:'柳永', dynasty:'宋', content:'东南形胜，三吴都会，钱塘自古繁华。\n烟柳画桥，风帘翠幕，参差十万人家。\n云树绕堤沙，怒涛卷霜雪，天堑无涯。\n市列珠玑，户盈罗绮，竞豪奢。\n重湖叠巘清嘉。\n有三秋桂子，十里荷花。\n羌管弄晴，菱歌泛夜，嬉嬉钓叟莲娃。\n千骑拥高牙，乘醉听箫鼓，吟赏烟霞。\n异日图将好景，归去凤池夸。' },
  { title:'蝶恋花·伫倚危楼风细细', author:'柳永', dynasty:'宋', content:'伫倚危楼风细细，望极春愁，黯黯生天际。\n草色烟光残照里，无言谁会凭阑意。\n拟把疏狂图一醉，对酒当歌，强乐还无味。\n衣带渐宽终不悔，为伊消得人憔悴。' },
  { title:'八声甘州', author:'柳永', dynasty:'宋', content:'对潇潇暮雨洒江天，一番洗清秋。\n渐霜风凄紧，关河冷落，残照当楼。\n是处红衰翠减，苒苒物华休。\n惟有长江水，无语东流。\n不忍登高临远，望故乡渺邈，归思难收。\n叹年来踪迹，何事苦淹留？\n想佳人、妆楼颙望，误几回、天际识归舟。\n争知我，倚栏杆处，正恁凝愁！' },
  { title:'蝶恋花·槛菊愁烟兰泣露', author:'晏殊', dynasty:'宋', content:'槛菊愁烟兰泣露，罗幕轻寒，燕子双飞去。\n明月不谙离恨苦，斜光到晓穿朱户。\n昨夜西风凋碧树，独上高楼，望尽天涯路。\n欲寄彩笺兼尺素，山长水阔知何处？' },
  { title:'踏莎行·祖席离歌', author:'晏殊', dynasty:'宋', content:'祖席离歌，长亭别宴。\n香尘已隔犹回面。\n居人匹马映林嘶，行人去棹依波转。\n画阁魂消，高楼目断。\n斜阳只送平波远。\n无穷无尽是离愁，天涯地角寻思遍。' },
  { title:'清平乐·红笺小字', author:'晏殊', dynasty:'宋', content:'红笺小字，说尽平生意。\n鸿雁在云鱼在水，惆怅此情难寄。\n斜阳独倚西楼，遥山恰对帘钩。\n人面不知何处，绿波依旧东流。' },
  { title:'踏莎行·郴州旅舍', author:'秦观', dynasty:'宋', content:'雾失楼台，月迷津渡。\n桃源望断无寻处。\n可堪孤馆闭春寒，杜鹃声里斜阳暮。\n驿寄梅花，鱼传尺素。\n砌成此恨无重数。\n郴江幸自绕郴山，为谁流下潇湘去。' },
  { title:'浣溪沙·漠漠轻寒上小楼', author:'秦观', dynasty:'宋', content:'漠漠轻寒上小楼，晓阴无赖似穷秋。\n淡烟流水画屏幽。\n自在飞花轻似梦，无边丝雨细如愁。\n宝帘闲挂小银钩。' },
  { title:'满庭芳', author:'秦观', dynasty:'宋', content:'山抹微云，天连衰草，画角声断谯门。\n暂停征棹，聊共引离尊。\n多少蓬莱旧事，空回首、烟霭纷纷。\n斜阳外，寒鸦万点，流水绕孤村。\n销魂。\n当此际，香囊暗解，罗带轻分。\n谩赢得、青楼薄幸名存。\n此去何时见也，襟袖上、空惹啼痕。\n伤情处，高城望断，灯火已黄昏。' },
  { title:'鹧鸪天·彩袖殷勤捧玉钟', author:'晏几道', dynasty:'宋', content:'彩袖殷勤捧玉钟，当年拚却醉颜红。\n舞低杨柳楼心月，歌尽桃花扇底风。\n从别后，忆相逢，几回魂梦与君同。\n今宵剩把银釭照，犹恐相逢是梦中。' },
  { title:'阮郎归', author:'晏几道', dynasty:'宋', content:'天边金掌露成霜，云随雁字长。\n绿杯红袖趁重阳，人情似故乡。\n兰佩紫，菊簪黄，殷勤理旧狂。\n欲将沉醉换悲凉，清歌莫断肠。' },
  { title:'兰陵王·柳', author:'周邦彦', dynasty:'宋', content:'柳阴直，烟里丝丝弄碧。\n隋堤上、曾见几番，拂水飘绵送行色。\n登临望故国，谁识京华倦客？\n长亭路，年去岁来，应折柔条过千尺。\n闲寻旧踪迹，又酒趁哀弦，灯照离席。\n梨花榆火催寒食。\n愁一箭风快，半篙波暖，回头迢递便数驿，望人在天北。\n凄恻，恨堆积！\n渐别浦萦回，津堠岑寂，斜阳冉冉春无极。\n念月榭携手，露桥闻笛。\n沉思前事，似梦里，泪暗滴。' },
  { title:'西河·金陵怀古', author:'周邦彦', dynasty:'宋', content:'佳丽地，南朝盛事谁记。\n山围故国绕清江，髻鬟对起。\n怒涛寂寞打孤城，风樯遥度天际。\n断崖树，犹倒倚。\n莫愁艇子曾系。\n空余旧迹郁苍苍，雾沉半垒。\n夜深月过女墙来，伤心东望淮水。\n酒旗戏鼓甚处市。\n想依稀、王谢邻里。\n燕子不知何世。\n入寻常、巷陌人家，相对如说兴亡，斜阳里。' },
  { title:'六丑·落花', author:'周邦彦', dynasty:'宋', content:'正单衣试酒，怅客里、光阴虚掷。\n愿春暂留，春归如过翼，一去无迹。\n为问花何在，夜来风雨，葬楚宫倾国。\n钗钿堕处遗香泽。\n乱点桃蹊，轻翻柳陌。\n多情为谁追惜。\n但蜂媒蝶使，时叩窗槅。\n东园岑寂，渐蒙笼暗碧。\n静绕珍丛底，成叹息。\n长条故惹行客。\n似牵衣待话，别情无极。\n残英小、强簪巾帻。\n终不似一朵，钗头颤袅，向人欹侧。\n漂流处、莫趁潮汐。\n恐断红、尚有相思字，何由见得。' },
  { title:'唐多令', author:'刘过', dynasty:'宋', content:'芦叶满汀洲，寒沙带浅流。\n二十年、重过南楼。\n柳下系船犹未稳，能几日，又中秋。\n黄鹤断矶头，故人今在否？\n旧江山、浑是新愁。\n欲买桂花同载酒，终不似，少年游。' },
  { title:'贺新郎·九日', author:'刘克庄', dynasty:'宋', content:'湛湛长空黑。\n更那堪、斜风细雨，乱愁如织。\n老眼平生空四海，赖有高楼百尺。\n看浩荡、千崖秋色。\n白发书生神州泪，尽凄凉、不向牛山滴。\n追往事，去无迹。\n少年自负凌云笔。\n到而今、春华落尽，满怀萧瑟。\n常恨世人新意少，爱说南朝狂客。\n把破帽、年年拈出。\n若对黄花孤负酒，怕黄花、也笑人岑寂。\n鸿北去，日西匿。' },

  // ======== 扩编 — 宋词续补 + 元明清 ========
  { title:'贺新郎·送胡邦衡谪新州', author:'张元干', dynasty:'宋', content:'梦绕神州路。\n怅秋风、连营画角，故宫离黍。\n底事昆仑倾砥柱，九地黄流乱注。\n聚万落、千村狐兔。\n天意从来高难问，况人情、老易悲如许。\n更南浦，送君去。\n凉生岸柳催残暑。\n耿斜河、疏星淡月，断云微度。\n万里江山知何处？回首对床夜语。\n雁不到、书成谁与？\n目尽青天怀今古，肯儿曹、恩怨相尔汝。\n举大白，听金缕。' },
  { title:'忆王孙·春词', author:'李重元', dynasty:'宋', content:'萋萋芳草忆王孙。\n柳外楼高空断魂。\n杜宇声声不忍闻。\n欲黄昏，雨打梨花深闭门。' },
  { title:'眼儿媚', author:'朱淑真', dynasty:'宋', content:'迟迟春日弄轻柔，花径暗香流。\n清明过了，不堪回首，云锁朱楼。\n午窗睡起莺声巧，何处唤春愁？\n绿杨影里，海棠亭畔，红杏梢头。' },
  { title:'谒金门·春半', author:'朱淑真', dynasty:'宋', content:'春已半，触目此情无限。\n十二阑干闲倚遍，愁来天不管。\n好是风和日暖，输与莺莺燕燕。\n满院落花帘不卷，断肠芳草远。' },
  { title:'醉垂鞭', author:'张先', dynasty:'宋', content:'双蝶绣罗裙，东池宴，初相见。\n朱粉不深匀，闲花淡淡春。\n细看诸处好，人人道，柳腰身。\n昨日乱山昏，来时衣上云。' },
  { title:'曲玉管', author:'柳永', dynasty:'宋', content:'陇首云飞，江边日晚，烟波满目凭阑久。\n立望关河萧索，千里清秋，忍凝眸。\n杳杳神京，盈盈仙子，别来锦字终难偶。\n断雁无凭，冉冉飞下汀洲，思悠悠。\n暗想当初，有多少、幽欢佳会，岂知聚散难期，翻成雨恨云愁。\n阻追游。\n每登山临水，惹起平生心事，一场消黯，永日无言，却下层楼。' },
  { title:'采莲令', author:'柳永', dynasty:'宋', content:'月华收，云淡霜天曙。\n西征客、此时情苦。\n翠娥执手送临歧，轧轧开朱户。\n千娇面、盈盈伫立，无言有泪，断肠争忍回顾？\n一叶兰舟，便恁急桨凌波去。\n贪行色、岂知离绪。\n万般方寸，但饮恨、脉脉同谁语。\n更回首、重城不见，寒江天外，隐隐两三烟树。' },
  { title:'水龙吟·次韵章质夫杨花词', author:'苏轼', dynasty:'宋', content:'似花还似非花，也无人惜从教坠。\n抛家傍路，思量却是，无情有思。\n萦损柔肠，困酣娇眼，欲开还闭。\n梦随风万里，寻郎去处，又还被、莺呼起。\n不恨此花飞尽，恨西园、落红难缀。\n晓来雨过，遗踪何在？一池萍碎。\n春色三分，二分尘土，一分流水。\n细看来，不是杨花，点点是离人泪。' },
  { title:'满庭芳·蜗角虚名', author:'苏轼', dynasty:'宋', content:'蜗角虚名，蝇头微利，算来著甚干忙。\n事皆前定，谁弱又谁强。\n且趁闲身未老，尽放我、些子疏狂。\n百年里，浑教是醉，三万六千场。\n思量。能几许，忧愁风雨，一半相妨。\n又何须，抵死说短论长。\n幸对清风皓月，苔茵展、云幕高张。\n江南好，千钟美酒，一曲满庭芳。' },
  { title:'琵琶仙', author:'姜夔', dynasty:'宋', content:'双桨来时，有人似、旧曲桃根桃叶。\n歌扇轻约飞花，蛾眉正奇绝。\n春渐远、汀洲自绿，更添了、几声啼鴂。\n十里扬州，三生杜牧，前事休说。\n又还是、宫烛分烟，奈愁里、匆匆换时节。\n都把一襟芳思，与空阶榆荚。\n千万缕、藏鸦细柳，为玉尊、起舞回雪。\n想见西出阳关，故人初别。' },
  { title:'点绛唇·丁未冬过吴松作', author:'姜夔', dynasty:'宋', content:'燕雁无心，太湖西畔随云去。\n数峰清苦，商略黄昏雨。\n第四桥边，拟共天随住。\n今何许？凭阑怀古，残柳参差舞。' },
  { title:'暗香', author:'姜夔', dynasty:'宋', content:'旧时月色，算几番照我，梅边吹笛？\n唤起玉人，不管清寒与攀摘。\n何逊而今渐老，都忘却、春风词笔。\n但怪得、竹外疏花，香冷入瑶席。\n江国，正寂寂。\n叹寄与路遥，夜雪初积。\n翠尊易泣，红萼无言耿相忆。\n长记曾携手处，千树压、西湖寒碧。\n又片片、吹尽也，几时见得？' },
  { title:'疏影', author:'姜夔', dynasty:'宋', content:'苔枝缀玉，有翠禽小小，枝上同宿。\n客里相逢，篱角黄昏，无言自倚修竹。\n昭君不惯胡沙远，但暗忆、江南江北。\n想佩环、月夜归来，化作此花幽独。\n犹记深宫旧事，那人正睡里，飞近蛾绿。\n莫似春风，不管盈盈，早与安排金屋。\n还教一片随波去，又却怨、玉龙哀曲。\n等恁时、重觅幽香，已入小窗横幅。' },
  { title:'风入松', author:'吴文英', dynasty:'宋', content:'听风听雨过清明，愁草瘗花铭。\n楼前绿暗分携路，一丝柳、一寸柔情。\n料峭春寒中酒，交加晓梦啼莺。\n西园日日扫林亭，依旧赏新晴。\n黄蜂频扑秋千索，有当时、纤手香凝。\n惆怅双鸳不到，幽阶一夜苔生。' },
  { title:'唐多令·惜别', author:'吴文英', dynasty:'宋', content:'何处合成愁？离人心上秋。\n纵芭蕉、不雨也飕飕。\n都道晚凉天气好，有明月、怕登楼。\n年事梦中休，花空烟水流。\n燕辞归、客尚淹留。\n垂柳不萦裙带住，漫长是、系行舟。' },
  { title:'醉花阴', author:'李清照', dynasty:'宋', content:'薄雾浓云愁永昼，瑞脑销金兽。\n佳节又重阳，玉枕纱橱，半夜凉初透。\n东篱把酒黄昏后，有暗香盈袖。\n莫道不销魂，帘卷西风，人比黄花瘦。' },
  { title:'声声慢', author:'李清照', dynasty:'宋', content:'寻寻觅觅，冷冷清清，凄凄惨惨戚戚。\n乍暖还寒时候，最难将息。\n三杯两盏淡酒，怎敌他、晚来风急？\n雁过也，正伤心，却是旧时相识。\n满地黄花堆积，憔悴损，如今有谁堪摘？\n守着窗儿，独自怎生得黑？\n梧桐更兼细雨，到黄昏、点点滴滴。\n这次第，怎一个愁字了得！' },
  { title:'念奴娇·过洞庭', author:'张孝祥', dynasty:'宋', content:'洞庭青草，近中秋、更无一点风色。\n玉界琼田三万顷，著我扁舟一叶。\n素月分辉，明河共影，表里俱澄澈。\n悠然心会，妙处难与君说。\n应念岭海经年，孤光自照，肝胆皆冰雪。\n短发萧骚襟袖冷，稳泛沧溟空阔。\n尽挹西江，细斟北斗，万象为宾客。\n扣舷独啸，不知今夕何夕。' },
  { title:'六州歌头', author:'张孝祥', dynasty:'宋', content:'长淮望断，关塞莽然平。\n征尘暗，霜风劲，悄边声。黯销凝。\n追想当年事，殆天数，非人力；洙泗上，弦歌地，亦膻腥。\n隔水毡乡，落日牛羊下，区脱纵横。\n看名王宵猎，骑火一川明。笳鼓悲鸣，遣人惊。\n念腰间箭，匣中剑，空埃蠹，竟何成！\n时易失，心徒壮，岁将零。\n渺神京。\n干羽方怀远，静烽燧，且休兵。\n冠盖使，纷驰骛，若为情！\n闻道中原遗老，常南望、翠葆霓旌。\n使行人到此，忠愤气填膺，有泪如倾。' },
  { title:'减字木兰花·春月', author:'苏轼', dynasty:'宋', content:'春庭月午，摇荡香醪光欲舞。\n步转回廊，半落梅花婉娩香。\n轻烟薄雾，总是少年行乐处。\n不似秋光，只与离人照断肠。' },
  { title:'如梦令·春景', author:'秦观', dynasty:'宋', content:'莺嘴啄花红溜，燕尾点波绿皱。\n指冷玉笙寒，吹彻小梅春透。\n依旧，依旧，人与绿杨俱瘦。' },
  { title:'清平乐', author:'黄庭坚', dynasty:'宋', content:'春归何处？寂寞无行路。\n若有人知春去处，唤取归来同住。\n春无踪迹谁知？除非问取黄鹂。\n百啭无人能解，因风飞过蔷薇。' },
  { title:'水调歌头·游览', author:'黄庭坚', dynasty:'宋', content:'瑶草一何碧，春入武陵溪。\n溪上桃花无数，枝上有黄鹂。\n我欲穿花寻路，直入白云深处，浩气展虹霓。\n只恐花深里，红露湿人衣。\n坐玉石，倚玉枕，拂金徽。\n谪仙何处？无人伴我白螺杯。\n我为灵芝仙草，不为朱唇丹脸，长啸亦何为？\n醉舞下山去，明月逐人归。' },
  { title:'蝶恋花·春暮', author:'李冠', dynasty:'宋', content:'遥夜亭皋闲信步。\n才过清明，渐觉伤春暮。\n数点雨声风约住，朦胧淡月云来去。\n桃杏依稀香暗度。\n谁在秋千，笑里轻轻语？\n一寸相思千万绪，人间没个安排处。' },
  { title:'青门引', author:'张先', dynasty:'宋', content:'乍暖还轻冷，风雨晚来方定。\n庭轩寂寞近清明，残花中酒，又是去年病。\n楼头画角风吹醒，入夜重门静。\n那堪更被明月，隔墙送过秋千影。' },
  { title:'洞仙歌·泗州中秋作', author:'晁补之', dynasty:'宋', content:'青烟幂处，碧海飞金镜。\n永夜闲阶卧桂影。\n露凉时、零乱多少寒螀，神京远，惟有蓝桥路近。\n水晶帘不下，云母屏开，冷浸佳人淡脂粉。\n待都将许多明，付与金尊，投晓共、流霞倾尽。\n更携取、胡床上南楼，看玉做人间，素秋千顷。' },
  { title:'临江仙·梦后楼台高锁', author:'晏几道', dynasty:'宋', content:'梦后楼台高锁，酒醒帘幕低垂。\n去年春恨却来时。\n落花人独立，微雨燕双飞。\n记得小蘋初见，两重心字罗衣。\n琵琶弦上说相思。\n当时明月在，曾照彩云归。' },
  { title:'生查子·关山魂梦长', author:'晏几道', dynasty:'宋', content:'关山魂梦长，鱼雁音尘少。\n两鬓可怜青，只为相思老。\n归梦碧纱窗，说与人人道。\n真个别离难，不似相逢好。' },
  { title:'望江南', author:'温庭筠', dynasty:'唐', content:'梳洗罢，独倚望江楼。\n过尽千帆皆不是，斜晖脉脉水悠悠。\n肠断白蘋洲。' },
  { title:'梦江南', author:'温庭筠', dynasty:'唐', content:'千万恨，恨极在天涯。\n山月不知心里事，水风空落眼前花，摇曳碧云斜。' },
  { title:'更漏子', author:'温庭筠', dynasty:'唐', content:'玉炉香，红蜡泪，偏照画堂秋思。\n眉翠薄，鬓云残，夜长衾枕寒。\n梧桐树，三更雨，不道离情正苦。\n一叶叶，一声声，空阶滴到明。' },
  { title:'摊破浣溪沙', author:'李璟', dynasty:'南唐', content:'菡萏香销翠叶残，西风愁起绿波间。\n还与韶光共憔悴，不堪看。\n细雨梦回鸡塞远，小楼吹彻玉笙寒。\n多少泪珠何限恨，倚阑干。' },
  { title:'菩萨蛮', author:'韦庄', dynasty:'唐', content:'人人尽说江南好，游人只合江南老。\n春水碧于天，画船听雨眠。\n垆边人似月，皓腕凝霜雪。\n未老莫还乡，还乡须断肠。' },
  { title:'思帝乡', author:'韦庄', dynasty:'唐', content:'春日游，杏花吹满头。\n陌上谁家年少，足风流？\n妾拟将身嫁与，一生休。\n纵被无情弃，不能羞。' },
  { title:'女冠子', author:'韦庄', dynasty:'唐', content:'昨夜夜半，枕上分明梦见。\n语多时。依旧桃花面，频低柳叶眉。\n半羞还半喜，欲去又依依。\n觉来知是梦，不胜悲。' },
  { title:'山坡羊·骊山怀古', author:'张养浩', dynasty:'元', content:'骊山四顾，阿房一炬，当时奢侈今何处？\n只见草萧疏，水萦纡。\n至今遗恨迷烟树。\n列国周齐秦汉楚。\n赢，都变做了土；输，都变做了土。' },
  { title:'卖花声·怀古', author:'张可久', dynasty:'元', content:'美人自刎乌江岸，战火曾烧赤壁山，将军空老玉门关。\n伤心秦汉，生民涂炭，读书人一声长叹。' },
  { title:'水仙子·夜雨', author:'徐再思', dynasty:'元', content:'一声梧叶一声秋，一点芭蕉一点愁，三更归梦三更后。\n落灯花，棋未收，叹新丰逆旅淹留。\n枕上十年事，江南二老忧，都到心头。' },
  { title:'蟾宫曲·叹世', author:'马致远', dynasty:'元', content:'咸阳百二山河，两字功名，几阵干戈。\n项废东吴，刘兴西蜀，梦说南柯。\n韩信功兀的般证果，蒯通言那里是风魔？\n成也萧何，败也萧何。醉了由他。' },
  { title:'四块玉·闲适', author:'关汉卿', dynasty:'元', content:'适意行，安心坐。渴时饮饥时餐醉时歌，困来时就向莎茵卧。\n日月长，天地阔，闲快活。' },
  { title:'大德歌·春', author:'关汉卿', dynasty:'元', content:'子规啼，不如归，道是春归人未归。\n几日添憔悴，虚飘飘柳絮飞。\n一春鱼雁无消息，则见双燕斗衔泥。' },
  { title:'水仙子·咏江南', author:'张养浩', dynasty:'元', content:'一江烟水照晴岚，两岸人家接画檐，芰荷丛一段秋光淡。\n看沙鸥舞再三，卷香风十里珠帘。\n画船儿天边至，酒旗儿风外飐。\n爱杀江南。' },
  { title:'朝天子·咏喇叭', author:'王磐', dynasty:'明', content:'喇叭，唢呐，曲儿小腔儿大。\n官船来往乱如麻，全仗你抬声价。\n军听了军愁，民听了民怕。\n那里去辨甚么真共假？\n眼见的吹翻了这家，吹伤了那家，只吹的水尽鹅飞罢。' },
  { title:'一剪梅·雨打梨花深闭门', author:'唐寅', dynasty:'明', content:'雨打梨花深闭门，忘了青春，误了青春。\n赏心乐事共谁论？花下销魂，月下销魂。\n愁聚眉峰尽日颦，千点啼痕，万点啼痕。\n晓看天色暮看云，行也思君，坐也思君。' },
  { title:'言志', author:'唐寅', dynasty:'明', content:'不炼金丹不坐禅，不为商贾不耕田。\n闲来写就青山卖，不使人间造孽钱。' },
  { title:'绝句', author:'唐寅', dynasty:'明', content:'不炼金丹不坐禅，不为商贾不耕田。\n闲来写就青山卖，不使人间造孽钱。' },
  { title:'长相思', author:'俞彦', dynasty:'明', content:'折花枝，恨花枝，准拟花开人共卮，开时人去时。\n怕相思，已相思，轮到相思没处辞，眉间露一丝。' },
  { title:'蝶恋花', author:'纳兰性德', dynasty:'清', content:'辛苦最怜天上月，一昔如环，昔昔都成玦。\n若似月轮终皎洁，不辞冰雪为卿热。\n无那尘缘容易绝，燕子依然，软踏帘钩说。\n唱罢秋坟愁未歇，春丛认取双栖蝶。' },
  { title:'浣溪沙·谁念西风独自凉', author:'纳兰性德', dynasty:'清', content:'谁念西风独自凉，萧萧黄叶闭疏窗，沉思往事立残阳。\n被酒莫惊春睡重，赌书消得泼茶香，当时只道是寻常。' },
  { title:'金缕曲·赠梁汾', author:'纳兰性德', dynasty:'清', content:'德也狂生耳。偶然间、缁尘京国，乌衣门第。\n有酒惟浇赵州土，谁会成生此意。\n不信道、遂成知己。\n青眼高歌俱未老，向尊前、拭尽英雄泪。\n君不见，月如水。\n共君此夜须沉醉。\n且由他、娥眉谣诼，古今同忌。\n身世悠悠何足问，冷笑置之而已。\n寻思起、从头翻悔。\n一日心期千劫在，后身缘、恐结他生里。\n然诺重，君须记。' },
  { title:'葬花吟', author:'曹雪芹', dynasty:'清', content:'花谢花飞花满天，红消香断有谁怜？\n游丝软系飘春榭，落絮轻沾扑绣帘。\n闺中女儿惜春暮，愁绪满怀无释处。\n手把花锄出绣帘，忍踏落花来复去。\n柳丝榆荚自芳菲，不管桃飘与李飞。\n桃李明年能再发，明年闺中知有谁？\n三月香巢已垒成，梁间燕子太无情！\n明年花发虽可啄，却不道人去梁空巢也倾。\n一年三百六十日，风刀霜剑严相逼。\n明媚鲜妍能几时？一朝飘泊难寻觅。\n花开易见落难寻，阶前闷杀葬花人。\n独倚花锄泪暗洒，洒上空枝见血痕。\n杜鹃无语正黄昏，荷锄归去掩重门。\n青灯照壁人初睡，冷雨敲窗被未温。\n怪奴底事倍伤神？半为怜春半恼春。\n怜春忽至恼忽去，至又无言去不闻。\n昨宵庭外悲歌发，知是花魂与鸟魂？\n花魂鸟魂总难留，鸟自无言花自羞。\n愿奴胁下生双翼，随花飞到天尽头。\n天尽头，何处有香丘？\n未若锦囊收艳骨，一抔净土掩风流。\n质本洁来还洁去，强于污淖陷渠沟。\n尔今死去侬收葬，未卜侬身何日丧？\n侬今葬花人笑痴，他年葬侬知是谁？\n试看春残花渐落，便是红颜老死时。\n一朝春尽红颜老，花落人亡两不知！' },
  { title:'红豆词', author:'曹雪芹', dynasty:'清', content:'滴不尽相思血泪抛红豆，开不完春柳春花满画楼。\n睡不稳纱窗风雨黄昏后，忘不了新愁与旧愁。\n咽不下玉粒金莼噎满喉，照不见菱花镜里形容瘦。\n展不开的眉头，捱不明的更漏。\n恰便似遮不住的青山隐隐，流不断的绿水悠悠。' },
  { title:'论诗·其二', author:'赵翼', dynasty:'清', content:'李杜诗篇万口传，至今已觉不新鲜。\n江山代有才人出，各领风骚数百年。' },
  { title:'苔', author:'袁枚', dynasty:'清', content:'白日不到处，青春恰自来。\n苔花如米小，也学牡丹开。' },
  { title:'遣兴', author:'袁枚', dynasty:'清', content:'爱好由来下笔难，一诗千改始心安。\n阿婆还似初笄女，头未梳成不许看。' },
  { title:'己亥杂诗·其二百二十', author:'龚自珍', dynasty:'清', content:'九州生气恃风雷，万马齐喑究可哀。\n我劝天公重抖擞，不拘一格降人才。' },
  { title:'如梦令·昨夜雨疏风骤', author:'李清照', dynasty:'宋', content:'昨夜雨疏风骤，浓睡不消残酒。\n试问卷帘人，却道海棠依旧。\n知否，知否？应是绿肥红瘦。' },
  { title:'一剪梅', author:'李清照', dynasty:'宋', content:'红藕香残玉簟秋。轻解罗裳，独上兰舟。\n云中谁寄锦书来，雁字回时，月满西楼。\n花自飘零水自流。一种相思，两处闲愁。\n此情无计可消除，才下眉头，却上心头。' },

  // ======== 扩编 — 唐诗续 + 诗经 + 汉魏 + 其他 ========
  { title:'古意呈补阙乔知之', author:'沈佺期', dynasty:'唐', content:'卢家少妇郁金堂，海燕双栖玳瑁梁。\n九月寒砧催木叶，十年征戍忆辽阳。\n白狼河北音书断，丹凤城南秋夜长。\n谁为含愁独不见，更教明月照流黄。' },
  { title:'送魏万之京', author:'李颀', dynasty:'唐', content:'朝闻游子唱离歌，昨夜微霜初渡河。\n鸿雁不堪愁里听，云山况是客中过。\n关城树色催寒近，御苑砧声向晚多。\n莫见长安行乐处，空令岁月易蹉跎。' },
  { title:'九日登望仙台呈刘明府容', author:'崔曙', dynasty:'唐', content:'汉文皇帝有高台，此日登临曙色开。\n三晋云山皆北向，二陵风雨自东来。\n关门令尹谁能识，河上仙翁去不回。\n且欲近寻彭泽宰，陶然共醉菊花杯。' },
  { title:'送李少府贬峡中王少府贬长沙', author:'高适', dynasty:'唐', content:'嗟君此别意何如，驻马衔杯问谪居。\n巫峡啼猿数行泪，衡阳归雁几封书。\n青枫江上秋帆远，白帝城边古木疏。\n圣代即今多雨露，暂时分手莫踌躇。' },
  { title:'奉和中书舍人贾至早朝大明宫', author:'岑参', dynasty:'唐', content:'鸡鸣紫陌曙光寒，莺啭皇州春色阑。\n金阙晓钟开万户，玉阶仙仗拥千官。\n花迎剑佩星初落，柳拂旌旗露未干。\n独有凤凰池上客，阳春一曲和皆难。' },
  { title:'和贾舍人早朝', author:'王维', dynasty:'唐', content:'绛帻鸡人送晓筹，尚衣方进翠云裘。\n九天阊阖开宫殿，万国衣冠拜冕旒。\n日色才临仙掌动，香烟欲傍衮龙浮。\n朝罢须裁五色诏，佩声归向凤池头。' },
  { title:'积雨辋川庄作', author:'王维', dynasty:'唐', content:'积雨空林烟火迟，蒸藜炊黍饷东菑。\n漠漠水田飞白鹭，阴阴夏木啭黄鹂。\n山中习静观朝槿，松下清斋折露葵。\n野老与人争席罢，海鸥何事更相疑。' },
  { title:'西塞山怀古', author:'刘禹锡', dynasty:'唐', content:'王濬楼船下益州，金陵王气黯然收。\n千寻铁锁沉江底，一片降幡出石头。\n人世几回伤往事，山形依旧枕寒流。\n今逢四海为家日，故垒萧萧芦荻秋。' },
  { title:'自河南经乱关内阻饥兄弟离散', author:'白居易', dynasty:'唐', content:'时难年荒世业空，弟兄羁旅各西东。\n田园寥落干戈后，骨肉流离道路中。\n吊影分为千里雁，辞根散作九秋蓬。\n共看明月应垂泪，一夜乡心五处同。' },
  { title:'锦瑟', author:'李商隐', dynasty:'唐', content:'锦瑟无端五十弦，一弦一柱思华年。\n庄生晓梦迷蝴蝶，望帝春心托杜鹃。\n沧海月明珠有泪，蓝田日暖玉生烟。\n此情可待成追忆？只是当时已惘然。' },
  { title:'无题·昨夜星辰昨夜风', author:'李商隐', dynasty:'唐', content:'昨夜星辰昨夜风，画楼西畔桂堂东。\n身无彩凤双飞翼，心有灵犀一点通。\n隔座送钩春酒暖，分曹射覆蜡灯红。\n嗟余听鼓应官去，走马兰台类转蓬。' },
  { title:'无题·来是空言去绝踪', author:'李商隐', dynasty:'唐', content:'来是空言去绝踪，月斜楼上五更钟。\n梦为远别啼难唤，书被催成墨未浓。\n蜡照半笼金翡翠，麝熏微度绣芙蓉。\n刘郎已恨蓬山远，更隔蓬山一万重。' },
  { title:'无题·飒飒东风细雨来', author:'李商隐', dynasty:'唐', content:'飒飒东风细雨来，芙蓉塘外有轻雷。\n金蟾啮锁烧香入，玉虎牵丝汲井回。\n贾氏窥帘韩掾少，宓妃留枕魏王才。\n春心莫共花争发，一寸相思一寸灰。' },
  { title:'筹笔驿', author:'李商隐', dynasty:'唐', content:'猿鸟犹疑畏简书，风云常为护储胥。\n徒令上将挥神笔，终见降王走传车。\n管乐有才原不忝，关张无命欲何如。\n他年锦里经祠庙，梁父吟成恨有余。' },
  { title:'春雨', author:'李商隐', dynasty:'唐', content:'怅卧新春白袷衣，白门寥落意多违。\n红楼隔雨相望冷，珠箔飘灯独自归。\n远路应悲春晼晚，残霄犹得梦依稀。\n玉珰缄札何由达，万里云罗一雁飞。' },
  { title:'利州南渡', author:'温庭筠', dynasty:'唐', content:'澹然空水对斜晖，曲岛苍茫接翠微。\n波上马嘶看棹去，柳边人歇待船归。\n数丛沙草群鸥散，万顷江田一鹭飞。\n谁解乘舟寻范蠡，五湖烟水独忘机。' },
  { title:'贫女', author:'秦韬玉', dynasty:'唐', content:'蓬门未识绮罗香，拟托良媒益自伤。\n谁爱风流高格调，共怜时世俭梳妆。\n敢将十指夸针巧，不把双眉斗画长。\n苦恨年年压金线，为他人作嫁衣裳。' },
  { title:'独不见', author:'沈佺期', dynasty:'唐', content:'卢家少妇郁金堂，海燕双栖玳瑁梁。\n九月寒砧催木叶，十年征戍忆辽阳。\n白狼河北音书断，丹凤城南秋夜长。\n谁为含愁独不见，更教明月照流黄。' },
  { title:'鹿柴', author:'王维', dynasty:'唐', content:'空山不见人，但闻人语响。\n返景入深林，复照青苔上。' },
  { title:'竹枝词·其二', author:'刘禹锡', dynasty:'唐', content:'楚水巴山江雨多，巴人能唱本乡歌。\n今朝北客思归去，回入纥那披绿罗。' },
  { title:'征人怨', author:'柳中庸', dynasty:'唐', content:'岁岁金河复玉关，朝朝马策与刀环。\n三春白雪归青冢，万里黄河绕黑山。' },
  { title:'宫词', author:'顾况', dynasty:'唐', content:'玉楼天半起笙歌，风送宫嫔笑语和。\n月殿影开闻夜漏，水晶帘卷近秋河。' },
  { title:'桃花溪', author:'张旭', dynasty:'唐', content:'隐隐飞桥隔野烟，石矶西畔问渔船。\n桃花尽日随流水，洞在清溪何处边。' },
  { title:'寄人', author:'张泌', dynasty:'唐', content:'别梦依依到谢家，小廊回合曲阑斜。\n多情只有春庭月，犹为离人照落花。' },
  { title:'滁州西涧', author:'韦应物', dynasty:'唐', content:'独怜幽草涧边生，上有黄鹂深树鸣。\n春潮带雨晚来急，野渡无人舟自横。' },
  { title:'寄李儋元锡', author:'韦应物', dynasty:'唐', content:'去年花里逢君别，今日花开已一年。\n世事茫茫难自料，春愁黯黯独成眠。\n身多疾病思田里，邑有流亡愧俸钱。\n闻道欲来相问讯，西楼望月几回圆。' },
  { title:'淮上喜会梁川故人', author:'韦应物', dynasty:'唐', content:'江汉曾为客，相逢每醉还。\n浮云一别后，流水十年间。\n欢笑情如旧，萧疏鬓已斑。\n何因不归去？淮上有秋山。' },
  { title:'赋得暮雨送李胄', author:'韦应物', dynasty:'唐', content:'楚江微雨里，建业暮钟时。\n漠漠帆来重，冥冥鸟去迟。\n海门深不见，浦树远含滋。\n相送情无限，沾襟比散丝。' },
  { title:'寻陆鸿渐不遇', author:'皎然', dynasty:'唐', content:'移家虽带郭，野径入桑麻。\n近种篱边菊，秋来未著花。\n扣门无犬吠，欲去问西家。\n报道山中去，归时每日斜。' },
  { title:'春山夜月', author:'于良史', dynasty:'唐', content:'春山多胜事，赏玩夜忘归。\n掬水月在手，弄花香满衣。\n兴来无远近，欲去惜芳菲。\n南望鸣钟处，楼台深翠微。' },
  { title:'没蕃故人', author:'张籍', dynasty:'唐', content:'前年伐月支，城下没全师。\n蕃汉断消息，死生长别离。\n无人收废帐，归马识残旗。\n欲祭疑君在，天涯哭此时。' },
  { title:'早秋', author:'许浑', dynasty:'唐', content:'遥夜泛清瑟，西风生翠萝。\n残萤栖玉露，早雁拂金河。\n高树晓还密，远山晴更多。\n淮南一叶下，自觉洞庭波。' },
  { title:'蝉', author:'李商隐', dynasty:'唐', content:'本以高难饱，徒劳恨费声。\n五更疏欲断，一树碧无情。\n薄宦梗犹泛，故园芜已平。\n烦君最相警，我亦举家清。' },
  { title:'风雨', author:'李商隐', dynasty:'唐', content:'凄凉宝剑篇，羁泊欲穷年。\n黄叶仍风雨，青楼自管弦。\n新知遭薄俗，旧好隔良缘。\n心断新丰酒，销愁斗几千。' },
  { title:'落花', author:'李商隐', dynasty:'唐', content:'高阁客竟去，小园花乱飞。\n参差连曲陌，迢递送斜晖。\n肠断未忍扫，眼穿仍欲归。\n芳心向春尽，所得是沾衣。' },
  { title:'凉思', author:'李商隐', dynasty:'唐', content:'客去波平槛，蝉休露满枝。\n永怀当此节，倚立自移时。\n北斗兼春远，南陵寓使迟。\n天涯占梦数，疑误有新知。' },
  { title:'北青萝', author:'李商隐', dynasty:'唐', content:'残阳西入崦，茅屋访孤僧。\n落叶人何在，寒云路几层。\n独敲初夜磬，闲倚一枝藤。\n世界微尘里，吾宁爱与憎。' },
  { title:'楚江怀古', author:'马戴', dynasty:'唐', content:'露气寒光集，微阳下楚丘。\n猿啼洞庭树，人在木兰舟。\n广泽生明月，苍山夹乱流。\n云中君不见，竟夕自悲秋。' },
  { title:'除夜有怀', author:'崔涂', dynasty:'唐', content:'迢递三巴路，羁危万里身。\n残雪和雁断，新雪带潮春。\n那堪正飘泊，明日岁华新。' },
  { title:'孤雁', author:'崔涂', dynasty:'唐', content:'几行归塞尽，念尔独何之。\n暮雨相呼失，寒塘欲下迟。\n渚云低暗度，关月冷相随。\n未必逢矰缴，孤飞自可疑。' },
  { title:'书边事', author:'张乔', dynasty:'唐', content:'调角断清秋，征人倚戍楼。\n春风对青冢，白日落梁州。\n大漠无兵阻，穷边有客游。\n蕃情似此水，长愿向南流。' },
  { title:'春宫怨', author:'杜荀鹤', dynasty:'唐', content:'早被婵娟误，欲妆临镜慵。\n承恩不在貌，教妾若为容。\n风暖鸟声碎，日高花影重。\n年年越溪女，相忆采芙蓉。' },
  { title:'章台夜思', author:'韦庄', dynasty:'唐', content:'清瑟怨遥夜，绕弦风雨哀。\n孤灯闻楚角，残月下章台。\n芳草已云暮，故人殊未来。\n乡书不可寄，秋雁又南回。' },
  { title:'寻南溪常山道人隐居', author:'刘长卿', dynasty:'唐', content:'一路经行处，莓苔见履痕。\n白云依静渚，春草闭闲门。\n过雨看松色，随山到水源。\n溪花与禅意，相对亦忘言。' },
  { title:'新年作', author:'刘长卿', dynasty:'唐', content:'乡心新岁切，天畔独潸然。\n老至居人下，春归在客先。\n岭猿同旦暮，江柳共风烟。\n已似长沙傅，从今又几年。' },
  { title:'谷口书斋寄杨补阙', author:'钱起', dynasty:'唐', content:'泉壑带茅茨，云霞生薜帷。\n竹怜新雨后，山爱夕阳时。\n闲鹭栖常早，秋花落更迟。\n家童扫萝径，昨与故人期。' },
  { title:'酬程延秋夜即事见赠', author:'韩翃', dynasty:'唐', content:'长簟迎风早，空城澹月华。\n星河秋一雁，砧杵夜千家。\n节候看应晚，心期卧亦赊。\n向来吟秀句，不觉已鸣鸦。' },
  { title:'阙题', author:'刘昚虚', dynasty:'唐', content:'道由白云尽，春与青溪长。\n时有落花至，远随流水香。\n闲门向山路，深柳读书堂。\n幽映每白日，清辉照衣裳。' },
  { title:'江乡故人偶集客舍', author:'戴叔伦', dynasty:'唐', content:'天秋月又满，城阙夜千重。\n还作江南会，翻疑梦里逢。\n风枝惊暗鹊，露草覆寒蛩。\n羁旅长堪醉，相留畏晓钟。' },
  { title:'送人东游', author:'温庭筠', dynasty:'唐', content:'荒戍落黄叶，浩然离故关。\n高风汉阳渡，初日郢门山。\n江上几人在，天涯孤棹还。\n何当重相见，尊酒慰离颜。' },
  { title:'灞上秋居', author:'马戴', dynasty:'唐', content:'灞原风雨定，晚见雁行频。\n落叶他乡树，寒灯独夜人。\n空园白露滴，孤壁野僧邻。\n寄卧郊扉久，何门致此身。' },
  { title:'玉台体', author:'权德舆', dynasty:'唐', content:'昨夜裙带解，今朝蟢子飞。\n铅华不可弃，莫是藁砧归。' },
  { title:'送上人', author:'刘长卿', dynasty:'唐', content:'孤云将野鹤，岂向人间住。\n莫买沃洲山，时人已知处。' },
  { title:'哥舒歌', author:'西鄙人', dynasty:'唐', content:'北斗七星高，哥舒夜带刀。\n至今窥牧马，不敢过临洮。' },
  { title:'长干行·其一', author:'崔颢', dynasty:'唐', content:'君家何处住，妾住在横塘。\n停船暂借问，或恐是同乡。' },
  { title:'长干行·其二', author:'崔颢', dynasty:'唐', content:'家临九江水，来去九江侧。\n同是长干人，生小不相识。' },
  { title:'后宫词', author:'白居易', dynasty:'唐', content:'泪湿罗巾梦不成，夜深前殿按歌声。\n红颜未老恩先断，斜倚薰笼坐到明。' },
  { title:'集灵台·其一', author:'张祜', dynasty:'唐', content:'日光斜照集灵台，红树花迎晓露开。\n昨夜上皇新授箓，太真含笑入帘来。' },
  { title:'集灵台·其二', author:'张祜', dynasty:'唐', content:'虢国夫人承主恩，平明骑马入宫门。\n却嫌脂粉污颜色，淡扫蛾眉朝至尊。' },
  { title:'赠内人', author:'张祜', dynasty:'唐', content:'禁门宫树月痕过，媚眼惟看宿鹭窠。\n斜拔玉钗灯影畔，剔开红焰救飞蛾。' },
  { title:'瑶瑟怨', author:'温庭筠', dynasty:'唐', content:'冰簟银床梦不成，碧天如水夜云轻。\n雁声远过潇湘去，十二楼中月自明。' },
  { title:'陇西行', author:'陈陶', dynasty:'唐', content:'誓扫匈奴不顾身，五千貂锦丧胡尘。\n可怜无定河边骨，犹是春闺梦里人。' },
  { title:'金陵图', author:'韦庄', dynasty:'唐', content:'江雨霏霏江草齐，六朝如梦鸟空啼。\n无情最是台城柳，依旧烟笼十里堤。' },
  { title:'已凉', author:'韩偓', dynasty:'唐', content:'碧阑干外绣帘垂，猩色屏风画折枝。\n八尺龙须方锦褥，已凉天气未寒时。' },
  { title:'春怨', author:'刘方平', dynasty:'唐', content:'纱窗日落渐黄昏，金屋无人见泪痕。\n寂寞空庭春欲晚，梨花满地不开门。' },
  { title:'月夜', author:'刘方平', dynasty:'唐', content:'更深月色半人家，北斗阑干南斗斜。\n今夜偏知春气暖，虫声新透绿窗纱。' },
  { title:'行宫', author:'元稹', dynasty:'唐', content:'寥落古行宫，宫花寂寞红。\n白头宫女在，闲坐说玄宗。' },
  { title:'何满子', author:'张祜', dynasty:'唐', content:'故国三千里，深宫二十年。\n一声何满子，双泪落君前。' },
  { title:'近试上张籍水部', author:'朱庆馀', dynasty:'唐', content:'洞房昨夜停红烛，待晓堂前拜舅姑。\n妆罢低声问夫婿，画眉深浅入时无。' },
  { title:'酬朱庆馀', author:'张籍', dynasty:'唐', content:'越女新妆出镜心，自知明艳更沉吟。\n齐纨未是人间贵，一曲菱歌敌万金。' },
  { title:'回乡偶书·其二', author:'贺知章', dynasty:'唐', content:'离别家乡岁月多，近来人事半消磨。\n惟有门前镜湖水，春风不改旧时波。' },
  { title:'桃花溪', author:'张旭', dynasty:'唐', content:'隐隐飞桥隔野烟，石矶西畔问渔船。\n桃花尽日随流水，洞在清溪何处边？' },
  { title:'山中留客', author:'张旭', dynasty:'唐', content:'山光物态弄春晖，莫为轻阴便拟归。\n纵使晴明无雨色，入云深处亦沾衣。' },
  { title:'移家别湖上亭', author:'戎昱', dynasty:'唐', content:'好是春风湖上亭，柳条藤蔓系离情。\n黄莺久住浑相识，欲别频啼四五声。' },
  { title:'柏林寺南望', author:'郎士元', dynasty:'唐', content:'溪上遥闻精舍钟，泊舟微径度深松。\n青山霁后云犹在，画出东南四五峰。' },
  { title:'听邻家吹笙', author:'郎士元', dynasty:'唐', content:'凤吹声如隔彩霞，不知墙外是谁家。\n重门深锁无寻处，疑有碧桃千树花。' },
  { title:'寒食', author:'韩翃', dynasty:'唐', content:'春城无处不飞花，寒食东风御柳斜。\n日暮汉宫传蜡烛，轻烟散入五侯家。' },
  { title:'江村即事', author:'司空曙', dynasty:'唐', content:'钓罢归来不系船，江村月落正堪眠。\n纵然一夜风吹去，只在芦花浅水边。' },
  { title:'巴女谣', author:'于鹄', dynasty:'唐', content:'巴女骑牛唱竹枝，藕丝菱叶傍江时。\n不愁日暮还家错，记得芭蕉出槿篱。' },
  { title:'夜上受降城闻笛', author:'李益', dynasty:'唐', content:'回乐峰前沙似雪，受降城外月如霜。\n不知何处吹芦管，一夜征人尽望乡。' },
  { title:'江南曲', author:'李益', dynasty:'唐', content:'嫁得瞿塘贾，朝朝误妾期。\n早知潮有信，嫁与弄潮儿。' },
  { title:'写情', author:'李益', dynasty:'唐', content:'水纹珍簟思悠悠，千里佳期一夕休。\n从此无心爱良夜，任他明月下西楼。' },
  { title:'十五夜望月', author:'王建', dynasty:'唐', content:'中庭地白树栖鸦，冷露无声湿桂花。\n今夜月明人尽望，不知秋思落谁家。' },
  { title:'雨过山村', author:'王建', dynasty:'唐', content:'雨里鸡鸣一两家，竹溪村路板桥斜。\n妇姑相唤浴蚕去，闲看中庭栀子花。' },
  { title:'南园·其五', author:'李贺', dynasty:'唐', content:'男儿何不带吴钩，收取关山五十州。\n请君暂上凌烟阁，若个书生万户侯？' },
  { title:'马诗·其五', author:'李贺', dynasty:'唐', content:'大漠沙如雪，燕山月似钩。\n何当金络脑，快走踏清秋。' },
  { title:'离思', author:'元稹', dynasty:'唐', content:'曾经沧海难为水，除却巫山不是云。\n取次花丛懒回顾，半缘修道半缘君。' },
  { title:'赠项斯', author:'杨敬之', dynasty:'唐', content:'几度见诗诗总好，及观标格过于诗。\n平生不解藏人善，到处逢人说项斯。' },
  { title:'剑客', author:'贾岛', dynasty:'唐', content:'十年磨一剑，霜刃未曾试。\n今日把示君，谁有不平事？' },
  { title:'题李凝幽居', author:'贾岛', dynasty:'唐', content:'闲居少邻并，草径入荒园。\n鸟宿池边树，僧敲月下门。\n过桥分野色，移石动云根。\n暂去还来此，幽期不负言。' },
  { title:'题都城南庄', author:'崔护', dynasty:'唐', content:'去年今日此门中，人面桃花相映红。\n人面不知何处去，桃花依旧笑春风。' },
  { title:'啰唝曲', author:'刘采春', dynasty:'唐', content:'不喜秦淮水，生憎江上船。\n载儿夫婿去，经岁又经年。' },
