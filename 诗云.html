  { title:'金缕衣', author:'杜秋娘', dynasty:'唐', content:'劝君莫惜金缕衣，劝君惜取少年时。\n花开堪折直须折，莫待无花空折枝。' },
  { title:'遣悲怀·其二', author:'元稹', dynasty:'唐', content:'昔日戏言身后意，今朝都到眼前来。\n衣裳已施行看尽，针线犹存未忍开。\n尚想旧情怜婢仆，也曾因梦送钱财。\n诚知此恨人人有，贫贱夫妻百事哀。' },
  { title:'春词', author:'刘禹锡', dynasty:'唐', content:'新妆宜面下朱楼，深锁春光一院愁。\n行到中庭数花朵，蜻蜓飞上玉搔头。' },
  { title:'月夜', author:'刘方平', dynasty:'唐', content:'更深月色半人家，北斗阑干南斗斜。\n今夜偏知春气暖，虫声新透绿窗纱。' },
  { title:'小至', author:'杜甫', dynasty:'唐', content:'天时人事日相催，冬至阳生春又来。\n刺绣五纹添弱线，吹葭六管动浮灰。\n岸容待腊将舒柳，山意冲寒欲放梅。\n云物不殊乡国异，教儿且覆掌中杯。' },
  { title:'咏怀古迹·其一', author:'杜甫', dynasty:'唐', content:'支离东北风尘际，漂泊西南天地间。\n三峡楼台淹日月，五溪衣服共云山。\n羯胡事主终无赖，词客哀时且未还。\n庾信平生最萧瑟，暮年诗赋动江关。' },
  { title:'咏怀古迹·其二', author:'杜甫', dynasty:'唐', content:'摇落深知宋玉悲，风流儒雅亦吾师。\n怅望千秋一洒泪，萧条异代不同时。\n江山故宅空文藻，云雨荒台岂梦思。\n最是楚宫俱泯灭，舟人指点到今疑。' },
  { title:'哀江头', author:'杜甫', dynasty:'唐', content:'少陵野老吞声哭，春日潜行曲江曲。\n江头宫殿锁千门，细柳新蒲为谁绿？\n忆昔霓旌下南苑，苑中万物生颜色。\n昭阳殿里第一人，同辇随君侍君侧。\n辇前才人带弓箭，白马嚼啮黄金勒。\n翻身向天仰射云，一笑正坠双飞翼。\n明眸皓齿今何在？血污游魂归不得。\n清渭东流剑阁深，去住彼此无消息。\n人生有情泪沾臆，江水江花岂终极！\n黄昏胡骑尘满城，欲往城南望城北。' },

  // ======== 扩编 — 近现代新诗 + 诗词续补 ========
  { title:'雨巷', author:'戴望舒', dynasty:'近现代', content:'撑着油纸伞，独自\n彷徨在悠长、悠长\n又寂寥的雨巷，\n我希望逢着\n一个丁香一样的\n结着愁怨的姑娘。\n她是有\n丁香一样的颜色，\n丁香一样的芬芳，\n丁香一样的忧愁，\n在雨中哀怨，\n哀怨又彷徨。\n她彷徨在这寂寥的雨巷，\n撑着油纸伞\n像我一样，\n像我一样地\n默默彳亍着，\n冷漠、凄清，又惆怅。' },
  { title:'死水', author:'闻一多', dynasty:'近现代', content:'这是一沟绝望的死水，\n清风吹不起半点漪沦。\n不如多扔些破铜烂铁，\n爽性泼你的剩菜残羹。\n也许铜的要绿成翡翠，\n铁罐上锈出几瓣桃花。\n再让油腻织一层罗绮，\n霉菌给他蒸出些云霞。\n让死水酵成一沟绿酒，\n漂满了珍珠似的白沫。\n小珠们笑声变成大珠，\n又被偷酒的花蚊咬破。\n那么一沟绝望的死水，\n也就夸得上几分鲜明。\n如果青蛙耐不住寂寞，\n又算死水叫出了歌声。\n这是一沟绝望的死水，\n这里断不是美的所在。\n不如让给丑恶来开垦，\n看它造出个什么世界。' },
  { title:'沙扬娜拉', author:'徐志摩', dynasty:'近现代', content:'最是那一低头的温柔，\n像一朵水莲花不胜凉风的娇羞，\n道一声珍重，道一声珍重，\n那一声珍重里有蜜甜的忧愁——\n沙扬娜拉！' },
  { title:'你是人间的四月天', author:'林徽因', dynasty:'近现代', content:'我说你是人间的四月天；\n笑响点亮了四面风；\n轻灵在春的光艳中交舞着变。\n你是四月早天里的云烟，\n黄昏吹着风的软，\n星子在无意中闪，\n细雨点洒在花前。\n那轻，那娉婷，你是，\n鲜妍百花的冠冕你戴着，\n你是天真，庄严，\n你是夜夜的月圆。\n雪化后那片鹅黄，你像；\n新鲜初放芽的绿，你是；\n柔嫩喜悦，\n水光浮动着你梦期待中白莲。\n你是一树一树的花开，\n是燕在梁间呢喃，\n——你是爱，是暖，是希望，\n你是人间的四月天！' },
  { title:'致橡树', author:'舒婷', dynasty:'近现代', content:'我如果爱你——\n绝不像攀援的凌霄花，\n借你的高枝炫耀自己；\n我如果爱你——\n绝不学痴情的鸟儿，\n为绿荫重复单调的歌曲；\n也不止像泉源，\n常年送来清凉的慰藉；\n也不止像险峰，\n增加你的高度，衬托你的威仪。\n甚至日光，甚至春雨。\n不，这些都还不够！\n我必须是你近旁的一株木棉，\n作为树的形象和你站在一起。\n根，紧握在地下；\n叶，相触在云里。\n每一阵风过，\n我们都互相致意，\n但没有人，听懂我们的言语。' },
  { title:'远和近', author:'顾城', dynasty:'近现代', content:'你，\n一会看我，\n一会看云。\n我觉得，\n你看我时很远，\n你看云时很近。' },
  { title:'一代人', author:'顾城', dynasty:'近现代', content:'黑夜给了我黑色的眼睛，\n我却用它寻找光明。' },
  { title:'春暖花开', author:'海子', dynasty:'近现代', content:'从明天起，做一个幸福的人\n喂马，劈柴，周游世界\n从明天起，关心粮食和蔬菜\n我有一所房子，面朝大海，春暖花开' },
  { title:'相信未来', author:'食指', dynasty:'近现代', content:'当蜘蛛网无情地查封了我的炉台，\n当灰烬的余烟叹息着贫困的悲哀，\n我依然固执地铺平失望的灰烬，\n用美丽的雪花写下：相信未来。\n当我的紫葡萄化为深秋的露水，\n当我的鲜花依偎在别人的情怀，\n我依然固执地用凝霜的枯藤，\n在凄凉的大地上写下：相信未来。\n我要用手指那涌向天边的排浪，\n我要用手掌那托住太阳的大海，\n摇曳着曙光那枝温暖漂亮的笔杆，\n用孩子的笔体写下：相信未来。' },
  { title:'有的人', author:'臧克家', dynasty:'近现代', content:'有的人活着，他已经死了；\n有的人死了，他还活着。\n有的人骑在人民头上："呵，我多伟大！"\n有的人俯下身子给人民当牛马。\n有的人把名字刻入石头，想"不朽"；\n有的人情愿作野草，等着地下的火烧。\n有的人他活着别人就不能活；\n有的人他活着为了多数人更好地活。' },
  { title:'老马', author:'臧克家', dynasty:'近现代', content:'总得叫大车装个够，\n它横竖不说一句话，\n背上的压力往肉里扣，\n它把头沉重地垂下！\n这刻不知道下刻的命，\n它有泪只往心里咽，\n眼里飘来一道鞭影，\n它抬起头望望前面。' },
  { title:'双桅船', author:'舒婷', dynasty:'近现代', content:'雾打湿了我的双翼\n可风却不容我再迟疑\n岸啊，心爱的岸\n昨天刚刚和你告别\n今天你又在这里\n明天我们将在\n另一个纬度相遇\n是一场风暴、一盏灯\n把我们联系在一起\n是另一场风暴、另一盏灯\n使我们再分东西\n不怕天涯海角\n岂在朝朝夕夕\n你在我的航程上\n我在你的视线里' },
  { title:'雪花的快乐', author:'徐志摩', dynasty:'近现代', content:'假如我是一朵雪花，\n翩翩的在半空里潇洒，\n我一定认清我的方向——\n飞扬，飞扬，飞扬，\n这地面上有我的方向。\n不去那冷寞的幽谷，\n不去那凄清的山麓，\n也不上荒街去惆怅——\n飞扬，飞扬，飞扬，\n——你看，我有我的方向！\n在半空里娟娟的飞舞，\n认明了那清幽的住处，\n等着她来花园里探望——\n飞扬，飞扬，飞扬，\n——啊，她身上有朱砂梅的清香！\n那时我凭藉我的身轻，\n盈盈的，沾住了她的衣襟，\n贴近她柔波似的心胸——\n消溶，消溶，消溶——\n溶入了她柔波似的心胸！' },
  { title:'纸船', author:'冰心', dynasty:'近现代', content:'我从不肯妄弃了一张纸，\n总是留着——留着，\n叠成一只一只很小的船儿，\n从舟上抛下在海里。\n有的被天风吹卷到舟中的窗里，\n有的被海浪打湿，沾在船头上。\n我仍是不灰心的每天的叠着，\n总希望有一只能流到我要它到的地方去。\n母亲，倘若你梦中看见一只很小的白船儿，\n不要惊讶它无端入梦。\n这是你至爱的女儿含着泪叠的，\n万水千山，求它载着她的爱和悲哀归去。' },

  // ======== 扩编五 — 诗经·楚辞·汉魏六朝补遗 ========
  { title:'关雎', author:'佚名', dynasty:'先秦', content:'关关雎鸠，在河之洲。\n窈窕淑女，君子好逑。\n参差荇菜，左右流之。\n窈窕淑女，寤寐求之。\n求之不得，寤寐思服。\n悠哉悠哉，辗转反侧。\n参差荇菜，左右采之。\n窈窕淑女，琴瑟友之。\n参差荇菜，左右芼之。\n窈窕淑女，钟鼓乐之。' },
  { title:'汉广', author:'佚名', dynasty:'先秦', content:'南有乔木，不可休思。\n汉有游女，不可求思。\n汉之广矣，不可泳思。\n江之永矣，不可方思。\n翘翘错薪，言刈其楚。\n之子于归，言秣其马。\n汉之广矣，不可泳思。\n江之永矣，不可方思。' },
  { title:'摽有梅', author:'佚名', dynasty:'先秦', content:'摽有梅，其实七兮。\n求我庶士，迨其吉兮。\n摽有梅，其实三兮。\n求我庶士，迨其今兮。\n摽有梅，顷筐塈之。\n求我庶士，迨其谓之。' },
  { title:'野有死麕', author:'佚名', dynasty:'先秦', content:'野有死麕，白茅包之。\n有女怀春，吉士诱之。\n林有朴樕，野有死鹿。\n白茅纯束，有女如玉。\n舒而脱脱兮，无感我帨兮，无使尨也吠。' },
  { title:'燕燕', author:'佚名', dynasty:'先秦', content:'燕燕于飞，差池其羽。\n之子于归，远送于野。\n瞻望弗及，泣涕如雨。\n燕燕于飞，颉之颃之。\n之子于归，远于将之。\n瞻望弗及，伫立以泣。' },
  { title:'击鼓', author:'佚名', dynasty:'先秦', content:'击鼓其镗，踊跃用兵。\n土国城漕，我独南行。\n从孙子仲，平陈与宋。\n不我以归，忧心有忡。\n爰居爰处？爰丧其马？\n于以求之？于林之下。\n死生契阔，与子成说。\n执子之手，与子偕老。\n于嗟阔兮，不我活兮。\n于嗟洵兮，不我信兮。' },
  { title:'雄雉', author:'佚名', dynasty:'先秦', content:'雄雉于飞，泄泄其羽。\n我之怀矣，自诒伊阻。\n雄雉于飞，下上其音。\n展矣君子，实劳我心。\n瞻彼日月，悠悠我思。\n道之云远，曷云能来？' },
  { title:'式微', author:'佚名', dynasty:'先秦', content:'式微，式微，胡不归？\n微君之故，胡为乎中露！\n式微，式微，胡不归？\n微君之躬，胡为乎泥中！' },
  { title:'北门', author:'佚名', dynasty:'先秦', content:'出自北门，忧心殷殷。\n终窭且贫，莫知我艰。\n已焉哉！天实为之，谓之何哉！\n王事适我，政事一埤益我。\n我入自外，室人交徧谪我。\n已焉哉！天实为之，谓之何哉！' },
  { title:'相鼠', author:'佚名', dynasty:'先秦', content:'相鼠有皮，人而无仪！\n人而无仪，不死何为？\n相鼠有齿，人而无止！\n人而无止，不死何俟？\n相鼠有体，人而无礼！\n人而无礼，胡不遄死？' },
  { title:'淇奥', author:'佚名', dynasty:'先秦', content:'瞻彼淇奥，绿竹猗猗。\n有匪君子，如切如磋，如琢如磨。\n瑟兮僴兮，赫兮咺兮。\n有匪君子，终不可谖兮。\n瞻彼淇奥，绿竹青青。\n有匪君子，充耳琇莹，会弁如星。\n瑟兮僴兮，赫兮咺兮。\n有匪君子，终不可谖兮。' },
  { title:'考槃', author:'佚名', dynasty:'先秦', content:'考槃在涧，硕人之宽。\n独寐寤言，永矢弗谖。\n考槃在阿，硕人之薖。\n独寐寤歌，永矢弗过。\n考槃在陆，硕人之轴。\n独寐寤宿，永矢弗告。' },
  { title:'山鬼', author:'屈原', dynasty:'先秦', content:'若有人兮山之阿，被薜荔兮带女萝。\n既含睇兮又宜笑，子慕予兮善窈窕。\n乘赤豹兮从文狸，辛夷车兮结桂旗。\n被石兰兮带杜衡，折芳馨兮遗所思。\n余处幽篁兮终不见天，路险难兮独后来。\n表独立兮山之上，云容容兮而在下。\n杳冥冥兮羌昼晦，东风飘兮神灵雨。\n留灵修兮憺忘归，岁既晏兮孰华予。' },
  { title:'国殇', author:'屈原', dynasty:'先秦', content:'操吴戈兮被犀甲，车错毂兮短兵接。\n旌蔽日兮敌若云，矢交坠兮士争先。\n凌余阵兮躐余行，左骖殪兮右刃伤。\n霾两轮兮絷四马，援玉枹兮击鸣鼓。\n天时怼兮威灵怒，严杀尽兮弃原野。\n出不入兮往不反，平原忽兮路超远。\n带长剑兮挟秦弓，首身离兮心不惩。\n诚既勇兮又以武，终刚强兮不可凌。\n身既死兮神以灵，子魂魄兮为鬼雄。' },
  { title:'少司命', author:'屈原', dynasty:'先秦', content:'秋兰兮麋芜，罗生兮堂下。\n绿叶兮素华，芳菲菲兮袭予。\n夫人自有兮美子，荪何以兮愁苦？\n秋兰兮青青，绿叶兮紫茎。\n满堂兮美人，忽独与余兮目成。\n入不言兮出不辞，乘回风兮载云旗。\n悲莫悲兮生别离，乐莫乐兮新相知。' },
  { title:'东君', author:'屈原', dynasty:'先秦', content:'暾将出兮东方，照吾槛兮扶桑。\n抚余马兮安驱，夜皎皎兮既明。\n驾龙辀兮乘雷，载云旗兮委蛇。\n长太息兮将上，心低徊兮顾怀。\n羌声色兮娱人，观者憺兮忘归。' },
  { title:'西北有高楼', author:'佚名', dynasty:'汉', content:'西北有高楼，上与浮云齐。\n交疏结绮窗，阿阁三重阶。\n上有弦歌声，音响一何悲！\n谁能为此曲，无乃杞梁妻。\n清商随风发，中曲正徘徊。\n一弹再三叹，慷慨有余哀。\n不惜歌者苦，但伤知音稀。\n愿为双鸿鹄，奋翅起高飞。' },
  { title:'庭中有奇树', author:'佚名', dynasty:'汉', content:'庭中有奇树，绿叶发华滋。\n攀条折其荣，将以遗所思。\n馨香盈怀袖，路远莫致之。\n此物何足贵，但感别经时。' },
  { title:'明月何皎皎', author:'佚名', dynasty:'汉', content:'明月何皎皎，照我罗床纬。\n忧愁不能寐，揽衣起徘徊。\n客行虽云乐，不如早旋归。\n出户独彷徨，愁思当告谁！\n引领还入房，泪下沾裳衣。' },
  { title:'生年不满百', author:'佚名', dynasty:'汉', content:'生年不满百，常怀千岁忧。\n昼短苦夜长，何不秉烛游！\n为乐当及时，何能待来兹？\n愚者爱惜费，但为后世嗤。\n仙人王子乔，难可与等期。' },
  { title:'客从远方来', author:'佚名', dynasty:'汉', content:'客从远方来，遗我一端绮。\n相去万余里，故人心尚尔。\n文彩双鸳鸯，裁为合欢被。\n著以长相思，缘以结不解。\n以胶投漆中，谁能别离此？' },
  { title:'十五从军征', author:'佚名', dynasty:'汉', content:'十五从军征，八十始得归。\n道逢乡里人："家中有阿谁？"\n"遥看是君家，松柏冢累累。"\n兔从狗窦入，雉从梁上飞。\n中庭生旅谷，井上生旅葵。\n舂谷持作饭，采葵持作羹。\n羹饭一时熟，不知贻阿谁。\n出门东向看，泪落沾我衣。' },
  { title:'蒿里行', author:'曹操', dynasty:'汉末', content:'关东有义士，兴兵讨群凶。\n初期会盟津，乃心在咸阳。\n军合力不齐，踌躇而雁行。\n势利使人争，嗣还自相戕。\n淮南弟称号，刻玺于北方。\n铠甲生虮虱，万姓以死亡。\n白骨露于野，千里无鸡鸣。\n生民百遗一，念之断人肠。' },
  { title:'赠从弟·其二', author:'刘桢', dynasty:'汉末', content:'亭亭山上松，瑟瑟谷中风。\n风声一何盛，松枝一何劲！\n冰霜正惨凄，终岁常端正。\n岂不罹凝寒，松柏有本性。' },
  { title:'七哀诗', author:'王粲', dynasty:'汉末', content:'西京乱无象，豺虎方遘患。\n复弃中国去，委身适荆蛮。\n亲戚对我悲，朋友相追攀。\n出门无所见，白骨蔽平原。\n路有饥妇人，抱子弃草间。\n顾闻号泣声，挥涕独不还。\n"未知身死处，何能两相完？"\n驱马弃之去，不忍听此言。\n南登霸陵岸，回首望长安。\n悟彼下泉人，喟然伤心肝。' },
  { title:'白马篇', author:'曹植', dynasty:'三国', content:'白马饰金羁，连翩西北驰。\n借问谁家子？幽并游侠儿。\n少小去乡邑，扬声沙漠垂。\n宿昔秉良弓，楛矢何参差。\n控弦破左的，右发摧月支。\n仰手接飞猱，俯身散马蹄。\n狡捷过猴猿，勇剽若豹螭。\n边城多警急，虏骑数迁移。\n羽檄从北来，厉马登高堤。\n长驱蹈匈奴，左顾凌鲜卑。\n弃身锋刃端，性命安可怀？\n父母且不顾，何言子与妻！\n名编壮士籍，不得中顾私。\n捐躯赴国难，视死忽如归！' },
  { title:'归园田居·其二', author:'陶渊明', dynasty:'东晋', content:'野外罕人事，穷巷寡轮鞅。\n白日掩荆扉，虚室绝尘想。\n时复墟曲中，披草共来往。\n相见无杂言，但道桑麻长。\n桑麻日已长，我土日已广。\n常恐霜霰至，零落同草莽。' },
  { title:'移居·其一', author:'陶渊明', dynasty:'东晋', content:'昔欲居南村，非为卜其宅。\n闻多素心人，乐与数晨夕。\n怀此颇有年，今日从兹役。\n敝庐何必广，取足蔽床席。\n邻曲时时来，抗言谈在昔。\n奇文共欣赏，疑义相与析。' },
  { title:'杂诗·其一', author:'陶渊明', dynasty:'东晋', content:'人生无根蒂，飘如陌上尘。\n分散逐风转，此已非常身。\n落地为兄弟，何必骨肉亲！\n得欢当作乐，斗酒聚比邻。\n盛年不重来，一日难再晨。\n及时当勉励，岁月不待人。' },
  { title:'读山海经·其十', author:'陶渊明', dynasty:'东晋', content:'精卫衔微木，将以填沧海。\n刑天舞干戚，猛志固常在。\n同物既无虑，化去不复悔。\n徒设在昔心，良辰讵可待。' },
  { title:'归去来兮辞（节选）', author:'陶渊明', dynasty:'东晋', content:'归去来兮，田园将芜胡不归？\n既自以心为形役，奚惆怅而独悲？\n悟已往之不谏，知来者之可追。\n实迷途其未远，觉今是而昨非。\n舟遥遥以轻飏，风飘飘而吹衣。\n问征夫以前路，恨晨光之熹微。' },
  { title:'西湖曲', author:'佚名', dynasty:'南朝', content:'忆梅下西洲，折梅寄江北。\n单衫杏子红，双鬓鸦雏色。\n西洲在何处？两桨桥头渡。\n日暮伯劳飞，风吹乌臼树。\n树下即门前，门中露翠钿。\n开门郎不至，出门采红莲。\n采莲南塘秋，莲花过人头。\n低头弄莲子，莲子清如水。\n置莲怀袖中，莲心彻底红。\n忆郎郎不至，仰首望飞鸿。' },
  { title:'子夜歌', author:'佚名', dynasty:'南朝', content:'夜长不得眠，明月何灼灼。\n想闻散唤声，虚应空中诺。' },

  // ======== 扩编六 — 精选千家诗续 ========
  { title:'登岳阳楼', author:'杜甫', dynasty:'唐', content:'昔闻洞庭水，今上岳阳楼。\n吴楚东南坼，乾坤日夜浮。\n亲朋无一字，老病有孤舟。\n戎马关山北，凭轩涕泗流。' },
  { title:'赠孟浩然', author:'李白', dynasty:'唐', content:'吾爱孟夫子，风流天下闻。\n红颜弃轩冕，白首卧松云。\n醉月频中圣，迷花不事君。\n高山安可仰，徒此揖清芬。' },
  { title:'渡湘江', author:'杜审言', dynasty:'唐', content:'迟日园林悲昔游，今春花鸟作边愁。\n独怜京国人南窜，不似湘江水北流。' },
  { title:'题大庾岭北驿', author:'宋之问', dynasty:'唐', content:'阳月南飞雁，传闻至此回。\n我行殊未已，何日复归来。\n江静潮初落，林昏瘴不开。\n明朝望乡处，应见陇头梅。' },
  { title:'感遇·其一', author:'张九龄', dynasty:'唐', content:'兰叶春葳蕤，桂华秋皎洁。\n欣欣此生意，自尔为佳节。\n谁知林栖者，闻风坐相悦。\n草木有本心，何求美人折？' },
  { title:'感遇·其二', author:'张九龄', dynasty:'唐', content:'江南有丹橘，经冬犹绿林。\n岂伊地气暖，自有岁寒心。\n可以荐嘉客，奈何阻重深。\n运命惟所遇，循环不可寻。\n徒言树桃李，此木岂无阴？' },
  { title:'与高适薛据登慈恩寺浮图', author:'岑参', dynasty:'唐', content:'塔势如涌出，孤高耸天宫。\n登临出世界，磴道盘虚空。\n突兀压神州，峥嵘如鬼工。\n四角碍白日，七层摩苍穹。\n下窥指高鸟，俯听闻惊风。\n连山若波涛，奔走似朝东。' },
  { title:'贼退示官吏', author:'元结', dynasty:'唐', content:'昔岁逢太平，山林二十年。\n泉源在庭户，洞壑当门前。\n井税有常期，日晏犹得眠。\n忽然遭世变，数岁亲戎旃。\n今来典斯郡，山夷又纷然。\n城小贼不屠，人贫伤可怜。\n是以陷邻境，此州独见全。\n使臣将王命，岂不如贼焉？\n今彼征敛者，迫之如火煎。\n谁能绝人命，以作时世贤？' },
  { title:'渔翁', author:'柳宗元', dynasty:'唐', content:'渔翁夜傍西岩宿，晓汲清湘燃楚竹。\n烟销日出不见人，欸乃一声山水绿。\n回看天际下中流，岩上无心云相逐。' },
  { title:'晨诣超师院读禅经', author:'柳宗元', dynasty:'唐', content:'汲井漱寒齿，清心拂尘服。\n闲持贝叶书，步出东斋读。\n真源了无取，妄迹世所逐。\n遗言冀可冥，缮性何由熟。\n道人庭宇静，苔色连深竹。\n日出雾露余，青松如膏沐。\n澹然离言说，悟悦心自足。' },
  { title:'山石', author:'韩愈', dynasty:'唐', content:'山石荦确行径微，黄昏到寺蝙蝠飞。\n升堂坐阶新雨足，芭蕉叶大栀子肥。\n僧言古壁佛画好，以火来照所见稀。\n铺床拂席置羹饭，疏粝亦足饱我饥。\n夜深静卧百虫绝，清月出岭光入扉。\n天明独去无道路，出入高下穷烟霏。\n山红涧碧纷烂漫，时见松枥皆十围。\n当流赤足踏涧石，水声激激风吹衣。\n人生如此自可乐，岂必局束为人鞿？\n嗟哉吾党二三子，安得至老不更归！' },
  { title:'八月十五夜赠张功曹', author:'韩愈', dynasty:'唐', content:'纤云四卷天无河，清风吹空月舒波。\n沙平水息声影绝，一杯相属君当歌。\n君歌声酸辞且苦，不能听终泪如雨。\n洞庭连天九疑高，蛟龙出没猩鼯号。\n十生九死到官所，幽居默默如藏逃。\n下床畏蛇食畏药，海气湿蛰熏腥臊。\n昨者州前捶大鼓，嗣皇继圣登夔皋。\n赦书一日行万里，罪从大辟皆除死。\n迁者追回流者还，涤瑕荡垢清朝班。\n州家申名使家抑，坎轲只得移荆蛮。\n判司卑官不堪说，未免捶楚尘埃间。\n同时辈流多上道，天路幽险难追攀。' },
  { title:'调张籍', author:'韩愈', dynasty:'唐', content:'李杜文章在，光焰万丈长。\n不知群儿愚，那用故谤伤。\n蚍蜉撼大树，可笑不自量。\n伊我生其后，举颈遥相望。\n夜梦多见之，昼思反微茫。\n徒观斧凿痕，不瞩治水航。\n想当施手时，巨刃磨天扬。\n垠崖划崩豁，乾坤摆雷硠。' },
  { title:'左迁至蓝关示侄孙湘', author:'韩愈', dynasty:'唐', content:'一封朝奏九重天，夕贬潮阳路八千。\n欲为圣明除弊事，肯将衰朽惜残年。\n云横秦岭家何在？雪拥蓝关马不前。\n知汝远来应有意，好收吾骨瘴江边。' },
  { title:'草', author:'白居易', dynasty:'唐', content:'离离原上草，一岁一枯荣。\n野火烧不尽，春风吹又生。\n远芳侵古道，晴翠接荒城。\n又送王孙去，萋萋满别情。' },
  { title:'轻肥', author:'白居易', dynasty:'唐', content:'意气骄满路，鞍马光照尘。\n借问何为者，人称是内臣。\n朱绂皆大夫，紫绶或将军。\n夸赴军中宴，走马去如云。\n樽罍溢九酝，水陆罗八珍。\n果擘洞庭橘，脍切天池鳞。\n食饱心自若，酒酣气益振。\n是岁江南旱，衢州人食人。' },
  { title:'放言·其三', author:'白居易', dynasty:'唐', content:'赠君一法决狐疑，不用钻龟与祝蓍。\n试玉要烧三日满，辨材须待七年期。\n周公恐惧流言日，王莽谦恭未篡时。\n向使当初身便死，一生真伪复谁知？' },
  { title:'南浦别', author:'白居易', dynasty:'唐', content:'南浦凄凄别，西风袅袅秋。\n一看肠一断，好去莫回头。' },
  { title:'望月有感', author:'白居易', dynasty:'唐', content:'时难年荒世业空，弟兄羁旅各西东。\n田园寥落干戈后，骨肉流离道路中。\n吊影分为千里雁，辞根散作九秋蓬。\n共看明月应垂泪，一夜乡心五处同。' },
  { title:'游子吟', author:'孟郊', dynasty:'唐', content:'慈母手中线，游子身上衣。\n临行密密缝，意恐迟迟归。\n谁言寸草心，报得三春晖。' },
  { title:'登科后', author:'孟郊', dynasty:'唐', content:'昔日龌龊不足夸，今朝放荡思无涯。\n春风得意马蹄疾，一日看尽长安花。' },
  { title:'竹枝词', author:'刘禹锡', dynasty:'唐', content:'杨柳青青江水平，闻郎江上唱歌声。\n东边日出西边雨，道是无晴却有晴。' },
  { title:'石头城', author:'刘禹锡', dynasty:'唐', content:'山围故国周遭在，潮打空城寂寞回。\n淮水东边旧时月，夜深还过女墙来。' },
  { title:'再游玄都观', author:'刘禹锡', dynasty:'唐', content:'百亩庭中半是苔，桃花净尽菜花开。\n种桃道士归何处？前度刘郎今又来。' },
  { title:'过华清宫绝句', author:'杜牧', dynasty:'唐', content:'长安回望绣成堆，山顶千门次第开。\n一骑红尘妃子笑，无人知是荔枝来。' },
  { title:'将赴吴兴登乐游原', author:'杜牧', dynasty:'唐', content:'清时有味是无能，闲爱孤云静爱僧。\n欲把一麾江海去，乐游原上望昭陵。' },
  { title:'寄扬州韩绰判官', author:'杜牧', dynasty:'唐', content:'青山隐隐水迢迢，秋尽江南草未凋。\n二十四桥明月夜，玉人何处教吹箫。' },
  { title:'遣怀', author:'杜牧', dynasty:'唐', content:'落魄江湖载酒行，楚腰纤细掌中轻。\n十年一觉扬州梦，赢得青楼薄幸名。' },
  { title:'秋夕', author:'杜牧', dynasty:'唐', content:'银烛秋光冷画屏，轻罗小扇扑流萤。\n天阶夜色凉如水，卧看牵牛织女星。' },
  { title:'寄令狐郎中', author:'李商隐', dynasty:'唐', content:'嵩云秦树久离居，双鲤迢迢一纸书。\n休问梁园旧宾客，茂陵秋雨病相如。' },
  { title:'杜司勋', author:'李商隐', dynasty:'唐', content:'高楼风雨感斯文，短翼差池不及群。\n刻意伤春复伤别，人间惟有杜司勋。' },
  { title:'泊秦淮', author:'杜牧', dynasty:'唐', content:'烟笼寒水月笼沙，夜泊秦淮近酒家。\n商女不知亡国恨，隔江犹唱后庭花。' },
  { title:'山行', author:'杜牧', dynasty:'唐', content:'远上寒山石径斜，白云生处有人家。\n停车坐爱枫林晚，霜叶红于二月花。' },
  { title:'题乌江亭', author:'杜牧', dynasty:'唐', content:'胜败兵家事不期，包羞忍耻是男儿。\n江东子弟多才俊，卷土重来未可知。' },
  { title:'长安秋望', author:'赵嘏', dynasty:'唐', content:'云物凄凉拂曙流，汉家宫阙动高秋。\n残星几点雁横塞，长笛一声人倚楼。\n紫艳半开篱菊静，红衣落尽渚莲愁。\n鲈鱼正美不归去，空戴南冠学楚囚。' },
  { title:'望月怀远', author:'张九龄', dynasty:'唐', content:'海上生明月，天涯共此时。\n情人怨遥夜，竟夕起相思。\n灭烛怜光满，披衣觉露滋。\n不堪盈手赠，还寝梦佳期。' },
  { title:'芙蓉楼送辛渐', author:'王昌龄', dynasty:'唐', content:'寒雨连江夜入吴，平明送客楚山孤。\n洛阳亲友如相问，一片冰心在玉壶。' },
  { title:'出塞', author:'王昌龄', dynasty:'唐', content:'秦时明月汉时关，万里长征人未还。\n但使龙城飞将在，不教胡马度阴山。' },
  { title:'从军行', author:'王昌龄', dynasty:'唐', content:'青海长云暗雪山，孤城遥望玉门关。\n黄沙百战穿金甲，不破楼兰终不还。' },
  { title:'新嫁娘', author:'王建', dynasty:'唐', content:'三日入厨下，洗手作羹汤。\n未谙姑食性，先遣小姑尝。' },
  { title:'赠别', author:'杜牧', dynasty:'唐', content:'多情却似总无情，唯觉樽前笑不成。\n蜡烛有心还惜别，替人垂泪到天明。' },
  { title:'无题', author:'李商隐', dynasty:'唐', content:'相见时难别亦难，东风无力百花残。\n春蚕到死丝方尽，蜡炬成灰泪始干。\n晓镜但愁云鬓改，夜吟应觉月光寒。\n蓬山此去无多路，青鸟殷勤为探看。' },
  { title:'贾生', author:'李商隐', dynasty:'唐', content:'宣室求贤访逐臣，贾生才调更无伦。\n可怜夜半虚前席，不问苍生问鬼神。' },
  { title:'夜雨寄北', author:'李商隐', dynasty:'唐', content:'君问归期未有期，巴山夜雨涨秋池。\n何当共剪西窗烛，却话巴山夜雨时。' },
  { title:'嫦娥', author:'李商隐', dynasty:'唐', content:'云母屏风烛影深，长河渐落晓星沉。\n嫦娥应悔偷灵药，碧海青天夜夜心。' },
  { title:'秋词', author:'刘禹锡', dynasty:'唐', content:'自古逢秋悲寂寥，我言秋日胜春朝。\n晴空一鹤排云上，便引诗情到碧霄。' },
  { title:'浪淘沙', author:'刘禹锡', dynasty:'唐', content:'九曲黄河万里沙，浪淘风簸自天涯。\n如今直上银河去，同到牵牛织女家。' },
  { title:'望洞庭', author:'刘禹锡', dynasty:'唐', content:'湖光秋月两相和，潭面无风镜未磨。\n遥望洞庭山水翠，白银盘里一青螺。' },
  { title:'赋得古原草送别', author:'白居易', dynasty:'唐', content:'离离原上草，一岁一枯荣。\n野火烧不尽，春风吹又生。\n远芳侵古道，晴翠接荒城。\n又送王孙去，萋萋满别情。' },
  { title:'悯农·其一', author:'李绅', dynasty:'唐', content:'春种一粒粟，秋收万颗子。\n四海无闲田，农夫犹饿死。' },
  { title:'悯农·其二', author:'李绅', dynasty:'唐', content:'锄禾日当午，汗滴禾下土。\n谁知盘中餐，粒粒皆辛苦。' },
  { title:'江雪', author:'柳宗元', dynasty:'唐', content:'千山鸟飞绝，万径人踪灭。\n孤舟蓑笠翁，独钓寒江雪。' },
  { title:'寻隐者不遇', author:'贾岛', dynasty:'唐', content:'松下问童子，言师采药去。\n只在此山中，云深不知处。' },
  { title:'枫桥夜泊', author:'张继', dynasty:'唐', content:'月落乌啼霜满天，江枫渔火对愁眠。\n姑苏城外寒山寺，夜半钟声到客船。' },
  { title:'滁州西涧', author:'韦应物', dynasty:'唐', content:'独怜幽草涧边生，上有黄鹂深树鸣。\n春潮带雨晚来急，野渡无人舟自横。' },
  { title:'塞下曲', author:'卢纶', dynasty:'唐', content:'月黑雁飞高，单于夜遁逃。\n欲将轻骑逐，大雪满弓刀。' },
  { title:'江南逢李龟年', author:'杜甫', dynasty:'唐', content:'岐王宅里寻常见，崔九堂前几度闻。\n正是江南好风景，落花时节又逢君。' },
  { title:'春望', author:'杜甫', dynasty:'唐', content:'国破山河在，城春草木深。\n感时花溅泪，恨别鸟惊心。\n烽火连三月，家书抵万金。\n白头搔更短，浑欲不胜簪。' },
  { title:'登高', author:'杜甫', dynasty:'唐', content:'风急天高猿啸哀，渚清沙白鸟飞回。\n无边落木萧萧下，不尽长江滚滚来。\n万里悲秋常作客，百年多病独登台。\n艰难苦恨繁霜鬓，潦倒新停浊酒杯。' },
  { title:'闻官军收河南河北', author:'杜甫', dynasty:'唐', content:'剑外忽传收蓟北，初闻涕泪满衣裳。\n却看妻子愁何在，漫卷诗书喜欲狂。\n白日放歌须纵酒，青春作伴好还乡。\n即从巴峡穿巫峡，便下襄阳向洛阳。' },
  { title:'绝句', author:'杜甫', dynasty:'唐', content:'两个黄鹂鸣翠柳，一行白鹭上青天。\n窗含西岭千秋雪，门泊东吴万里船。' },
  { title:'蜀相', author:'杜甫', dynasty:'唐', content:'丞相祠堂何处寻，锦官城外柏森森。\n映阶碧草自春色，隔叶黄鹂空好音。\n三顾频烦天下计，两朝开济老臣心。\n出师未捷身先死，长使英雄泪满襟。' },
  { title:'客至', author:'杜甫', dynasty:'唐', content:'舍南舍北皆春水，但见群鸥日日来。\n花径不曾缘客扫，蓬门今始为君开。\n盘飧市远无兼味，樽酒家贫只旧醅。\n肯与邻翁相对饮，隔篱呼取尽余杯。' },
  { title:'春夜喜雨', author:'杜甫', dynasty:'唐', content:'好雨知时节，当春乃发生。\n随风潜入夜，润物细无声。\n野径云俱黑，江船火独明。\n晓看红湿处，花重锦官城。' },
  { title:'望岳', author:'杜甫', dynasty:'唐', content:'岱宗夫如何？齐鲁青未了。\n造化钟神秀，阴阳割昏晓。\n荡胸生曾云，决眦入归鸟。\n会当凌绝顶，一览众山小。' },
  { title:'旅夜书怀', author:'杜甫', dynasty:'唐', content:'细草微风岸，危樯独夜舟。\n星垂平野阔，月涌大江流。\n名岂文章著，官应老病休。\n飘飘何所似，天地一沙鸥。' },
  { title:'静夜思', author:'李白', dynasty:'唐', content:'床前明月光，疑是地上霜。\n举头望明月，低头思故乡。' },
  { title:'望庐山瀑布', author:'李白', dynasty:'唐', content:'日照香炉生紫烟，遥看瀑布挂前川。\n飞流直下三千尺，疑是银河落九天。' },
  { title:'赠汪伦', author:'李白', dynasty:'唐', content:'李白乘舟将欲行，忽闻岸上踏歌声。\n桃花潭水深千尺，不及汪伦送我情。' },
  { title:'送孟浩然之广陵', author:'李白', dynasty:'唐', content:'故人西辞黄鹤楼，烟花三月下扬州。\n孤帆远影碧空尽，唯见长江天际流。' },
  { title:'早发白帝城', author:'李白', dynasty:'唐', content:'朝辞白帝彩云间，千里江陵一日还。\n两岸猿声啼不住，轻舟已过万重山。' },
  { title:'独坐敬亭山', author:'李白', dynasty:'唐', content:'众鸟高飞尽，孤云独去闲。\n相看两不厌，只有敬亭山。' },
  { title:'将进酒', author:'李白', dynasty:'唐', content:'君不见黄河之水天上来，奔流到海不复回。\n君不见高堂明镜悲白发，朝如青丝暮成雪。\n人生得意须尽欢，莫使金樽空对月。\n天生我材必有用，千金散尽还复来。\n烹羊宰牛且为乐，会须一饮三百杯。\n岑夫子，丹丘生，将进酒，杯莫停。\n与君歌一曲，请君为我倾耳听。\n钟鼓馔玉不足贵，但愿长醉不愿醒。\n古来圣贤皆寂寞，惟有饮者留其名。\n陈王昔时宴平乐，斗酒十千恣欢谑。\n主人何为言少钱，径须沽取对君酌。\n五花马，千金裘，呼儿将出换美酒，与尔同销万古愁。' },
  { title:'行路难', author:'李白', dynasty:'唐', content:'金樽清酒斗十千，玉盘珍羞直万钱。\n停杯投箸不能食，拔剑四顾心茫然。\n欲渡黄河冰塞川，将登太行雪满山。\n闲来垂钓碧溪上，忽复乘舟梦日边。\n行路难，行路难，多歧路，今安在？\n长风破浪会有时，直挂云帆济沧海。' },
  { title:'黄鹤楼送孟浩然之广陵', author:'李白', dynasty:'唐', content:'故人西辞黄鹤楼，烟花三月下扬州。\n孤帆远影碧空尽，唯见长江天际流。' },
  { title:'关山月', author:'李白', dynasty:'唐', content:'明月出天山，苍茫云海间。\n长风几万里，吹度玉门关。\n汉下白登道，胡窥青海湾。\n由来征战地，不见有人还。\n戍客望边邑，思归多苦颜。\n高楼当此夜，叹息未应闲。' },
  { title:'送友人', author:'李白', dynasty:'唐', content:'青山横北郭，白水绕东城。\n此地一为别，孤蓬万里征。\n浮云游子意，落日故人情。\n挥手自兹去，萧萧班马鸣。' },
  { title:'登金陵凤凰台', author:'李白', dynasty:'唐', content:'凤凰台上凤凰游，凤去台空江自流。\n吴宫花草埋幽径，晋代衣冠成古丘。\n三山半落青天外，二水中分白鹭洲。\n总为浮云能蔽日，长安不见使人愁。' },
  { title:'月下独酌', author:'李白', dynasty:'唐', content:'花间一壶酒，独酌无相亲。\n举杯邀明月，对影成三人。\n月既不解饮，影徒随我身。\n暂伴月将影，行乐须及春。\n我歌月徘徊，我舞影零乱。\n醒时同交欢，醉后各分散。\n永结无情游，相期邈云汉。' },
  { title:'金陵酒肆留别', author:'李白', dynasty:'唐', content:'风吹柳花满店香，吴姬压酒唤客尝。\n金陵子弟来相送，欲行不行各尽觞。\n请君试问东流水，别意与之谁短长。' },
  { title:'宣州谢朓楼饯别校书叔云', author:'李白', dynasty:'唐', content:'弃我去者，昨日之日不可留。\n乱我心者，今日之日多烦忧。\n长风万里送秋雁，对此可以酣高楼。\n蓬莱文章建安骨，中间小谢又清发。\n俱怀逸兴壮思飞，欲上青天览明月。\n抽刀断水水更流，举杯消愁愁更愁。\n人生在世不称意，明朝散发弄扁舟。' },
  { title:'夜泊牛渚怀古', author:'李白', dynasty:'唐', content:'牛渚西江夜，青天无片云。\n登舟望秋月，空忆谢将军。\n余亦能高咏，斯人不可闻。\n明朝挂帆席，枫叶落纷纷。' },
  { title:'赤壁', author:'杜牧', dynasty:'唐', content:'折戟沉沙铁未销，自将磨洗认前朝。\n东风不与周郎便，铜雀春深锁二乔。' },
  { title:'乌衣巷', author:'刘禹锡', dynasty:'唐', content:'朱雀桥边野草花，乌衣巷口夕阳斜。\n旧时王谢堂前燕，飞入寻常百姓家。' },
  { title:'凉州词', author:'王翰', dynasty:'唐', content:'葡萄美酒夜光杯，欲饮琵琶马上催。\n醉卧沙场君莫笑，古来征战几人回。' },
  { title:'出塞', author:'王之涣', dynasty:'唐', content:'黄河远上白云间，一片孤城万仞山。\n羌笛何须怨杨柳，春风不度玉门关。' },
  { title:'送杜少府之任蜀州', author:'王勃', dynasty:'唐', content:'城阙辅三秦，风烟望五津。\n与君离别意，同是宦游人。\n海内存知己，天涯若比邻。\n无为在歧路，儿女共沾巾。' },
  { title:'滕王阁诗', author:'王勃', dynasty:'唐', content:'滕王高阁临江渚，佩玉鸣鸾罢歌舞。\n画栋朝飞南浦云，珠帘暮卷西山雨。\n闲云潭影日悠悠，物换星移几度秋。\n阁中帝子今何在？槛外长江空自流。' },
  { title:'回乡偶书', author:'贺知章', dynasty:'唐', content:'少小离家老大回，乡音无改鬓毛衰。\n儿童相见不相识，笑问客从何处来。' },
  { title:'咏柳', author:'贺知章', dynasty:'唐', content:'碧玉妆成一树高，万条垂下绿丝绦。\n不知细叶谁裁出，二月春风似剪刀。' },
  { title:'题都城南庄', author:'崔护', dynasty:'唐', content:'去年今日此门中，人面桃花相映红。\n人面不知何处去，桃花依旧笑春风。' },
  { title:'次北固山下', author:'王湾', dynasty:'唐', content:'客路青山外，行舟绿水前。\n潮平两岸阔，风正一帆悬。\n海日生残夜，江春入旧年。\n乡书何处达，归雁洛阳边。' },
  { title:'黄鹤楼', author:'崔颢', dynasty:'唐', content:'昔人已乘黄鹤去，此地空余黄鹤楼。\n黄鹤一去不复返，白云千载空悠悠。\n晴川历历汉阳树，芳草萋萋鹦鹉洲。\n日暮乡关何处是，烟波江上使人愁。' },
  { title:'终南望余雪', author:'祖咏', dynasty:'唐', content:'终南阴岭秀，积雪浮云端。\n林表明霁色，城中增暮寒。' },
  { title:'过故人庄', author:'孟浩然', dynasty:'唐', content:'故人具鸡黍，邀我至田家。\n绿树村边合，青山郭外斜。\n开轩面场圃，把酒话桑麻。\n待到重阳日，还来就菊花。' },
  { title:'宿建德江', author:'孟浩然', dynasty:'唐', content:'移舟泊烟渚，日暮客愁新。\n野旷天低树，江清月近人。' },
  { title:'山居秋暝', author:'王维', dynasty:'唐', content:'空山新雨后，天气晚来秋。\n明月松间照，清泉石上流。\n竹喧归浣女，莲动下渔舟。\n随意春芳歇，王孙自可留。' },
  { title:'使至塞上', author:'王维', dynasty:'唐', content:'单车欲问边，属国过居延。\n征蓬出汉塞，归雁入胡天。\n大漠孤烟直，长河落日圆。\n萧关逢候骑，都护在燕然。' },
  { title:'相思', author:'王维', dynasty:'唐', content:'红豆生南国，春来发几枝。\n愿君多采撷，此物最相思。' },
  { title:'九月九日忆山东兄弟', author:'王维', dynasty:'唐', content:'独在异乡为异客，每逢佳节倍思亲。\n遥知兄弟登高处，遍插茱萸少一人。' },
  { title:'送元二使安西', author:'王维', dynasty:'唐', content:'渭城朝雨浥轻尘，客舍青青柳色新。\n劝君更尽一杯酒，西出阳关无故人。' },
  { title:'竹里馆', author:'王维', dynasty:'唐', content:'独坐幽篁里，弹琴复长啸。\n深林人不知，明月来相照。' },
  { title:'鸟鸣涧', author:'王维', dynasty:'唐', content:'人闲桂花落，夜静春山空。\n月出惊山鸟，时鸣春涧中。' },
  { title:'鹿柴', author:'王维', dynasty:'唐', content:'空山不见人，但闻人语响。\n返景入深林，复照青苔上。' },
  { title:'杂诗', author:'王维', dynasty:'唐', content:'君自故乡来，应知故乡事。\n来日绮窗前，寒梅著花未。' },
  { title:'渭城曲', author:'王维', dynasty:'唐', content:'渭城朝雨浥轻尘，客舍青青柳色新。\n劝君更尽一杯酒，西出阳关无故人。' },
  { title:'钱塘湖春行', author:'白居易', dynasty:'唐', content:'孤山寺北贾亭西，水面初平云脚低。\n几处早莺争暖树，谁家新燕啄春泥。\n乱花渐欲迷人眼，浅草才能没马蹄。\n最爱湖东行不足，绿杨阴里白沙堤。' },
  { title:'忆江南', author:'白居易', dynasty:'唐', content:'江南好，风景旧曾谙。\n日出江花红胜火，春来江水绿如蓝。\n能不忆江南？' },
  { title:'暮江吟', author:'白居易', dynasty:'唐', content:'一道残阳铺水中，半江瑟瑟半江红。\n可怜九月初三夜，露似真珠月似弓。' },
  { title:'大林寺桃花', author:'白居易', dynasty:'唐', content:'人间四月芳菲尽，山寺桃花始盛开。\n长恨春归无觅处，不知转入此中来。' },
  { title:'问刘十九', author:'白居易', dynasty:'唐', content:'绿蚁新醅酒，红泥小火炉。\n晚来天欲雪，能饮一杯无。' },
  { title:'琵琶行（节选）', author:'白居易', dynasty:'唐', content:'浔阳江头夜送客，枫叶荻花秋瑟瑟。\n主人下马客在船，举酒欲饮无管弦。\n醉不成欢惨将别，别时茫茫江浸月。\n忽闻水上琵琶声，主人忘归客不发。\n千呼万唤始出来，犹抱琵琶半遮面。\n转轴拨弦三两声，未成曲调先有情。\n大弦嘈嘈如急雨，小弦切切如私语。\n嘈嘈切切错杂弹，大珠小珠落玉盘。\n别有幽愁暗恨生，此时无声胜有声。\n同是天涯沦落人，相逢何必曾相识。' },
  { title:'三衢道中', author:'曾几', dynasty:'宋', content:'梅子黄时日日晴，小溪泛尽却山行。\n绿阴不减来时路，添得黄鹂四五声。' },
  { title:'雪梅·其一', author:'卢梅坡', dynasty:'宋', content:'梅雪争春未肯降，骚人搁笔费评章。\n梅须逊雪三分白，雪却输梅一段香。' },
  { title:'绝句', author:'僧志南', dynasty:'宋', content:'古木阴中系短篷，杖藜扶我过桥东。\n沾衣欲湿杏花雨，吹面不寒杨柳风。' },
  { title:'题壁', author:'无名氏', dynasty:'宋', content:'一团茅草乱蓬蓬，蓦地烧天蓦地空。\n争似满炉煨榾柮，漫腾腾地暖烘烘。' },
  { title:'蚕妇', author:'张俞', dynasty:'宋', content:'昨日入城市，归来泪满巾。\n遍身罗绮者，不是养蚕人。' },
  { title:'村晚', author:'雷震', dynasty:'宋', content:'草满池塘水满陂，山衔落日浸寒漪。\n牧童归去横牛背，短笛无腔信口吹。' },
  { title:'乡村四月', author:'翁卷', dynasty:'宋', content:'绿遍山原白满川，子规声里雨如烟。\n乡村四月闲人少，才了蚕桑又插田。' },
  { title:'约客', author:'赵师秀', dynasty:'宋', content:'黄梅时节家家雨，青草池塘处处蛙。\n有约不来过夜半，闲敲棋子落灯花。' },
  { title:'寒夜', author:'杜耒', dynasty:'宋', content:'寒夜客来茶当酒，竹炉汤沸火初红。\n寻常一样窗前月，才有梅花便不同。' },
  { title:'夜书所见', author:'叶绍翁', dynasty:'宋', content:'萧萧梧叶送寒声，江上秋风动客情。\n知有儿童挑促织，夜深篱落一灯明。' },
  { title:'淮村兵后', author:'戴复古', dynasty:'宋', content:'小桃无主自开花，烟草茫茫带晓鸦。\n几处败垣围故井，向来一一是人家。' },
  { title:'湖上', author:'徐元杰', dynasty:'宋', content:'花开红树乱莺啼，草长平湖白鹭飞。\n风日晴和人意好，夕阳箫鼓几船归。' },
  { title:'立春偶成', author:'张栻', dynasty:'宋', content:'律回岁晚冰霜少，春到人间草木知。\n便觉眼前生意满，东风吹水绿参差。' },
  { title:'夏夜追凉', author:'杨万里', dynasty:'宋', content:'夜热依然午热同，开门小立月明中。\n竹深树密虫鸣处，时有微凉不是风。' },
  { title:'秋夜将晓出篱门迎凉有感', author:'陆游', dynasty:'宋', content:'三万里河东入海，五千仞岳上摩天。\n遗民泪尽胡尘里，南望王师又一年。' },
  { title:'示儿', author:'陆游', dynasty:'宋', content:'死去元知万事空，但悲不见九州同。\n王师北定中原日，家祭无忘告乃翁。' },
  { title:'冬夜读书示子聿', author:'陆游', dynasty:'宋', content:'古人学问无遗力，少壮工夫老始成。\n纸上得来终觉浅，绝知此事要躬行。' },
  { title:'游山西村', author:'陆游', dynasty:'宋', content:'莫笑农家腊酒浑，丰年留客足鸡豚。\n山重水复疑无路，柳暗花明又一村。\n箫鼓追随春社近，衣冠简朴古风存。\n从今若许闲乘月，拄杖无时夜叩门。' },
  { title:'临安春雨初霁', author:'陆游', dynasty:'宋', content:'世味年来薄似纱，谁令骑马客京华。\n小楼一夜听春雨，深巷明朝卖杏花。\n矮纸斜行闲作草，晴窗细乳戏分茶。\n素衣莫起风尘叹，犹及清明可到家。' },
  { title:'书愤', author:'陆游', dynasty:'宋', content:'早岁那知世事艰，中原北望气如山。\n楼船夜雪瓜洲渡，铁马秋风大散关。\n塞上长城空自许，镜中衰鬓已先斑。\n出师一表真名世，千载谁堪伯仲间。' },
  { title:'卜算子·咏梅', author:'陆游', dynasty:'宋', content:'驿外断桥边，寂寞开无主。\n已是黄昏独自愁，更著风和雨。\n无意苦争春，一任群芳妒。\n零落成泥碾作尘，只有香如故。' },
  { title:'钗头凤', author:'陆游', dynasty:'宋', content:'红酥手，黄縢酒，满城春色宫墙柳。\n东风恶，欢情薄。一怀愁绪，几年离索。\n错、错、错。\n春如旧，人空瘦，泪痕红浥鲛绡透。\n桃花落，闲池阁。山盟虽在，锦书难托。\n莫、莫、莫。' },
  { title:'题临安邸', author:'林升', dynasty:'宋', content:'山外青山楼外楼，西湖歌舞几时休。\n暖风熏得游人醉，直把杭州作汴州。' },
  { title:'过零丁洋', author:'文天祥', dynasty:'宋', content:'辛苦遭逢起一经，干戈寥落四周星。\n山河破碎风飘絮，身世浮沉雨打萍。\n惶恐滩头说惶恐，零丁洋里叹零丁。\n人生自古谁无死，留取丹心照汗青。' },
  { title:'正气歌', author:'文天祥', dynasty:'宋', content:'天地有正气，杂然赋流形。\n下则为河岳，上则为日星。\n于人曰浩然，沛乎塞苍冥。\n皇路当清夷，含和吐明庭。\n时穷节乃见，一一垂丹青。\n在齐太史简，在晋董狐笔。\n在秦张良椎，在汉苏武节。\n为严将军头，为嵇侍中血。\n为张睢阳齿，为颜常山舌。\n或为辽东帽，清操厉冰雪。\n或为出师表，鬼神泣壮烈。\n或为渡江楫，慷慨吞胡羯。\n或为击贼笏，逆竖头破裂。\n是气所磅礴，凛烈万古存。\n当其贯日月，生死安足论。' },
  { title:'石灰吟', author:'于谦', dynasty:'明', content:'千锤万凿出深山，烈火焚烧若等闲。\n粉骨碎身浑不怕，要留清白在人间。' },
  { title:'竹石', author:'郑燮', dynasty:'清', content:'咬定青山不放松，立根原在破岩中。\n千磨万击还坚劲，任尔东西南北风。' },
  { title:'己亥杂诗', author:'龚自珍', dynasty:'清', content:'九州生气恃风雷，万马齐喑究可哀。\n我劝天公重抖擞，不拘一格降人才。' },
  { title:'村居', author:'高鼎', dynasty:'清', content:'草长莺飞二月天，拂堤杨柳醉春烟。\n儿童散学归来早，忙趁东风放纸鸢。' },
  { title:'所见', author:'袁枚', dynasty:'清', content:'牧童骑黄牛，歌声振林樾。\n意欲捕鸣蝉，忽然闭口立。' },
  { title:'舟夜书所见', author:'查慎行', dynasty:'清', content:'月黑见渔灯，孤光一点萤。\n微微风簇浪，散作满河星。' },
  { title:'长相思', author:'纳兰性德', dynasty:'清', content:'山一程，水一程，身向榆关那畔行，夜深千帐灯。\n风一更，雪一更，聒碎乡心梦不成，故园无此声。' },
  { title:'木兰词', author:'纳兰性德', dynasty:'清', content:'人生若只如初见，何事秋风悲画扇。\n等闲变却故人心，却道故人心易变。\n骊山语罢清宵半，泪雨霖铃终不怨。\n何如薄幸锦衣郎，比翼连枝当日愿。' },
  { title:'苔', author:'袁枚', dynasty:'清', content:'白日不到处，青春恰自来。\n苔花如米小，也学牡丹开。' },
  { title:'论诗', author:'赵翼', dynasty:'清', content:'李杜诗篇万口传，至今已觉不新鲜。\n江山代有才人出，各领风骚数百年。' },
  { title:'明日歌', author:'钱福', dynasty:'明', content:'明日复明日，明日何其多。\n我生待明日，万事成蹉跎。\n世人若被明日累，春去秋来老将至。\n朝看水东流，暮看日西坠。\n百年明日能几何？请君听我明日歌。' },
  { title:'临江仙·滚滚长江东逝水', author:'杨慎', dynasty:'明', content:'滚滚长江东逝水，浪花淘尽英雄。\n是非成败转头空。\n青山依旧在，几度夕阳红。\n白发渔樵江渚上，惯看秋月春风。\n一壶浊酒喜相逢。\n古今多少事，都付笑谈中。' },
  { title:'桃花庵歌', author:'唐寅', dynasty:'明', content:'桃花坞里桃花庵，桃花庵下桃花仙。\n桃花仙人种桃树，又摘桃花换酒钱。\n酒醒只在花前坐，酒醉还来花下眠。\n半醒半醉日复日，花落花开年复年。\n但愿老死花酒间，不愿鞠躬车马前。\n车尘马足富者趣，酒盏花枝贫者缘。\n若将富贵比贫贱，一在平地一在天。\n若将贫贱比车马，他得驱驰我得闲。\n别人笑我太疯癫，我笑他人看不穿。\n不见五陵豪杰墓，无花无酒锄作田。' },
  { title:'天净沙·秋思', author:'马致远', dynasty:'元', content:'枯藤老树昏鸦，小桥流水人家，古道西风瘦马。\n夕阳西下，断肠人在天涯。' },
  { title:'山坡羊·潼关怀古', author:'张养浩', dynasty:'元', content:'峰峦如聚，波涛如怒，山河表里潼关路。\n望西都，意踌躇。\n伤心秦汉经行处，宫阙万间都做了土。\n兴，百姓苦；亡，百姓苦。' },
  { title:'墨梅', author:'王冕', dynasty:'元', content:'吾家洗砚池头树，朵朵花开淡墨痕。\n不要人夸好颜色，只留清气满乾坤。' },
  { title:'就义诗', author:'杨继盛', dynasty:'明', content:'浩气还太虚，丹心照千古。\n生平未报国，留作忠魂补。' },
  { title:'沁园春·雪', author:'毛泽东', dynasty:'近现代', content:'北国风光，千里冰封，万里雪飘。\n望长城内外，惟余莽莽；大河上下，顿失滔滔。\n山舞银蛇，原驰蜡象，欲与天公试比高。\n须晴日，看红装素裹，分外妖娆。\n江山如此多娇，引无数英雄竞折腰。\n惜秦皇汉武，略输文采；唐宗宋祖，稍逊风骚。\n一代天骄，成吉思汗，只识弯弓射大雕。\n俱往矣，数风流人物，还看今朝。' },
  { title:'沁园春·长沙', author:'毛泽东', dynasty:'近现代', content:'独立寒秋，湘江北去，橘子洲头。\n看万山红遍，层林尽染；漫江碧透，百舸争流。\n鹰击长空，鱼翔浅底，万类霜天竞自由。\n怅寥廓，问苍茫大地，谁主沉浮？\n携来百侣曾游，忆往昔峥嵘岁月稠。\n恰同学少年，风华正茂；书生意气，挥斥方遒。\n指点江山，激扬文字，粪土当年万户侯。\n曾记否，到中流击水，浪遏飞舟？' },
  { title:'再别康桥', author:'徐志摩', dynasty:'近现代', content:'轻轻的我走了，正如我轻轻的来。\n我轻轻的招手，作别西天的云彩。\n那河畔的金柳，是夕阳中的新娘。\n波光里的艳影，在我的心头荡漾。\n软泥上的青荇，油油的在水底招摇。\n在康河的柔波里，我甘心做一条水草。\n那榆荫下的一潭，不是清泉，是天上虹。\n揉碎在浮藻间，沉淀着彩虹似的梦。\n寻梦？撑一支长篙，向青草更青处漫溯。\n满载一船星辉，在星辉斑斓里放歌。\n但我不能放歌，悄悄是别离的笙箫。\n夏虫也为我沉默，沉默是今晚的康桥。\n悄悄的我走了，正如我悄悄的来。\n我挥一挥衣袖，不带走一片云彩。' },
  { title:'断章', author:'卞之琳', dynasty:'近现代', content:'你站在桥上看风景，\n看风景的人在楼上看你。\n明月装饰了你的窗子，\n你装饰了别人的梦。' },
  { title:'乡愁', author:'余光中', dynasty:'近现代', content:'小时候，乡愁是一枚小小的邮票，\n我在这头，母亲在那头。\n长大后，乡愁是一张窄窄的船票，\n我在这头，新娘在那头。\n后来啊，乡愁是一方矮矮的坟墓，\n我在外头，母亲在里头。\n而现在，乡愁是一湾浅浅的海峡，\n我在这头，大陆在那头。' },
  { title:'面朝大海，春暖花开', author:'海子', dynasty:'近现代', content:'从明天起，做一个幸福的人\n喂马，劈柴，周游世界\n从明天起，关心粮食和蔬菜\n我有一所房子，面朝大海，春暖花开\n从明天起，和每一个亲人通信\n告诉他们我的幸福\n那幸福的闪电告诉我的\n我将告诉每一个人\n给每一条河每一座山取一个温暖的名字\n陌生人，我也为你祝福\n愿你有一个灿烂的前程\n愿你有情人终成眷属\n愿你在尘世获得幸福\n我只愿面朝大海，春暖花开。' },
  { title:'错误', author:'郑愁予', dynasty:'近现代', content:'我打江南走过\n那等在季节里的容颜如莲花的开落\n东风不来，三月的柳絮不飞\n你的心如小小的寂寞的城\n恰若青石的街道向晚\n跫音不响，三月的春帷不揭\n你的心是小小的窗扉紧掩\n我达达的马蹄是美丽的错误\n我不是归人，是个过客。' },
  { title:'一棵开花的树', author:'席慕容', dynasty:'近现代', content:'如何让你遇见我\n在我最美丽的时刻\n为这\n我已在佛前求了五百年\n求佛让我们结一段尘缘\n佛于是把我化作一棵树\n长在你必经的路旁\n阳光下\n慎重地开满了花\n朵朵都是我前世的盼望\n当你走近\n请你细听\n那颤抖的叶\n是我等待的热情\n而当你终于无视地走过\n在你身后落了一地的\n朋友啊\n那不是花瓣\n是我凋零的心。' },
  { title:'回答', author:'北岛', dynasty:'近现代', content:'卑鄙是卑鄙者的通行证，\n高尚是高尚者的墓志铭。\n看吧，在那镀金的天空中，\n飘满了死者弯曲的倒影。\n冰川纪过去了，\n为什么到处都是冰凌？\n好望角发现了，\n为什么死海里千帆相竞？\n我来到这个世界上，\n只带着纸、绳索和身影。\n为了在审判之前，\n宣读那些被判决的声音：\n告诉你吧，世界，\n我——不——相——信！' },

  // ======== 扩编七 — 最终补遗：唐诗·宋词·元曲·明清单 ========
  { title:'春思', author:'李白', dynasty:'唐', content:'燕草如碧丝，秦桑低绿枝。\n当君怀归日，是妾断肠时。\n春风不相识，何事入罗帏？' },
  { title:'庐山谣寄卢侍御虚舟', author:'李白', dynasty:'唐', content:'我本楚狂人，凤歌笑孔丘。\n手持绿玉杖，朝别黄鹤楼。\n五岳寻仙不辞远，一生好入名山游。\n庐山秀出南斗傍，屏风九叠云锦张。\n影落明湖青黛光，金阙前开二峰长。\n银河倒挂三石梁，香炉瀑布遥相望。\n回崖沓嶂凌苍苍，翠影红霞映朝日。\n鸟飞不到吴天长，登高壮观天地间。\n大江茫茫去不还，黄云万里动风色。\n白波九道流雪山，好为庐山谣。\n兴因庐山发，闲窥石镜清我心。\n谢公行处苍苔没，早服还丹无世情。\n琴心三叠道初成，遥见仙人彩云里。\n手把芙蓉朝玉京，先期汗漫九垓上。\n愿接卢敖游太清。' },
  { title:'对酒', author:'白居易', dynasty:'唐', content:'蜗牛角上争何事？石火光中寄此身。\n随富随贫且欢乐，不开口笑是痴人。' },
  { title:'惜牡丹花', author:'白居易', dynasty:'唐', content:'惆怅阶前红牡丹，晚来唯有两枝残。\n明朝风起应吹尽，夜惜衰红把火看。' },
  { title:'白云泉', author:'白居易', dynasty:'唐', content:'天平山上白云泉，云自无心水自闲。\n何必奔冲山下去，更添波浪向人间。' },
  { title:'与梦得沽酒闲饮且约后期', author:'白居易', dynasty:'唐', content:'少时犹不忧生计，老后谁能惜酒钱？\n共把十千沽一斗，相看七十欠三年。\n闲征雅令穷经史，醉听清吟胜管弦。\n更待菊黄家酝熟，共君一醉一陶然。' },
  { title:'览卢子蒙旧诗多与微之唱和感今伤昔', author:'白居易', dynasty:'唐', content:'昔闻元九咏君诗，恨与卢君相识迟。\n今日逢君开旧卷，卷中多道赠微之。\n相看泪眼情难说，别有伤心事岂知。\n闻道咸阳坟上树，已抽三丈白杨枝。' },
  { title:'与元九书', author:'白居易', dynasty:'唐', content:'感人心者，莫先乎情，莫始乎言，莫切乎声，莫深乎义。\n诗者，根情，苗言，华声，实义。' },
  { title:'春雪', author:'韩愈', dynasty:'唐', content:'新年都未有芳华，二月初惊见草芽。\n白雪却嫌春色晚，故穿庭树作飞花。' },
  { title:'晚春', author:'韩愈', dynasty:'唐', content:'草树知春不久归，百般红紫斗芳菲。\n杨花榆荚无才思，惟解漫天作雪飞。' },
  { title:'同水部张员外籍曲江春游寄白二十二舍人', author:'韩愈', dynasty:'唐', content:'漠漠轻阴晚自开，青天白日映楼台。\n曲江水满花千树，有底忙时不肯来。' },
  { title:'题木居士', author:'韩愈', dynasty:'唐', content:'火透波穿不计春，根如头面干如身。\n偶然题作木居士，便有无穷求福人。' },
  { title:'柳州二月榕叶落尽偶题', author:'柳宗元', dynasty:'唐', content:'宦情羁思共凄凄，春半如秋意转迷。\n山城过雨百花尽，榕叶满庭莺乱啼。' },
  { title:'别舍弟宗一', author:'柳宗元', dynasty:'唐', content:'零落残魂倍黯然，双垂别泪越江边。\n一身去国六千里，万死投荒十二年。\n桂岭瘴来云似墨，洞庭春尽水如天。\n欲知此后相思梦，长在荆门郢树烟。' },
  { title:'梦天', author:'李贺', dynasty:'唐', content:'老兔寒蟾泣天色，云楼半开壁斜白。\n玉轮轧露湿团光，鸾珮相逢桂香陌。\n黄尘清水三山下，更变千年如走马。\n遥望齐州九点烟，一泓海水杯中泻。' },
  { title:'金铜仙人辞汉歌', author:'李贺', dynasty:'唐', content:'茂陵刘郎秋风客，夜闻马嘶晓无迹。\n画栏桂树悬秋香，三十六宫土花碧。\n魏官牵车指千里，东关酸风射眸子。\n空将汉月出宫门，忆君清泪如铅水。\n衰兰送客咸阳道，天若有情天亦老。\n携盘独出月荒凉，渭城已远波声小。' },
  { title:'致酒行', author:'李贺', dynasty:'唐', content:'零落栖迟一杯酒，主人奉觞客长寿。\n主父西游困不归，家人折断门前柳。\n吾闻马周昔作新丰客，天荒地老无人识。\n空将笺上两行书，直犯龙颜请恩泽。\n我有迷魂招不得，雄鸡一声天下白。\n少年心事当拏云，谁念幽寒坐呜呃。' },
  { title:'苏小小墓', author:'李贺', dynasty:'唐', content:'幽兰露，如啼眼。\n无物结同心，烟花不堪剪。\n草如茵，松如盖。\n风为裳，水为珮。\n油壁车，夕相待。\n冷翠烛，劳光彩。\n西陵下，风吹雨。' },
  { title:'将进酒', author:'李贺', dynasty:'唐', content:'琉璃钟，琥珀浓，小槽酒滴真珠红。\n烹龙炮凤玉脂泣，罗帏绣幕围香风。\n吹龙笛，击鼍鼓；皓齿歌，细腰舞。\n况是青春日将暮，桃花乱落如红雨。\n劝君终日酩酊醉，酒不到刘伶坟上土。' },
  { title:'遣悲怀·其一', author:'元稹', dynasty:'唐', content:'谢公最小偏怜女，自嫁黔娄百事乖。\n顾我无衣搜荩箧，泥他沽酒拔金钗。\n野蔬充膳甘长藿，落叶添薪仰古槐。\n今日俸钱过十万，与君营奠复营斋。' },
  { title:'菊花', author:'元稹', dynasty:'唐', content:'秋丛绕舍似陶家，遍绕篱边日渐斜。\n不是花中偏爱菊，此花开尽更无花。' },
  { title:'晚晴', author:'李商隐', dynasty:'唐', content:'深居俯夹城，春去夏犹清。\n天意怜幽草，人间重晚晴。\n并添高阁迥，微注小窗明。\n越鸟巢干后，归飞体更轻。' },
  { title:'安定城楼', author:'李商隐', dynasty:'唐', content:'迢递高城百尺楼，绿杨枝外尽汀洲。\n贾生年少虚垂涕，王粲春来更远游。\n永忆江湖归白发，欲回天地入扁舟。\n不知腐鼠成滋味，猜意鹓雏竟未休。' },
  { title:'流莺', author:'李商隐', dynasty:'唐', content:'流莺漂荡复参差，度陌临流不自持。\n巧啭岂能无本意？良辰未必有佳期。\n风朝露夜阴晴里，万户千门开闭时。\n曾苦伤春不忍听，凤城何处有花枝。' },
  { title:'七月二十九日崇让宅宴作', author:'李商隐', dynasty:'唐', content:'露如微霰下前池，风过回塘万竹悲。\n浮世本来多聚散，红蕖何事亦离披？\n悠扬归梦惟灯见，濩落生涯独酒知。\n岂到白头长只尔，嵩阳松雪有心期。' },
  { title:'蜂', author:'罗隐', dynasty:'唐', content:'不论平地与山尖，无限风光尽被占。\n采得百花成蜜后，为谁辛苦为谁甜？' },
  { title:'鹦鹉', author:'罗隐', dynasty:'唐', content:'莫恨雕笼翠羽残，江南地暖陇西寒。\n劝君不用分明语，语得分明出转难。' },
  { title:'雪', author:'罗隐', dynasty:'唐', content:'尽道丰年瑞，丰年事若何。\n长安有贫者，为瑞不宜多。' },
  { title:'台城', author:'韦庄', dynasty:'唐', content:'江雨霏霏江草齐，六朝如梦鸟空啼。\n无情最是台城柳，依旧烟笼十里堤。' },
  { title:'送日本国僧敬龙归', author:'韦庄', dynasty:'唐', content:'扶桑已在渺茫中，家在扶桑东更东。\n此去与师谁共到，一船明月一帆风。' },
  { title:'古离别', author:'韦庄', dynasty:'唐', content:'晴烟漠漠柳毵毵，不那离情酒半酣。\n更把玉鞭云外指，断肠春色在江南。' },
  { title:'小松', author:'杜荀鹤', dynasty:'唐', content:'自小刺头深草里，而今渐觉出蓬蒿。\n时人不识凌云木，直待凌云始道高。' },
  { title:'山中寡妇', author:'杜荀鹤', dynasty:'唐', content:'夫因兵死守蓬茅，麻苎衣衫鬓发焦。\n桑柘废来犹纳税，田园荒后尚征苗。\n时挑野菜和根煮，旋斫生柴带叶烧。\n任是深山更深处，也应无计避征徭。' },
  { title:'除夜', author:'崔涂', dynasty:'唐', content:'迢递三巴路，羁危万里身。\n残雪和雁断，新雪带潮春。\n那堪正飘泊，明日岁华新。' },
  { title:'孤雁', author:'崔涂', dynasty:'唐', content:'几行归塞尽，念尔独何之。\n暮雨相呼失，寒塘欲下迟。\n渚云低暗度，关月冷相随。\n未必逢矰缴，孤飞自可疑。' },
  { title:'贫女', author:'秦韬玉', dynasty:'唐', content:'蓬门未识绮罗香，拟托良媒益自伤。\n谁爱风流高格调，共怜时世俭梳妆。\n敢将十指夸针巧，不把双眉斗画长。\n苦恨年年压金线，为他人作嫁衣裳。' },
  { title:'春怨', author:'金昌绪', dynasty:'唐', content:'打起黄莺儿，莫教枝上啼。\n啼时惊妾梦，不得到辽西。' },
  { title:'鹧鸪天·送人', author:'辛弃疾', dynasty:'宋', content:'唱彻阳关泪未干，功名余事且加餐。\n浮天水送无穷树，带雨云埋一半山。\n今古恨，几千般，只应离合是悲欢？\n江头未是风波恶，别有人间行路难。' },
  { title:'太常引·建康中秋夜为吕叔潜赋', author:'辛弃疾', dynasty:'宋', content:'一轮秋影转金波，飞镜又重磨。\n把酒问姮娥：被白发、欺人奈何？\n乘风好去，长空万里，直下看山河。\n斫去桂婆娑，人道是、清光更多。' },
  { title:'贺新郎', author:'辛弃疾', dynasty:'宋', content:'甚矣吾衰矣。\n怅平生、交游零落，只今余几！\n白发空垂三千丈，一笑人间万事。\n问何物、能令公喜？\n我见青山多妩媚，料青山见我应如是。\n情与貌，略相似。\n一尊搔首东窗里。\n想渊明、停云诗就，此时风味。\n江左沉酣求名者，岂识浊醪妙理。\n回首叫、云飞风起。\n不恨古人吾不见，恨古人不见吾狂耳。\n知我者，二三子。' },
  { title:'念奴娇·书东流村壁', author:'辛弃疾', dynasty:'宋', content:'野棠花落，又匆匆过了，清明时节。\n刬地东风欺客梦，一枕云屏寒怯。\n曲岸持觞，垂杨系马，此地曾经别。\n楼空人去，旧游飞燕能说。' },
  { title:'西江月·遣兴', author:'辛弃疾', dynasty:'宋', content:'醉里且贪欢笑，要愁那得工夫。\n近来始觉古人书，信著全无是处。\n昨夜松边醉倒，问松我醉何如。\n只疑松动要来扶，以手推松曰去。' },
  { title:'南歌子·疏雨池塘见', author:'贺铸', dynasty:'宋', content:'疏雨池塘见，微风襟袖知。\n阴阴夏木啭黄鹂。\n何处飞来白鹭、立移时。\n易醉扶头酒，难逢敌手棋。\n日长偏与睡相宜。\n睡起芭蕉叶上、自题诗。' },
  { title:'青玉案', author:'贺铸', dynasty:'宋', content:'凌波不过横塘路，但目送、芳尘去。\n锦瑟华年谁与度？\n月桥花院，琐窗朱户，只有春知处。\n飞云冉冉蘅皋暮，彩笔新题断肠句。\n试问闲情都几许？\n一川烟草，满城风絮，梅子黄时雨。' },
  { title:'鹧鸪天·重过阊门万事非', author:'贺铸', dynasty:'宋', content:'重过阊门万事非，同来何事不同归？\n梧桐半死清霜后，头白鸳鸯失伴飞。\n原上草，露初晞。旧栖新垅两依依。\n空床卧听南窗雨，谁复挑灯夜补衣。' },
  { title:'卜算子·我住长江头', author:'李之仪', dynasty:'宋', content:'我住长江头，君住长江尾。\n日日思君不见君，共饮长江水。\n此水几时休，此恨何时已。\n只愿君心似我心，定不负相思意。' },
  { title:'摸鱼儿·东皋寓居', author:'晁补之', dynasty:'宋', content:'买陂塘、旋栽杨柳，依稀淮岸江浦。\n东皋嘉雨新痕涨，沙觜鹭来鸥聚。\n堪爱处，最好是、一川夜月光流渚。\n无人独舞。\n任翠幄张天，柔茵藉地，酒尽未能去。' },
  { title:'瑞龙吟', author:'周邦彦', dynasty:'宋', content:'章台路，还见褪粉梅梢，试花桃树。\n愔愔坊陌人家，定巢燕子，归来旧处。\n黯凝伫，因念个人痴小，乍窥门户。\n侵晨浅约宫黄，障风映袖，盈盈笑语。\n前度刘郎重到，访邻寻里，同时歌舞。\n唯有旧家秋娘，声价如故。\n吟笺赋笔，犹记燕台句。\n知谁伴、名园露饮，东城闲步。\n事与孤鸿去。\n探春尽是，伤离意绪。\n官柳低金缕。\n归骑晚，纤纤池塘飞雨。\n断肠院落，一帘风絮。' },
  { title:'玉楼春·春景', author:'宋祁', dynasty:'宋', content:'东城渐觉风光好，縠皱波纹迎客棹。\n绿杨烟外晓寒轻，红杏枝头春意闹。\n浮生长恨欢娱少，肯爱千金轻一笑。\n为君持酒劝斜阳，且向花间留晚照。' },
  { title:'破阵子·春景', author:'晏殊', dynasty:'宋', content:'燕子来时新社，梨花落后清明。\n池上碧苔三四点，叶底黄鹂一两声，日长飞絮轻。\n巧笑东邻女伴，采桑径里逢迎。\n疑怪昨宵春梦好，元是今朝斗草赢，笑从双脸生。' },
  { title:'渔家傲', author:'王安石', dynasty:'宋', content:'平岸小桥千嶂抱，柔蓝一水萦花草。\n茅屋数间窗窈窕。\n尘不到，时时自有春风扫。\n午枕觉来闻语鸟，欹眠似听朝鸡早。\n忽忆故人今总老。\n贪梦好，茫然忘了邯郸道。' },
  { title:'清平乐·春晚', author:'王安国', dynasty:'宋', content:'留春不住，费尽莺儿语。\n满地残红宫锦污，昨夜南园风雨。\n小怜初上琵琶，晓来思绕天涯。\n不肯画堂朱户，春风自在杨花。' },
  { title:'减字木兰花·竞渡', author:'黄裳', dynasty:'宋', content:'红旗高举，飞出深深杨柳渚。\n鼓击春雷，直破烟波远远回。\n欢声震地，惊退万人争战气。\n金碧楼西，衔得锦标第一归。' },
  { title:'水调歌头·秋色渐将晚', author:'叶梦得', dynasty:'宋', content:'秋色渐将晚，霜信报黄花。\n小窗低户深映，微路绕欹斜。\n为问山翁何事，坐看流年轻度，拚却鬓双华。\n徙倚望沧海，天净水明霞。\n念平昔，空飘荡，遍天涯。\n归来三径重扫，松竹本吾家。\n却恨悲风时起，冉冉云间新雁，边马怨胡笳。\n谁似东山老，谈笑静胡沙。' },
  { title:'好事近·渔父词', author:'朱敦儒', dynasty:'宋', content:'摇首出红尘，醒醉更无时节。\n活计绿蓑青笠，惯披霜冲雪。\n晚来风定钓丝闲，上下是新月。\n千里水天一色，看孤鸿明灭。' },
  { title:'念奴娇·插天翠柳', author:'朱敦儒', dynasty:'宋', content:'插天翠柳，被何人、推上一轮明月。\n照我藤床凉似水，飞入瑶台琼阙。\n雾冷笙箫，风轻环佩，玉锁无人掣。\n闲云收尽，海光天影相接。' },
  { title:'满江红', author:'岳飞', dynasty:'宋', content:'怒发冲冠，凭栏处、潇潇雨歇。\n抬望眼，仰天长啸，壮怀激烈。\n三十功名尘与土，八千里路云和月。\n莫等闲，白了少年头，空悲切。\n靖康耻，犹未雪。臣子恨，何时灭！\n驾长车，踏破贺兰山缺。\n壮志饥餐胡虏肉，笑谈渴饮匈奴血。\n待从头，收拾旧山河，朝天阙。' },
  { title:'小重山', author:'岳飞', dynasty:'宋', content:'昨夜寒蛩不住鸣。\n惊回千里梦，已三更。\n起来独自绕阶行。\n人悄悄，帘外月胧明。\n白首为功名。\n旧山松竹老，阻归程。\n欲将心事付瑶琴。\n知音少，弦断有谁听？' },
  { title:'好事近', author:'杨万里', dynasty:'宋', content:'月未到诚斋，先到万花川谷。\n不是诚斋无月，隔一林修竹。\n如今才是十三夜，月色已如玉。\n未是秋光奇绝，看十五十六。' },
  { title:'昭君怨·咏荷上雨', author:'杨万里', dynasty:'宋', content:'午梦扁舟花底，香满西湖烟水。\n急雨打篷声，梦初惊。\n却是池荷跳雨，散了真珠还聚。\n聚作水银窝，泻清波。' },
  { title:'好事近·七月十三日夜登万花川谷望月作', author:'杨万里', dynasty:'宋', content:'月未到诚斋，先到万花川谷。\n不是诚斋无月，隔一林修竹。\n如今才是十三夜，月色已如玉。\n未是秋光奇绝，看十五十六。' },
  { title:'蝶恋花·送春', author:'朱淑真', dynasty:'宋', content:'楼外垂杨千万缕，欲系青春，少住春还去。\n犹自风前飘柳絮，随春且看归何处。\n绿满山川闻杜宇，便做无情，莫也愁人苦。\n把酒送春春不语，黄昏却下潇潇雨。' },
  { title:'谒金门', author:'朱淑真', dynasty:'宋', content:'春已半，触目此情无限。\n十二阑干闲倚遍，愁来天不管。\n好是风和日暖，输与莺莺燕燕。\n满院落花帘不卷，断肠芳草远。' },
  { title:'沉醉东风·秋景', author:'卢挚', dynasty:'元', content:'挂绝壁枯松倒倚，落残霞孤鹜齐飞。\n四围不尽山，一望无穷水。\n散西风满天秋意。\n夜静云帆月影低，载我在潇湘画里。' },
  { title:'蟾宫曲·别友', author:'卢挚', dynasty:'元', content:'画船儿载将春去也，空留下半江明月。' },
  { title:'清江引·秋怀', author:'张可久', dynasty:'元', content:'西风信来家万里，问我归期未？\n雁啼红叶天，人醉黄花地，芭蕉雨声秋梦里。' },
  { title:'殿前欢·离思', author:'张可久', dynasty:'元', content:'月笼沙，十年心事付琵琶。\n相思懒看帏画，人在天涯。\n春残豆蔻花，情寄鸳鸯帕，香冷荼蘼架。\n旧游池阁，总是烟霞。' },
  { title:'天净沙·即事', author:'乔吉', dynasty:'元', content:'莺莺燕燕春春，花花柳柳真真，事事风风韵韵。\n娇娇嫩嫩，停停当当人人。' },
  { title:'水仙子·重观瀑布', author:'乔吉', dynasty:'元', content:'天机织罢月梭闲，石壁高垂雪练寒。\n冰丝带雨悬霄汉，几千年晒未干。\n露华凉人怯衣单。\n似白虹饮涧，玉龙下山，晴雪飞滩。' },
  { title:'折桂令·春情', author:'徐再思', dynasty:'元', content:'平生不会相思，才会相思，便害相思。\n身似浮云，心如飞絮，气若游丝。\n空一缕余香在此，盼千金游子何之。\n证候来时，正是何时？灯半昏时，月半明时。' },
  { title:'山坡羊·道情', author:'宋方壶', dynasty:'元', content:'青山相待，白云相爱，梦不到紫罗袍共黄金带。\n一茅斋，野花开。\n管甚谁家兴废谁成败，陋巷箪瓢亦乐哉。\n贫，气不改；达，志不改。' },
  { title:'别云间', author:'夏完淳', dynasty:'明', content:'三年羁旅客，今日又南冠。\n无限山河泪，谁言天地宽。\n已知泉路近，欲别故乡难。\n毅魄归来日，灵旗空际看。' },
  { title:'寄丘生东粤', author:'呼文如', dynasty:'明', content:'郎马无凭似断蓬，妾身只在广寒宫。\n嫦娥亦解怜孤另，不许清光照别离。' },
  { title:'遗夫人书', author:'夏完淳', dynasty:'明', content:'三月结缡，便遭大变。\n而累淑女，相依外家。\n未尝以家门盛衰，微见颜色。\n虽德曜齐眉，未可相喻。' },
  { title:'清明', author:'高翥', dynasty:'宋', content:'南北山头多墓田，清明祭扫各纷然。\n纸灰飞作白蝴蝶，泪血染成红杜鹃。\n日落狐狸眠冢上，夜归儿女笑灯前。\n人生有酒须当醉，一滴何曾到九泉。' },
  { title:'插秧歌', author:'杨万里', dynasty:'宋', content:'田夫抛秧田妇接，小儿拔秧大儿插。\n笠是兜鍪蓑是甲，雨从头上湿到胛。\n唤渠朝餐歇半霎，低头折腰只不答。\n秧根未牢莳未匝，照管鹅儿与雏鸭。' },
  { title:'初入淮河四绝句', author:'杨万里', dynasty:'宋', content:'船离洪泽岸头沙，人到淮河意不佳。\n何必桑乾方是远，中流以北即天涯。' },
  { title:'江村晚眺', author:'戴复古', dynasty:'宋', content:'江头落日照平沙，潮退渔舠阁岸斜。\n白鸟一双临水立，见人惊起入芦花。' },
  { title:'军中乐', author:'刘克庄', dynasty:'宋', content:'行营面面设刁斗，帐门深深万人守。\n将军贵重不据鞍，夜夜发兵防隘口。\n自言虏畏不敢犯，射麋捕鹿来行酒。\n更阑酒醒山月落，彩缣百段支女乐。\n谁知营中血战人，无钱得合金疮药。' },
  { title:'戊辰即事', author:'刘克庄', dynasty:'宋', content:'诗人安得有青衫？今岁和戎百万缣。\n从此西湖休插柳，剩栽桑树养吴蚕。' },
  { title:'湖州歌', author:'汪元量', dynasty:'宋', content:'北望燕云不尽头，大江东去水悠悠。\n夕阳一片寒鸦外，目断东南四百州。' },
  { title:'秋日', author:'程颢', dynasty:'宋', content:'闲来无事不从容，睡觉东窗日已红。\n万物静观皆自得，四时佳兴与人同。\n道通天地有形外，思入风云变态中。\n富贵不淫贫贱乐，男儿到此是豪雄。' },
  { title:'偶成', author:'程颢', dynasty:'宋', content:'闲来无事不从容，睡觉东窗日已红。\n万物静观皆自得，四时佳兴与人同。' },
  { title:'樵夫', author:'萧德藻', dynasty:'宋', content:'一担干柴古渡头，盘缠一日颇优游。\n归来涧底磨刀斧，又作全家明日谋。' },
  { title:'古戍', author:'刘基', dynasty:'明', content:'古戍连山火，新城殷地笳。\n九州犹虎豹，四海未桑麻。\n天迥云垂草，江空雪覆沙。\n野梅烧不尽，时见两三花。' },
  { title:'五月十九日大雨', author:'刘基', dynasty:'明', content:'风驱急雨洒高城，云压轻雷殷地声。\n雨过不知龙去处，一池草色万蛙鸣。' },
  { title:'感怀', author:'刘基', dynasty:'明', content:'结发事远游，逍遥观四方。\n天地一何阔，山川杳茫茫。\n众鸟各自飞，乔木空苍凉。\n登高见万里，怀古使心伤。' },
  { title:'塞上曲', author:'徐祯卿', dynasty:'明', content:'风急交河水正浑，黄沙日落战云昏。\n汉家天子今神武，不肯和亲出玉门。' },
  { title:'登太白楼', author:'王世贞', dynasty:'明', content:'昔闻李供奉，长啸独登楼。\n此地一垂顾，高名百代留。\n白云海色曙，明月天门秋。\n欲觅重来者，潺湲济水流。' },
  { title:'塞下曲', author:'高启', dynasty:'明', content:'日落五原塞，萧条亭堠空。\n汉家讨狂虏，籍役满山东。\n去年出飞狐，今年出云中。\n得地不足耕，杀伤以为功。\n登高望衰草，感叹意何穷。' },
  { title:'春暮西园', author:'高启', dynasty:'明', content:'绿池芳草满晴波，春色都从雨里过。\n知是人家花落尽，菜畦今日蝶来多。' },
  { title:'寻胡隐君', author:'高启', dynasty:'明', content:'渡水复渡水，看花还看花。\n春风江上路，不觉到君家。' },
  { title:'京师得家书', author:'袁凯', dynasty:'明', content:'江水三千里，家书十五行。\n行行无别语，只道早还乡。' },
  { title:'客中除夕', author:'袁凯', dynasty:'明', content:'今夕为何夕，他乡说故乡。\n看人儿女大，为客岁年长。\n戎马无休歇，关山正渺茫。\n一杯椒叶酒，未敌泪千行。' },
  { title:'重赠吴国宾', author:'边贡', dynasty:'明', content:'汉江明月照归人，万里秋风一叶身。\n休把客衣轻浣濯，此中犹有帝京尘。' },
  { title:'出郊', author:'杨慎', dynasty:'明', content:'高田如楼梯，平田如棋局。\n白鹭忽飞来，点破秧针绿。' },
  { title:'宿金沙江', author:'杨慎', dynasty:'明', content:'往年曾向嘉陵宿，驿楼东畔阑干曲。\n江声彻夜搅离愁，月色中天照幽独。\n岂意飘零瘴海头，嘉陵回首转悠悠。\n江声月色那堪说，肠断金沙万里楼。' },
  { title:'梦中绝句', author:'王阳明', dynasty:'明', content:'险夷原不滞胸中，何异浮云过太空。\n夜静海涛三万里，月明飞锡下天风。' },
  { title:'泛海', author:'王阳明', dynasty:'明', content:'险夷原不滞胸中，何异浮云过太空。\n夜静海涛三万里，月明飞锡下天风。' },
  { title:'村舍', author:'袁枚', dynasty:'清', content:'乱石堆中觅故基，偶来林下叩荆扉。\n主人不在芭蕉在，红蓼花开白鹭飞。' },
  { title:'随园记', author:'袁枚', dynasty:'清', content:'余竟以一官易此园，园之奇可以见矣。\n使吾官于此，则月一至焉。\n使吾居于此，则日日至焉。\n二者不可得兼，舍官而取园者也。' },
  { title:'十二月十五夜', author:'袁枚', dynasty:'清', content:'沉沉更鼓急，渐渐人声绝。\n吹灯窗更明，月照一天雪。' },
  { title:'出塞', author:'徐锡麟', dynasty:'清', content:'军歌应唱大刀环，誓灭胡奴出玉关。\n只解沙场为国死，何须马革裹尸还。' },
  { title:'狱中题壁', author:'谭嗣同', dynasty:'清', content:'望门投止思张俭，忍死须臾待杜根。\n我自横刀向天笑，去留肝胆两昆仑。' },
  { title:'有感', author:'谭嗣同', dynasty:'清', content:'世间无物抵春愁，合向苍冥一哭休。\n四万万人齐下泪，天涯何处是神州。' },
  { title:'对酒', author:'秋瑾', dynasty:'清', content:'不惜千金买宝刀，貂裘换酒也堪豪。\n一腔热血勤珍重，洒去犹能化碧涛。' },
  { title:'黄海舟中日人索句并见日俄战争地图', author:'秋瑾', dynasty:'清', content:'万里乘风去复来，只身东海挟春雷。\n忍看图画移颜色，肯使江山付劫灰。\n浊酒不销忧国泪，救时应仗出群才。\n拼将十万头颅血，须把乾坤力挽回。' },
  { title:'满江红·小住京华', author:'秋瑾', dynasty:'清', content:'小住京华，早又是、中秋佳节。\n为篱下、黄花开遍，秋容如拭。\n四面歌残终破楚，八年风味徒思浙。\n苦将侬、强派作蛾眉，殊未屑！\n身不得，男儿列。心却比，男儿烈！\n算平生肝胆，因人常热。\n俗子胸襟谁识我？英雄末路当磨折。\n莽红尘、何处觅知音？青衫湿！' },
  { title:'精卫', author:'顾炎武', dynasty:'清', content:'万事有不平，尔何空自苦。\n长将一寸身，衔木到终古？\n我愿平东海，身沉心不改。\n大海无平期，我心无绝时。\n呜呼！君不见，西山衔木众鸟多，鹊来燕去自成窠。' },
  { title:'马嵬', author:'袁枚', dynasty:'清', content:'莫唱当年长恨歌，人间亦自有银河。\n石壕村里夫妻别，泪比长生殿上多。' },
  { title:'遣兴', author:'袁枚', dynasty:'清', content:'爱好由来下笔难，一诗千改始心安。\n阿婆还似初笄女，头未梳成不许看。' },
  { title:'岁暮到家', author:'蒋士铨', dynasty:'清', content:'爱子心无尽，归家喜及辰。\n寒衣针线密，家信墨痕新。\n见面怜清瘦，呼儿问苦辛。\n低徊愧人子，不敢叹风尘。' },
  { title:'偶然作', author:'屈复', dynasty:'清', content:'百金买骏马，千金买美人。\n万金买高爵，何处买青春？' },
  { title:'秋海棠', author:'秋瑾', dynasty:'清', content:'栽植恩深雨露同，一丛浅淡一丛浓。\n平生不借春光力，几度开来斗晚风？' },

  // ======== 扩编八 — 最终补遗至1000首 ========
  { title:'相思怨', author:'李冶', dynasty:'唐', content:'人道海水深，不抵相思半。\n海水尚有涯，相思渺无畔。\n携琴上高楼，楼虚月华满。\n弹著相思曲，弦肠一时断。' },
  { title:'八至', author:'李冶', dynasty:'唐', content:'至近至远东西，至深至浅清溪。\n至高至明日月，至亲至疏夫妻。' },
  { title:'江陵愁望有寄', author:'鱼玄机', dynasty:'唐', content:'枫叶千枝复万枝，江桥掩映暮帆迟。\n忆君心似西江水，日夜东流无歇时。' },
  { title:'赠邻女', author:'鱼玄机', dynasty:'唐', content:'羞日遮罗袖，愁春懒起妆。\n易求无价宝，难得有心郎。\n枕上潜垂泪，花间暗断肠。\n自能窥宋玉，何必恨王昌？' },
  { title:'送友人', author:'薛涛', dynasty:'唐', content:'水国蒹葭夜有霜，月寒山色共苍苍。\n谁言千里自今夕，离梦杳如关塞长。' },
  { title:'筹边楼', author:'薛涛', dynasty:'唐', content:'平临云鸟八窗秋，壮压西川四十州。\n诸将莫贪羌族马，最高层处见边头。' },
  { title:'春望词', author:'薛涛', dynasty:'唐', content:'花开不同赏，花落不同悲。\n欲问相思处，花开花落时。' },
  { title:'啰唝曲六首', author:'刘采春', dynasty:'唐', content:'不喜秦淮水，生憎江上船。\n载儿夫婿去，经岁又经年。\n借问东园柳，枯来得几年。\n自无枝叶分，莫恐太阳偏。' },
  { title:'如意娘', author:'武则天', dynasty:'唐', content:'看朱成碧思纷纷，憔悴支离为忆君。\n不信比来长下泪，开箱验取石榴裙。' },
  { title:'彩书怨', author:'上官婉儿', dynasty:'唐', content:'叶下洞庭初，思君万里余。\n露浓香被冷，月落锦屏虚。\n欲奏江南曲，贪封蓟北书。\n书中无别意，惟怅久离居。' },
  { title:'奉和圣制立春日侍宴内殿出翦彩花应制', author:'上官婉儿', dynasty:'唐', content:'密叶因裁吐，新花逐翦舒。\n攀条虽不谬，摘蕊讵知虚。\n春至由来发，秋还未肯疏。\n借问桃将李，相乱欲何如。' },
  { title:'拜新月', author:'李端', dynasty:'唐', content:'开帘见新月，便即下阶拜。\n细语人不闻，北风吹裙带。' },
  { title:'鸣筝', author:'李端', dynasty:'唐', content:'鸣筝金粟柱，素手玉房前。\n欲得周郎顾，时时误拂弦。' },
  { title:'听筝', author:'李端', dynasty:'唐', content:'鸣筝金粟柱，素手玉房前。\n欲得周郎顾，时时误拂弦。' },
  { title:'溪居', author:'柳宗元', dynasty:'唐', content:'久为簪组累，幸此南夷谪。\n闲依农圃邻，偶似山林客。\n晓耕翻露草，夜榜响溪石。\n来往不逢人，长歌楚天碧。' },
  { title:'感遇十二首·其一', author:'张九龄', dynasty:'唐', content:'兰叶春葳蕤，桂华秋皎洁。\n欣欣此生意，自尔为佳节。\n谁知林栖者，闻风坐相悦。\n草木有本心，何求美人折！' },
  { title:'秋夜曲', author:'王维', dynasty:'唐', content:'桂魄初生秋露微，轻罗已薄未更衣。\n银筝夜久殷勤弄，心怯空房不忍归。' },
  { title:'老将行', author:'王维', dynasty:'唐', content:'少年十五二十时，步行夺得胡马骑。\n射杀山中白额虎，肯数邺下黄须儿。\n一身转战三千里，一剑曾当百万师。\n汉兵奋迅如霹雳，虏骑崩腾畏蒺藜。\n卫青不败由天幸，李广无功缘数奇。\n自从弃置便衰朽，世事蹉跎成白首。\n昔时飞箭无全目，今日垂杨生左肘。\n路旁时卖故侯瓜，门前学种先生柳。' },
  { title:'桃源行', author:'王维', dynasty:'唐', content:'渔舟逐水爱山春，两岸桃花夹古津。\n坐看红树不知远，行尽青溪不见人。\n山口潜行始隈隩，山开旷望旋平陆。\n遥看一处攒云树，近入千家散花竹。\n樵客初传汉姓名，居人未改秦衣服。\n居人共住武陵源，还从物外起田园。\n月明松下房栊静，日出云中鸡犬喧。\n惊闻俗客争来集，竞引还家问都邑。' },
  { title:'洛阳女儿行', author:'王维', dynasty:'唐', content:'洛阳女儿对门居，才可颜容十五余。\n良人玉勒乘骢马，侍女金盘脍鲤鱼。\n画阁朱楼尽相望，红桃绿柳垂檐向。\n罗帷送上七香车，宝扇迎归九华帐。\n狂夫富贵在青春，意气骄奢剧季伦。\n自怜碧玉亲教舞，不惜珊瑚持与人。' },
  { title:'酬郭给事', author:'王维', dynasty:'唐', content:'洞门高阁霭余辉，桃李阴阴柳絮飞。\n禁里疏钟官舍晚，省中啼鸟吏人稀。\n晨摇玉佩趋金殿，夕奉天书拜琐闱。\n强欲从君无那老，将因卧病解朝衣。' },
  { title:'渭川田家', author:'王维', dynasty:'唐', content:'斜阳照墟落，穷巷牛羊归。\n野老念牧童，倚杖候荆扉。\n雉雊麦苗秀，蚕眠桑叶稀。\n田夫荷锄至，相见语依依。\n即此羡闲逸，怅然吟式微。' },
  { title:'送梓州李使君', author:'王维', dynasty:'唐', content:'万壑树参天，千山响杜鹃。\n山中一夜雨，树杪百重泉。\n汉女输橦布，巴人讼芋田。\n文翁翻教授，不敢倚先贤。' },
  { title:'观猎', author:'王维', dynasty:'唐', content:'风劲角弓鸣，将军猎渭城。\n草枯鹰眼疾，雪尽马蹄轻。\n忽过新丰市，还归细柳营。\n回看射雕处，千里暮云平。' },
  { title:'汉江临眺', author:'王维', dynasty:'唐', content:'楚塞三湘接，荆门九派通。\n江流天地外，山色有无中。\n郡邑浮前浦，波澜动远空。\n襄阳好风日，留醉与山翁。' },
  { title:'寄荆州张丞相', author:'王维', dynasty:'唐', content:'所思竟何在，怅望深荆门。\n举世无相识，终身思旧恩。\n方将与农圃，艺植老丘园。\n目尽南飞雁，何由寄一言。' },
  { title:'山中送别', author:'王维', dynasty:'唐', content:'山中相送罢，日暮掩柴扉。\n春草明年绿，王孙归不归。' },
  { title:'书事', author:'王维', dynasty:'唐', content:'轻阴阁小雨，深院昼慵开。\n坐看苍苔色，欲上人衣来。' },
  { title:'栾家濑', author:'王维', dynasty:'唐', content:'飒飒秋雨中，浅浅石溜泻。\n跳波自相溅，白鹭惊复下。' },
  { title:'田园乐·其六', author:'王维', dynasty:'唐', content:'桃红复含宿雨，柳绿更带朝烟。\n花落家童未扫，莺啼山客犹眠。' },
  { title:'少年行·其一', author:'王维', dynasty:'唐', content:'新丰美酒斗十千，咸阳游侠多少年。\n相逢意气为君饮，系马高楼垂柳边。' },
  { title:'伊州歌', author:'王维', dynasty:'唐', content:'清风明月苦相思，荡子从戎十载余。\n征人去日殷勤嘱，归雁来时数附书。' },
  { title:'叹白发', author:'王维', dynasty:'唐', content:'宿昔朱颜成暮齿，须臾白发变垂髫。\n一生几许伤心事，不向空门何处销。' },
  { title:'辋川闲居赠裴秀才迪', author:'王维', dynasty:'唐', content:'寒山转苍翠，秋水日潺湲。\n倚杖柴门外，临风听暮蝉。\n渡头余落日，墟里上孤烟。\n复值接舆醉，狂歌五柳前。' },
  { title:'宫词·故国三千里', author:'张祜', dynasty:'唐', content:'故国三千里，深宫二十年。\n一声何满子，双泪落君前。' },
  { title:'题金陵渡', author:'张祜', dynasty:'唐', content:'金陵津渡小山楼，一宿行人自可愁。\n潮落夜江斜月里，两三星火是瓜州。' },
  { title:'纵游淮南', author:'张祜', dynasty:'唐', content:'十里长街市井连，月明桥上看神仙。\n人生只合扬州死，禅智山光好墓田。' },
  { title:'题松汀驿', author:'张祜', dynasty:'唐', content:'山色远含空，苍茫泽国东。\n海明先见日，江白迥闻风。\n鸟道高原去，人烟小径通。\n那知旧遗逸，不在五湖中。' },
  { title:'赠窦家小儿', author:'张祜', dynasty:'唐', content:'深绿衣裳小小人，每来听里解相亲。\n天生合去云霄上，一尺松栽已出尘。' },
  { title:'正月十五夜灯', author:'张祜', dynasty:'唐', content:'千门开锁万灯明，正月中旬动帝京。\n三百内人连袖舞，一时天上著词声。' },
  { title:'夜宿山寺', author:'李白', dynasty:'唐', content:'危楼高百尺，手可摘星辰。\n不敢高声语，恐惊天上人。' },
  { title:'陪侍郎叔游洞庭醉后', author:'李白', dynasty:'唐', content:'刬却君山好，平铺湘水流。\n巴陵无限酒，醉杀洞庭秋。' },
  { title:'陪族叔刑部侍郎晔及中书贾舍人至游洞庭', author:'李白', dynasty:'唐', content:'南湖秋水夜无烟，耐可乘流直上天。\n且就洞庭赊月色，将船买酒白云边。' },
  { title:'咏苎萝山', author:'李白', dynasty:'唐', content:'西施越溪女，出自苎萝山。\n秀色掩今古，荷花羞玉颜。\n浣纱弄碧水，自与清波闲。\n皓齿信难开，沉吟碧云间。' },
  { title:'山中问答', author:'李白', dynasty:'唐', content:'问余何意栖碧山，笑而不答心自闲。\n桃花流水窅然去，别有天地非人间。' },
  { title:'劳劳亭', author:'李白', dynasty:'唐', content:'天下伤心处，劳劳送客亭。\n春风知别苦，不遣柳条青。' },
  { title:'春夜洛城闻笛', author:'李白', dynasty:'唐', content:'谁家玉笛暗飞声，散入春风满洛城。\n此夜曲中闻折柳，何人不起故园情。' },
  { title:'苏台览古', author:'李白', dynasty:'唐', content:'旧苑荒台杨柳新，菱歌清唱不胜春。\n只今惟有西江月，曾照吴王宫里人。' },
  { title:'越中览古', author:'李白', dynasty:'唐', content:'越王勾践破吴归，义士还家尽锦衣。\n宫女如花满春殿，只今惟有鹧鸪飞。' },
  { title:'经下邳圯桥怀张子房', author:'李白', dynasty:'唐', content:'子房未虎啸，破产不为家。\n沧海得壮士，椎秦博浪沙。\n报韩虽不成，天地皆振动。\n潜匿游下邳，岂曰非智勇？\n我来圯桥上，怀古钦英风。\n唯见碧流水，曾无黄石公。\n叹息此人去，萧条徐泗空。' },
  { title:'沙丘城下寄杜甫', author:'李白', dynasty:'唐', content:'我来竟何事，高卧沙丘城。\n城边有古树，日夕连秋声。\n鲁酒不可醉，齐歌空复情。\n思君若汶水，浩荡寄南征。' },
  { title:'鲁郡东石门送杜二甫', author:'李白', dynasty:'唐', content:'醉别复几日，登临遍池台。\n何时石门路，重有金樽开。\n秋波落泗水，海色明徂徕。\n飞蓬各自远，且尽手中杯。' },
  { title:'哭晁卿衡', author:'李白', dynasty:'唐', content:'日本晁卿辞帝都，征帆一片绕蓬壶。\n明月不归沉碧海，白云愁色满苍梧。' },
  { title:'秋下荆门', author:'李白', dynasty:'唐', content:'霜落荆门江树空，布帆无恙挂秋风。\n此行不为鲈鱼鲙，自爱名山入剡中。' },
  { title:'别储邕之剡中', author:'李白', dynasty:'唐', content:'借问剡中道，东南指越乡。\n舟从广陵去，水入会稽长。\n竹色溪下绿，荷花镜里香。\n辞君向天姥，拂石卧秋霜。' },
  { title:'天台晓望', author:'李白', dynasty:'唐', content:'天台邻四明，华顶高百越。\n门标赤城霞，楼栖沧岛月。\n凭高登远览，直下见溟渤。\n云垂大鹏翻，波动巨鳌没。' },
  { title:'送温处士归黄山白鹅峰旧居', author:'李白', dynasty:'唐', content:'黄山四千仞，三十二莲峰。\n丹崖夹石柱，菡萏金芙蓉。\n伊昔升绝顶，下窥天目松。\n仙人炼玉处，羽化留余踪。' },
  { title:'宿五松山下荀媪家', author:'李白', dynasty:'唐', content:'我宿五松下，寂寥无所欢。\n田家秋作苦，邻女夜舂寒。\n跪进雕胡饭，月光明素盘。\n令人惭漂母，三谢不能餐。' },
  { title:'丁都护歌', author:'李白', dynasty:'唐', content:'云阳上征去，两岸饶商贾。\n吴牛喘月时，拖船一何苦。\n水浊不可饮，壶浆半成土。\n一唱都护歌，心摧泪如雨。\n万人凿盘石，无由达江浒。\n君看石芒砀，掩泪悲千古。' },
  { title:'长干行', author:'李白', dynasty:'唐', content:'妾发初覆额，折花门前剧。\n郎骑竹马来，绕床弄青梅。\n同居长干里，两小无嫌猜。\n十四为君妇，羞颜未尝开。\n低头向暗壁，千唤不一回。\n十五始展眉，愿同尘与灰。\n常存抱柱信，岂上望夫台。\n十六君远行，瞿塘滟滪堆。\n五月不可触，猿声天上哀。\n门前迟行迹，一一生绿苔。\n苔深不能扫，落叶秋风早。\n八月蝴蝶黄，双飞西园草。\n感此伤妾心，坐愁红颜老。\n早晚下三巴，预将书报家。\n相迎不道远，直至长风沙。' },

  // ======== 扩编九 — 收官至1000+ ========
  { title:'秋浦歌十七首·其十四', author:'李白', dynasty:'唐', content:'炉火照天地，红星乱紫烟。\n赧郎明月夜，歌曲动寒川。' },
  { title:'永王东巡歌·其二', author:'李白', dynasty:'唐', content:'三川北虏乱如麻，四海南奔似永嘉。\n但用东山谢安石，为君谈笑静胡沙。' },
  { title:'塞上听吹笛', author:'高适', dynasty:'唐', content:'雪净胡天牧马还，月明羌笛戍楼间。\n借问梅花何处落，风吹一夜满关山。' },
  { title:'除夜作', author:'高适', dynasty:'唐', content:'旅馆寒灯独不眠，客心何事转凄然。\n故乡今夜思千里，霜鬓明朝又一年。' },
  { title:'燕歌行', author:'高适', dynasty:'唐', content:'汉家烟尘在东北，汉将辞家破残贼。\n男儿本自重横行，天子非常赐颜色。\n摐金伐鼓下榆关，旌旆逶迤碣石间。\n校尉羽书飞瀚海，单于猎火照狼山。\n山川萧条极边土，胡骑凭陵杂风雨。\n战士军前半死生，美人帐下犹歌舞。\n大漠穷秋塞草腓，孤城落日斗兵稀。\n身当恩遇常轻敌，力尽关山未解围。\n铁衣远戍辛勤久，玉箸应啼别离后。\n少妇城南欲断肠，征人蓟北空回首。\n边庭飘飖那可度，绝域苍茫无所有。\n杀气三时作阵云，寒声一夜传刁斗。\n相看白刃血纷纷，死节从来岂顾勋？\n君不见沙场征战苦，至今犹忆李将军。' },
  { title:'营州歌', author:'高适', dynasty:'唐', content:'营州少年厌原野，狐裘蒙茸猎城下。\n虏酒千钟不醉人，胡儿十岁能骑马。' },
  { title:'听张立本女吟', author:'高适', dynasty:'唐', content:'危冠广袖楚宫妆，独步闲庭逐夜凉。\n自把玉钗敲砌竹，清歌一曲月如霜。' },
  { title:'逢入京使', author:'岑参', dynasty:'唐', content:'故园东望路漫漫，双袖龙钟泪不干。\n马上相逢无纸笔，凭君传语报平安。' },
  { title:'碛中作', author:'岑参', dynasty:'唐', content:'走马西来欲到天，辞家见月两回圆。\n今夜不知何处宿，平沙万里绝人烟。' },
  { title:'行军九日思长安故园', author:'岑参', dynasty:'唐', content:'强欲登高去，无人送酒来。\n遥怜故园菊，应傍战场开。' },
  { title:'山房春事', author:'岑参', dynasty:'唐', content:'梁园日暮乱飞鸦，极目萧条三两家。\n庭树不知人去尽，春来还发旧时花。' },
  { title:'白雪歌送武判官归京', author:'岑参', dynasty:'唐', content:'北风卷地白草折，胡天八月即飞雪。\n忽如一夜春风来，千树万树梨花开。\n散入珠帘湿罗幕，狐裘不暖锦衾薄。\n将军角弓不得控，都护铁衣冷难着。\n瀚海阑干百丈冰，愁云惨淡万里凝。\n中军置酒饮归客，胡琴琵琶与羌笛。\n纷纷暮雪下辕门，风掣红旗冻不翻。\n轮台东门送君去，去时雪满天山路。\n山回路转不见君，雪上空留马行处。' },
  { title:'走马川行奉送出师西征', author:'岑参', dynasty:'唐', content:'君不见走马川行雪海边，平沙莽莽黄入天。\n轮台九月风夜吼，一川碎石大如斗，随风满地石乱走。\n匈奴草黄马正肥，金山西见烟尘飞，汉家大将西出师。\n将军金甲夜不脱，半夜军行戈相拨，风头如刀面如割。\n马毛带雪汗气蒸，五花连钱旋作冰，幕中草檄砚水凝。\n虏骑闻之应胆慑，料知短兵不敢接，车师西门伫献捷。' },
  { title:'望洞庭湖赠张丞相', author:'孟浩然', dynasty:'唐', content:'八月湖水平，涵虚混太清。\n气蒸云梦泽，波撼岳阳城。\n欲济无舟楫，端居耻圣明。\n坐观垂钓者，徒有羡鱼情。' },
  { title:'夏日南亭怀辛大', author:'孟浩然', dynasty:'唐', content:'山光忽西落，池月渐东上。\n散发乘夕凉，开轩卧闲敞。\n荷风送香气，竹露滴清响。\n欲取鸣琴弹，恨无知音赏。\n感此怀故人，中宵劳梦想。' },
  { title:'秋宵月下有怀', author:'孟浩然', dynasty:'唐', content:'秋空明月悬，光彩露沾湿。\n惊鹊栖未定，飞萤卷帘入。\n庭槐寒影疏，邻杵夜声急。\n佳期旷何许，望望空伫立。' },
  { title:'送朱大入秦', author:'孟浩然', dynasty:'唐', content:'游人五陵去，宝剑值千金。\n分手脱相赠，平生一片心。' },
  { title:'舟中晓望', author:'孟浩然', dynasty:'唐', content:'挂席东南望，青山水国遥。\n舳舻争利涉，来往接风潮。\n问我今何适？天台访石桥。\n坐看霞色晓，疑是赤城标。' },
  { title:'题义公禅房', author:'孟浩然', dynasty:'唐', content:'义公习禅寂，结宇依空林。\n户外一峰秀，阶前众壑深。\n夕阳连雨足，空翠落庭阴。\n看取莲花净，应知不染心。' },
  { title:'渡浙江问舟中人', author:'孟浩然', dynasty:'唐', content:'潮落江平未有风，扁舟共济与君同。\n时时引领望天末，何处青山是越中。' },
  { title:'耶溪泛舟', author:'孟浩然', dynasty:'唐', content:'落景余清辉，轻桡弄溪渚。\n澄明爱水物，临泛何容与。\n白首垂钓翁，新妆浣纱女。\n相看似相识，脉脉不得语。' },
  { title:'采莲曲', author:'王昌龄', dynasty:'唐', content:'荷叶罗裙一色裁，芙蓉向脸两边开。\n乱入池中看不见，闻歌始觉有人来。' },
  { title:'送柴侍御', author:'王昌龄', dynasty:'唐', content:'流水通波接武冈，送君不觉有离伤。\n青山一道同云雨，明月何曾是两乡。' },
  { title:'听流人水调子', author:'王昌龄', dynasty:'唐', content:'孤舟微月对枫林，分付鸣筝与客心。\n岭色千重万重雨，断弦收与泪痕深。' },
  { title:'题僧房', author:'王昌龄', dynasty:'唐', content:'棕榈花满院，苔藓入闲房。\n彼此名言绝，空中闻异香。' },
  { title:'朝来曲', author:'王昌龄', dynasty:'唐', content:'月昃鸣珂动，花连绣户春。\n盘龙玉台镜，唯待画眉人。' },
  { title:'城傍曲', author:'王昌龄', dynasty:'唐', content:'秋风鸣桑条，草白狐兔骄。\n邯郸饮来酒未消，城北原平掣皂雕。\n射杀空营两腾虎，回身却月佩弓弰。' },
  { title:'观江淮名胜图', author:'王昌龄', dynasty:'唐', content:'刻意吟云山，尤知隐沦妙。\n远公何为者，再诣临海峤。\n而我高其风，披图得遗照。\n援毫无逃境，遂展千里眺。' },
  { title:'登鹳雀楼', author:'王之涣', dynasty:'唐', content:'白日依山尽，黄河入海流。\n欲穷千里目，更上一层楼。' },
  { title:'送别', author:'王之涣', dynasty:'唐', content:'杨柳东风树，青青夹御河。\n近来攀折苦，应为别离多。' },
  { title:'宴词', author:'王之涣', dynasty:'唐', content:'长堤春水绿悠悠，畎入漳河一道流。\n莫听声声催去棹，桃溪浅处不胜舟。' },
  { title:'凉州词', author:'王翰', dynasty:'唐', content:'葡萄美酒夜光杯，欲饮琵琶马上催。\n醉卧沙场君莫笑，古来征战几人回？' },
  { title:'山中', author:'王勃', dynasty:'唐', content:'长江悲已滞，万里念将归。\n况属高风晚，山山黄叶飞。' },
  { title:'咏风', author:'王勃', dynasty:'唐', content:'肃肃凉风生，加我林壑清。\n驱烟寻涧户，卷雾出山楹。\n去来固无迹，动息如有情。\n日落山水静，为君起松声。' },
  { title:'春庄', author:'王勃', dynasty:'唐', content:'山中兰叶径，城外李桃园。\n岂知人事静，不觉鸟声喧。' },
  { title:'铜雀妓', author:'王勃', dynasty:'唐', content:'金凤邻铜雀，漳河望邺城。\n君王无处所，台榭若平生。\n舞席纷何就，歌梁俨未倾。\n西陵松槚冷，谁见绮罗情。' },
  { title:'羁春', author:'王勃', dynasty:'唐', content:'客心千里倦，春事一朝归。\n还伤北园里，重见落花飞。' },
  { title:'林塘怀友', author:'王勃', dynasty:'唐', content:'芳屏画春草，仙杼织朝霞。\n何如山水路，对面即飞花。' },
  { title:'山扉夜坐', author:'王勃', dynasty:'唐', content:'抱琴开野室，携酒对情人。\n林塘花月下，别似一家春。' },
  { title:'春游', author:'王勃', dynasty:'唐', content:'客念纷无极，春泪倍成行。\n今朝花树下，不觉恋年光。' },
  { title:'登城春望', author:'王勃', dynasty:'唐', content:'物外山川近，晴初景霭新。\n芳郊花柳遍，何处不宜春。' },
  { title:'夜兴', author:'王勃', dynasty:'唐', content:'野烟含夕渚，山月照秋林。\n还将中散兴，来偶步兵琴。' },
  { title:'临江', author:'王勃', dynasty:'唐', content:'泛泛东流水，飞飞北上尘。\n归骖将别棹，俱是倦游人。' },
  { title:'别人·其二', author:'王勃', dynasty:'唐', content:'江上风烟积，山幽云雾多。\n送君南浦外，还望将如何。' },
  { title:'赠李十四·其一', author:'王勃', dynasty:'唐', content:'野客思茅宇，山人爱竹林。\n琴尊唯待处，风月自相寻。' },
  { title:'重别薛华', author:'王勃', dynasty:'唐', content:'明月沉珠浦，秋风濯锦川。\n楼台临绝岸，洲渚亘长天。\n旅泊成千里，栖遑共百年。\n穷途唯有泪，还望独潸然。' },
  { title:'寻道观', author:'王勃', dynasty:'唐', content:'芝廛光分野，蓬阙盛规模。\n碧坛清桂阈，丹洞肃松枢。\n玉笈三山记，金箱五岳图。\n苍虬不可得，空望白云衢。' },
  { title:'游梵宇三觉寺', author:'王勃', dynasty:'唐', content:'杏阁披青磴，雕台控紫岑。\n叶齐山路狭，花积野坛深。\n萝幌栖禅影，松门听梵音。\n遽忻陪妙躅，延赏涤烦襟。' },
  { title:'仲春郊外', author:'王勃', dynasty:'唐', content:'东园垂柳径，西堰落花津。\n物色连三月，风光绝四邻。\n鸟飞村觉曙，鱼戏水知春。\n初晴山院里，何处染嚣尘。' },

/** easeInOutCubic 缓动函数：动画开始和结束时平缓，中间加速 */
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

/** 在球体内生成随机点 */
function randomSpherePoint(radius) {
  const u = Math.random();
  const v = Math.random();
  const theta = 2 * Math.PI * u;
  const phi = Math.acos(2 * v - 1);
  const r = radius * Math.cbrt(Math.random());
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
}

/** 生成低饱和冷暖色：冷白/淡蓝/淡紫为主，少量鎏金点缀 */
function generateNodeColor() {
  const rand = Math.random();
  let color;
  if (rand < 0.35) {
    // 冷白：偏蓝的白色
    color = new THREE.Color().setHSL(0.58 + Math.random() * 0.12, 0.08 + Math.random() * 0.12, 0.82 + Math.random() * 0.18);
  } else if (rand < 0.65) {
    // 淡蓝：低饱和蓝
    color = new THREE.Color().setHSL(0.55 + Math.random() * 0.08, 0.15 + Math.random() * 0.2, 0.65 + Math.random() * 0.3);
  } else if (rand < 0.88) {
    // 淡紫：低饱和紫
    color = new THREE.Color().setHSL(0.72 + Math.random() * 0.1, 0.12 + Math.random() * 0.18, 0.68 + Math.random() * 0.28);
  } else {
    // 鎏金点缀
    color = new THREE.Color().setHSL(0.12 + Math.random() * 0.04, 0.35 + Math.random() * 0.25, 0.55 + Math.random() * 0.35);
  }
  return color;
}
